<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAINYBRAIN Book Stream</title>
<style>
:root {
  --accent: #f2c14e;
  --line: rgba(255,255,255,.13);
  --text: #f7f8fb;
  --muted: rgba(247,248,251,.58);
  --font-ui: "Yu Gothic","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  --font-title: "Yu Mincho","Hiragino Mincho ProN","BIZ UDPMincho",serif;
  color-scheme: dark;
}
* { box-sizing: border-box; }
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#080608; color:var(--text); font-family:var(--font-ui); }
button,input,select,textarea { font:inherit; }
button {
  min-height:36px; border:1px solid var(--line); border-radius:8px;
  background:rgba(255,255,255,.08); color:var(--text); padding:7px 10px; cursor:pointer;
}
button:hover { background:rgba(255,255,255,.14); }
button.primary { border-color:rgba(242,193,78,.55); background:rgba(242,193,78,.18); }
button.good   { border-color:rgba(100,210,255,.5);  background:rgba(100,210,255,.16); }
button.warn   { border-color:rgba(255,147,189,.5);  background:rgba(255,147,189,.14); }
input,select,textarea {
  width:100%; border:1px solid var(--line); border-radius:8px;
  background:rgba(0,0,0,.28); color:var(--text); padding:9px 10px; outline:none;
}
textarea { min-height:70px; resize:vertical; line-height:1.55; }

/* ── STAGE ── */
.stage {
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 22% 12%, rgba(242,193,78,.16), transparent 30rem),
    radial-gradient(circle at 78% 14%, rgba(200,160,100,.1), transparent 26rem),
    linear-gradient(160deg, #120e08, #0d0a0e 55%, #080608);
}
/* アンビエント光球（生きている背景） */
.stage::before, .stage::after {
  content:''; position:absolute; pointer-events:none; border-radius:50%;
  filter:blur(90px); z-index:0;
}
.stage::before {
  width:44vw; height:42vh; left:4%; top:5%;
  background:radial-gradient(circle, rgba(242,193,78,.18), transparent 70%);
  animation:orb1 26s ease-in-out infinite alternate;
}
.stage::after {
  width:38vw; height:38vh; right:1%; bottom:16%;
  background:radial-gradient(circle, rgba(180,60,36,.14), transparent 70%);
  animation:orb2 34s ease-in-out infinite alternate;
}
@keyframes orb1 {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(9vw,11vh) scale(1.22); }
}
@keyframes orb2 {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(-7vw,-9vh) scale(0.82); }
}

/* ── BRAND ── */
.brand {
  position:absolute; top:20px; left:24px;
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border:1px solid var(--line); border-radius:8px;
  background:rgba(8,6,4,.65); backdrop-filter:blur(10px); z-index:10;
}
.mark {
  width:30px; height:30px; display:grid; place-items:center;
  border-radius:7px; background:linear-gradient(135deg, var(--accent), #c89030);
  color:#080608; font-weight:900; font-size:12px;
}
.brand strong { display:block; font-size:13px; line-height:1; }
.brand span   { display:block; color:var(--muted); font-size:10px; font-weight:800; margin-top:2px; }

/* ── TIMER ── */
.timer-display {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  padding:9px 16px; border:1px solid rgba(255,255,255,.14); border-radius:999px;
  background:rgba(8,6,4,.65); backdrop-filter:blur(10px); z-index:10;
}
.timer-time {
  font-size:clamp(18px,1.6vw,28px); font-weight:900;
  font-variant-numeric:tabular-nums; letter-spacing:.06em;
}
.timer-display.running {
  border-color:rgba(242,193,78,.45);
  box-shadow:0 0 22px rgba(242,193,78,.16), inset 0 0 12px rgba(242,193,78,.06);
}
.timer-display.running .timer-time { color:var(--accent); }
.timer-label { font-size:10px; font-weight:900; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; }
.timer-btn {
  width:28px; height:28px; min-height:28px; padding:0;
  display:grid; place-items:center; border-radius:8px; font-size:13px;
  border-color:rgba(242,193,78,.36);
}
.timer-btn.running { background:linear-gradient(180deg,#fff5ba,var(--accent)); color:#080608; }

/* ── AVATAR ── */
.avatar {
  position:absolute; right:2vw; bottom:118px; width:30vw; height:calc(100vh - 155px);
  display:grid; place-items:end center;
}
.avatar.empty::before {
  content:"V CHARACTER";
  width:100%; height:100%;
  display:grid; place-items:center;
  border:2px dashed rgba(255,255,255,.16); border-radius:12px;
  color:rgba(255,255,255,.32); font-weight:900; letter-spacing:.08em;
}
.avatar img, .avatar video {
  max-width:100%; max-height:100%;
  object-fit:contain; filter:drop-shadow(0 24px 40px rgba(0,0,0,.48));
}

/* ── BOOK COVER ── */
.book-cover {
  position:absolute; left:34vw; bottom:180px;
  width:clamp(120px,13vw,210px);
  display:none;
}
.book-cover img {
  width:100%; border-radius:4px;
  box-shadow:4px 8px 28px rgba(0,0,0,.62), -2px 0 0 rgba(0,0,0,.4);
}
.book-cover.show { display:block; }

/* ── COMMENT TRACKS (横スクロール) ── */
.comment-tracks {
  position:absolute; left:0; right:0; bottom:0; height:108px;
  overflow:hidden; pointer-events:none; z-index:8;
  background:linear-gradient(0deg,rgba(0,0,0,.40),transparent);
  box-shadow:0 -28px 56px rgba(0,0,0,.44);
}
.c-track {
  height:36px; position:relative; overflow:hidden;
  border-bottom:1px solid rgba(255,255,255,.045);
}
.comment-h {
  position:absolute; top:0; left:0; height:100%;
  display:inline-flex; align-items:center; gap:7px;
  padding:0 18px 0 10px;
  border-left:3px solid var(--user-color);
  background:rgba(0,0,0,.56); backdrop-filter:blur(8px);
  border-radius:0 999px 999px 0;
  font-size:clamp(13px,1.35vw,19px); font-weight:700;
  text-shadow:0 1px 2px rgba(0,0,0,.7);
  transform:translateX(100vw);
  animation:fly-left var(--speed,14s) linear forwards,
            comment-enter 1s ease-out forwards;
  white-space:nowrap;
}
.comment-h.super { border-left-width:4px; font-weight:900; }
.comment-h .user {
  color:var(--user-color); font-weight:900; font-size:.8em; opacity:.9;
}
.comment-h .user::before {
  content:'●'; margin-right:4px; font-size:.55em; vertical-align:middle; opacity:.7;
}
.comment-h .text { color:var(--text); }
@keyframes fly-left {
  from { transform:translateX(100vw); }
  to   { transform:translateX(calc(-100% - 20px)); }
}
@keyframes comment-enter {
  0%   { opacity:0; box-shadow:0 0 28px var(--user-color), inset 0 0 10px rgba(255,255,255,.06); }
  10%  { opacity:1; box-shadow:0 0 16px var(--user-color); }
  45%  { box-shadow:0 0 6px color-mix(in srgb,var(--user-color) 50%,transparent); }
  100% { box-shadow:0 0 2px color-mix(in srgb,var(--user-color) 18%,transparent); }
}

/* ── TITLE CARD ── */
.title-card {
  position:absolute; left:32px; bottom:178px; width:min(480px,40vw);
  padding:14px 18px;
  border-left:5px solid var(--accent);
  border-top:1px solid rgba(255,255,255,.12);
  border-right:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(255,255,255,.08);
  border-radius:8px;
  background:linear-gradient(90deg,rgba(8,5,2,.88),rgba(8,5,2,.42));
  backdrop-filter:blur(10px);
}
.kicker { color:var(--accent); font-size:11px; font-weight:900; letter-spacing:.1em; margin-bottom:6px; text-transform:uppercase; }
.card-title { font-family:var(--font-title); font-size:clamp(22px,2.6vw,42px); line-height:1.1; font-weight:900; overflow-wrap:anywhere; }
.card-author { margin-top:5px; color:rgba(247,248,251,.7); font-size:clamp(12px,1.2vw,16px); font-family:var(--font-title); }
.card-affiliate {
  margin-top:10px; display:inline-flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:999px;
  background:rgba(242,193,78,.18); border:1px solid rgba(242,193,78,.5);
  color:var(--accent); font-size:11px; font-weight:900; letter-spacing:.08em;
  text-decoration:none; transition:background .15s, box-shadow .15s;
}
.card-affiliate:hover {
  background:rgba(242,193,78,.28);
  box-shadow:0 0 14px rgba(242,193,78,.22);
}

/* ── CAPTION ── */
.caption {
  position:absolute; left:50%; bottom:112px; transform:translateX(-50%);
  width:min(860px,calc(100vw - 56px)); min-height:52px;
  display:grid; place-items:center;
  padding:11px 20px;
  border:1px solid rgba(255,255,255,.14);
  border-top:2px solid rgba(242,193,78,.28);
  border-radius:8px;
  background:rgba(4,3,2,.75); backdrop-filter:blur(10px);
  text-align:center; font-family:var(--font-title);
  font-size:clamp(18px,1.9vw,28px); line-height:1.35; font-weight:900;
  text-shadow:0 2px 3px rgba(0,0,0,.6); z-index:6;
  transition:border-top-color .3s;
}
@keyframes cap-flash {
  0%   { border-top-color:var(--accent); box-shadow:0 -2px 20px rgba(242,193,78,.32); }
  100% { border-top-color:rgba(242,193,78,.28); box-shadow:none; }
}
.caption.flash-in { animation:cap-flash 0.8s ease-out forwards; }

/* ── DOCK ── */
.dock {
  position:fixed; right:14px; top:14px;
  width:min(420px,calc(100vw - 28px)); max-height:calc(100vh - 28px); overflow:auto;
  border:1px solid rgba(255,255,255,.13); border-radius:10px;
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018)), rgba(10,8,4,.92);
  backdrop-filter:blur(16px); z-index:20;
  box-shadow:0 28px 80px rgba(0,0,0,.44);
}
body.panel-hidden .dock { display:none; }
.dock-head {
  display:flex; align-items:center; gap:9px;
  padding:12px 14px; border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,rgba(242,193,78,.14),transparent 60%),rgba(255,255,255,.04);
}
.dock-title { flex:1; font-size:14px; font-weight:900; }
.dock-title span { display:block; color:var(--muted); font-size:10px; margin-top:2px; }
.dock-body { padding:12px; display:grid; gap:12px; }
.section {
  border:1px solid rgba(255,255,255,.1); border-radius:8px;
  background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.024));
  padding:12px; display:grid; gap:10px;
}
.section-title { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:900; }
.step {
  width:22px; height:22px; display:grid; place-items:center;
  border-radius:999px; background:var(--accent); color:#080608; font-size:12px; font-weight:900;
}
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.actions .wide { grid-column:1/-1; }
.actions button { min-height:44px; font-weight:900; }
.field { display:grid; gap:5px; }
.field label { color:var(--muted); font-size:11px; font-weight:900; }
.field input,.field select,.field textarea { min-height:40px; }
.log { color:var(--muted); font-size:11px; line-height:1.45; border:1px solid var(--line); border-radius:8px; padding:8px; background:rgba(0,0,0,.2); max-height:80px; overflow:auto; }
.status-text { color:var(--muted); font-size:11px; font-weight:800; }
details { border:1px solid rgba(255,255,255,.1); border-radius:8px; background:rgba(0,0,0,.14); }
summary { cursor:pointer; padding:10px; color:var(--muted); font-size:12px; font-weight:900; }
details .inner { padding:0 10px 10px; display:grid; gap:10px; }
.transcript-plan-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.plan-btn {
  position:relative; display:flex; flex-direction:column; align-items:center;
  gap:3px; padding:9px 8px; border-radius:9px; font-size:12px; font-weight:900;
  border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--muted);
  cursor:pointer; transition:all .15s;
}
.plan-btn.active { border-color:rgba(242,193,78,.5); background:rgba(242,193,78,.14); color:var(--text); }
.plan-btn.pro    { border-color:rgba(200,144,216,.3); color:rgba(200,144,216,.6); cursor:default; }
.plan-tag  { font-size:9px; font-weight:700; letter-spacing:.08em; opacity:.7; }
.plan-soon {
  position:absolute; top:-7px; right:-4px;
  background:rgba(200,144,216,.22); border:1px solid rgba(200,144,216,.4);
  color:#c890d8; font-size:9px; font-weight:900; padding:2px 6px; border-radius:999px;
}
.pro-placeholder { display:grid; gap:10px; padding:14px; border:1px dashed rgba(200,144,216,.25); border-radius:10px; background:rgba(200,144,216,.04); text-align:center; }
.pro-placeholder-icon  { font-size:1.8rem; line-height:1; }
.pro-placeholder-title { font-size:13px; font-weight:900; color:rgba(200,144,216,.8); }
.pro-placeholder-desc  { font-size:11px; color:var(--muted); line-height:1.6; }
.pro-placeholder-key label { color:rgba(200,144,216,.6); }
.pro-placeholder-key input { opacity:.4; }

/* ── OPEN TAB ── */
.open-tab {
  position:fixed; right:14px; bottom:122px; z-index:40;
  display:none; align-items:center; gap:8px;
  min-height:44px; padding:0 14px;
  border:1px solid rgba(255,255,255,.22); border-radius:8px;
  background:rgba(8,6,4,.86); color:var(--text);
  box-shadow:0 16px 40px rgba(0,0,0,.44); backdrop-filter:blur(14px);
  font-weight:900; font-size:13px;
}
body.panel-hidden .open-tab { display:inline-flex; }
.open-tab-dot { width:8px; height:8px; border-radius:999px; background:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent); }
/* ── TOAST ── */
.toast {
  position:absolute; bottom:230px; left:50%; transform:translateX(-50%);
  padding:9px 18px; border-radius:8px;
  background:rgba(6,4,2,.92); border:1px solid rgba(255,255,255,.2);
  color:var(--text); font-size:12px; font-weight:900; letter-spacing:.04em;
  z-index:50; pointer-events:none; white-space:nowrap;
  opacity:0; transition:opacity .22s;
}
.toast.show { opacity:1; }
/* ── MIC LIVE ── */
.mic-live { display:none; color:var(--accent); font-size:10px; font-weight:900; letter-spacing:.1em; }
.mic-live.active { display:block; animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
/* ── TIMER FLASH ── */
@keyframes flashanim { 0%,100%{opacity:1} 50%{opacity:.15} }
.timer-display.flash { animation:flashanim .35s 8; }
/* ── SHORTCUT HINT ── */
.shortcut-hint {
  position:absolute; bottom:90px; right:24px;
  color:rgba(255,255,255,.28); font-size:9px; font-weight:800; letter-spacing:.08em;
  line-height:1.8; text-align:right; pointer-events:none; z-index:5;
}
body.obs-mode .stage{background:transparent!important;}
body.obs-mode .stage::before,body.obs-mode .stage::after{display:none;}
body.obs-mode .dock,body.obs-mode .open-tab{display:none!important;}
.obs-btn{padding:3px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.2);background:0;font-size:9px;font-weight:900;color:rgba(255,255,255,.4);cursor:pointer;letter-spacing:.06em;transition:all .15s;flex-shrink:0;}
.obs-btn.active{border-color:rgba(242,193,78,.5);background:rgba(242,193,78,.12);color:var(--accent);}
/* ── DOCK ENHANCEMENTS ── */
.dock-meta{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px;min-height:14px;letter-spacing:.02em;}
.dock-meta .on{color:#57c87c;}
.cc-btn{padding:5px 10px;border-radius:7px;border:1px solid rgba(100,210,255,.3);background:rgba(100,210,255,.08);color:#64d2ff;font-size:11px;font-weight:900;cursor:pointer;min-height:36px;transition:all .15s;flex-shrink:0;}
.cc-btn.off{border-color:var(--line);background:rgba(255,255,255,.04);color:var(--muted);}
.speed-row{display:flex;gap:4px;padding:0 12px 10px;}
.spd-btn{flex:1;padding:6px 4px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:10px;font-weight:900;cursor:pointer;transition:all .15s;color:var(--muted);}
.spd-btn.active[data-speed="slow"]{border-color:rgba(100,210,255,.4);background:rgba(100,210,255,.08);color:#64d2ff;}
.spd-btn.active[data-speed="normal"]{border-color:rgba(87,200,124,.4);background:rgba(87,200,124,.08);color:#57c87c;}
.spd-btn.active[data-speed="fast"]{border-color:rgba(255,107,122,.4);background:rgba(255,107,122,.08);color:#ff6b7a;}
/* -- UI2: collapsible + polish -- */
.section { cursor:pointer; transition:background .12s; }
.section-title { cursor:pointer; user-select:none; }
.section-toggle { margin-left:auto; font-size:11px; color:rgba(255,255,255,.35); transition:transform .22s; pointer-events:none; }
.section.collapsed .section-toggle { transform:rotate(-90deg); }
.section.collapsed > *:not(.section-title) { display:none; }
.section:hover { background:rgba(255,255,255,.045)!important; }
.section:nth-child(1){border-left:3px solid var(--accent);}
.section:nth-child(2){border-left:3px solid rgba(100,210,255,.6);}
.section:nth-child(3){border-left:3px solid rgba(87,200,124,.6);}
.field label { font-size:9px!important; font-weight:900!important; letter-spacing:.1em!important; text-transform:uppercase; }
.freq-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:10px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0;}
.freq-btn.active{border-color:rgba(87,200,124,.5);background:rgba(87,200,124,.12);color:#57c87c;}
.freq-btn[data-freq="4"].active{border-color:rgba(255,80,80,.5);background:rgba(255,80,80,.1);color:#ff8080;}
</style>
</head>
<body>

<main class="stage" id="stage">

  <div id="toast" class="toast"></div>

  <div class="brand">
    <div class="mark">RB</div>
    <div><strong>RAINYBRAIN</strong><span id="brandMode">BOOK REVIEW</span></div>
    <div class="mic-live" id="micLive">● LIVE</div>
    <button class="obs-btn" id="btnObs" onclick="toggleObsMode()">📺 OBS</button>
  </div>

  <div class="timer-display" id="timerDisplay">
    <div>
      <div class="timer-time" id="timerTime">--:--</div>
      <div class="timer-label" id="timerLabel">REC TIMER</div>
    </div>
    <button class="timer-btn" id="stageTimerToggle" type="button">▶</button>
    <button class="timer-btn" id="stageTimerReset"  type="button">↺</button>
  </div>

  <div class="avatar empty" id="avatar"></div>

  <div class="book-cover" id="bookCover"><img id="coverImg" src="" alt="book cover"></div>

  <div class="comment-tracks" id="commentTracks">
    <div class="c-track" id="track0"></div>
    <div class="c-track" id="track1"></div>
    <div class="c-track" id="track2"></div>
  </div>

  <section class="title-card">
    <div class="kicker" id="kicker">BOOK REVIEW</div>
    <div class="card-title"  id="cardTitle">今日の紹介タイトル</div>
    <div class="card-author" id="cardAuthor"></div>
    <a class="card-affiliate" id="cardAffiliate" href="#" target="_blank" style="display:none">🛒 Amazon で購入する</a>
  </section>

  <div class="caption" id="caption">「マイク開始」で文字起こしが始まります</div>

</main>

<aside id="dock" class="dock">
  <div class="dock-head">
    <div style="flex:1;min-width:0;">
      <div class="dock-title">Book Stream<span>RAINYBRAIN 本紹介配信</span></div>
      <div class="dock-meta" id="dockMeta">💬 0件　🎙 停止中</div>
    </div>
    <button class="cc-btn" id="ccBtn">💬 ON</button>
    <button id="hideDock"  type="button">閉じる</button>
    <button id="micBtn" class="good" type="button">マイク開始</button>
  </div>
  <div class="comment-action-row" style="display:flex;gap:5px;padding:0 12px 8px;">
    <button onclick="spawnComment()" style="flex:1;min-height:28px;font-size:10px;font-weight:900;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;transition:all .12s;" title="C">×1</button>
    <button onclick="for(let i=0;i<3;i++)setTimeout(()=>spawnComment(),i*450)" style="flex:1;min-height:28px;font-size:10px;font-weight:900;border:1px solid rgba(255,183,77,.25);border-radius:6px;background:rgba(255,183,77,.07);color:#ffb74d;cursor:pointer;transition:all .12s;" title="B">×3</button>

          <select id="commentEngine" style="min-height:36px;font-size:11px;"><option value="template">テンプレート（無料）</option><option value="gemini">Gemini AI</option></select>

<script>
const STREAM_GENRES=["本","読書","レビュー","エンタメ","文学","著者","紹介"];
(() => {
  "use strict";

  /* ── 共通ストレージキー（全配信画面で統一） ── */
  const SHARED_PERSONA_KEY  = "rainybrain_personas_v1";
  const SHARED_COMMENT_KEY  = "rainybrain_comment_log_v1";
  const SETTINGS_KEY        = "rainybrain_book_stream_v1";
  const GEMINI_KEY_STORE    = "streaming_gemini_key_v1";

  const PARAMS = new URLSearchParams(location.search);
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const $ = id => document.getElementById(id);

  const state = {
    bookTitle:   PARAMS.get("title")  || "",
    bookAuthor:  PARAMS.get("author") || "",
    affiliateUrl:"",
    coverUrl:    "",
    avatarInput: "",
    personaSheetUrl: "https://docs.google.com/spreadsheets/d/1YNQUnDv18WsMm7H84Ytg3lIgvWmetLZ3bqyMm3RCgkI/export?format=csv",
    commentSpeed:"normal",
    commentEngine:"template",
    timer: { durationSec:1800, remainingSec:1800, running:false, endAt:0 }
  };
  Object.assign(state, loadSettings());
  if (PARAMS.get("title"))  state.bookTitle  = PARAMS.get("title");
  if (PARAMS.get("author")) state.bookAuthor = PARAMS.get("author");
  state.timer = normalizeTimer(state.timer);

  let commentsEnabled = true;
  let commentCountN = 0;
  let personas      = loadPersonas();
  let transcript    = [];
  let commentTimer  = null;
  let recognition   = null;
  let restartTimer  = null;
  let listening     = false;
  let audioCtx      = null;
  let meterTimer    = null;
  let micStream     = null;
  let lastKey       = "";
  let transcriptBuf = "";
  let flushTimer    = null;

  init();

  function init() {
    hydrate();
    bind();
    applyStage();
    startClock();
    scheduleComment();
    initCollapsible();
  }

  function hydrate() {
    ["bookTitle","bookAuthor","affiliateUrl","coverUrl","avatarInput","personaSheetUrl","commentSpeed"].forEach(id => {
      if ($(id)) $(id).value = state[id] || "";
    });
    $("timerMinutes").value = Math.max(1, Math.round(state.timer.durationSec / 60));
    $("timerPreset").value  = String(Math.max(1, Math.round(state.timer.durationSec / 60)));
    document.querySelectorAll(".spd-btn").forEach(b => b.classList.toggle("active", b.dataset.speed === (state.commentSpeed || "normal")));
    const gk = localStorage.getItem(GEMINI_KEY_STORE)||"";
    if($("geminiKey")) $("geminiKey").value = gk;
    if(state.commentEngine==="gemini"||gk){ if($("commentEngine"))$("commentEngine").value="gemini"; if($("geminiArea"))$("geminiArea").style.display="flex"; state.commentEngine="gemini"; }
  }

  function bind() {
    ["bookTitle","bookAuthor","affiliateUrl","coverUrl","avatarInput","personaSheetUrl","commentSpeed"].forEach(id => {
      if ($(id)) $(id).addEventListener("input", () => { state[id] = $(id).value; saveSettings(); applyStage(); });
    });
    $("applyBtn")?.addEventListener("click", applyStage);
    $("copyObsBtn")?.addEventListener("click", copyObsUrl);
    $("fullscreenBtn")?.addEventListener("click", toggleFullscreen);
    $("timerPreset")?.addEventListener("change", () => { $("timerMinutes").value = $("timerPreset").value; setTimerFromInput(); });
    $("timerSetBtn")?.addEventListener("click", setTimerFromInput);
    $("timerStartBtn")?.addEventListener("click", toggleTimer);
    $("timerResetBtn")?.addEventListener("click", resetTimer);
    $("stageTimerToggle")?.addEventListener("click", toggleTimer);
    $("stageTimerReset")?.addEventListener("click", resetTimer);
    $("micBtn")?.addEventListener("click", toggleMic);
    $("clearTranscriptBtn")?.addEventListener("click", () => {
      transcript = [];
      $("transcriptLog").textContent = "まだ文字起こしはありません。";
      $("caption").textContent = "「マイク開始」で文字起こしが始まります";
    });
    $("commentBtn")?.addEventListener("click", spawnComment);
    $("manualTranscript")?.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const v = $("manualTranscript").value.trim();
      if (!v) return;
      $("manualTranscript").value = "";
      pushTranscript(v); spawnComment();
    });
    $("syncPersonaBtn")?.addEventListener("click", syncPersonas);
    $("commentSpeed")?.addEventListener("change", () => { state.commentSpeed=$("commentSpeed").value; saveSettings(); scheduleComment(); });
    $("ccBtn")?.addEventListener("click", toggleComments);
    document.querySelectorAll(".spd-btn").forEach(b => b.addEventListener("click", () => setSpeed(b.dataset.speed)));
    $("commentEngine")?.addEventListener("change",()=>{ state.commentEngine=$("commentEngine").value; if($("geminiArea"))$("geminiArea").style.display=state.commentEngine==="gemini"?"flex":"none"; saveSettings(); });
    $("hideDock")?.addEventListener("click", () => document.body.classList.add("panel-hidden"));
    $("planFreeBtn")?.addEventListener("click", () => {
      $("planFreeBtn").classList.add("active"); $("planProBtn").classList.remove("active");
      $("planFreeArea").style.display=""; $("planProArea").style.display="none";
    });
    $("planProBtn")?.addEventListener("click", () => {
      $("planProBtn").classList.add("active"); $("planFreeBtn").classList.remove("active");
      $("planFreeArea").style.display="none"; $("planProArea").style.display="";
    });
    $("openDock")?.addEventListener("click", () => document.body.classList.remove("panel-hidden"));
    document.addEventListener("fullscreenchange", () => {
      $("fullscreenBtn").textContent = document.fullscreenElement ? "全画面解除" : "全画面";
    });
    document.addEventListener("keydown", e => {
      if (e.target.matches("input,textarea,select")) return;
      if (e.code==="Space"){ e.preventDefault(); toggleTimer(); toast(state.timer.running ? "⏸ タイマー停止" : "▶ タイマー開始"); }
      if (e.key==="m"||e.key==="M") toggleMic();
      if (e.key==="c"||e.key==="C") { spawnComment(); toast("💬 コメント生成"); }
      if (e.key==="f"||e.key==="F") toggleFullscreen();
      if (e.key==="h"||e.key==="H") { document.body.classList.toggle("panel-hidden"); toast(document.body.classList.contains("panel-hidden") ? "パネル非表示" : "パネル表示"); }
    });
  }

  function applyStage() {
    $("cardTitle").textContent  = state.bookTitle  || "今日の紹介タイトル";
    $("cardAuthor").textContent = state.bookAuthor ? `著: ${state.bookAuthor}` : "";
    const aff = $("cardAffiliate");
    if (state.affiliateUrl) { aff.href = state.affiliateUrl; aff.style.display = ""; }
    else aff.style.display = "none";
    const cover = $("bookCover");
    if (state.coverUrl) { $("coverImg").src = state.coverUrl; cover.classList.add("show"); }
    else cover.classList.remove("show");
    updateAvatar();
  }

  function updateAvatar() {
    const src = state.avatarInput.trim();
    const av  = $("avatar");
    av.innerHTML = "";
    av.classList.toggle("empty", !src);
    if (!src) return;
    const el = document.createElement(/\.(webm|mp4|mov)(\?.*)?$/i.test(src) ? "video" : "img");
    el.src = src;
    if (el.tagName === "VIDEO") { el.autoplay = true; el.loop = true; el.muted = true; el.playsInline = true; }
    av.append(el);
  }

  /* ── Timer ── */
  function normalizeTimer(t) {
    const dur  = Math.max(60, parseInt(t?.durationSec  || 1800, 10) || 1800);
    const endAt= parseInt(t?.endAt || 0, 10) || 0;
    const run  = Boolean(t?.running && endAt > Date.now());
    const rem  = run ? Math.max(0, Math.ceil((endAt - Date.now()) / 1000))
                     : Math.max(0, Math.min(dur, parseInt(t?.remainingSec || dur, 10) || dur));
    return { durationSec:dur, remainingSec:rem, running:run, endAt: run ? endAt : 0 };
  }
  function setTimerFromInput() {
    const m = Math.max(1, Math.min(240, parseInt($("timerMinutes").value || "30") || 30));
    state.timer = { durationSec:m*60, remainingSec:m*60, running:false, endAt:0 };
    saveSettings(); updateClock();
  }
  function toggleTimer() {
    state.timer = normalizeTimer(state.timer);
    if (state.timer.running) { state.timer.running = false; state.timer.endAt = 0; }
    else {
      if (state.timer.remainingSec <= 0) state.timer.remainingSec = state.timer.durationSec;
      state.timer.running = true; state.timer.endAt = Date.now() + state.timer.remainingSec * 1000;
    }
    saveSettings(); updateClock();
  }
  function resetTimer() {
    state.timer = normalizeTimer(state.timer);
    state.timer.running = false; state.timer.endAt = 0; state.timer.remainingSec = state.timer.durationSec;
    saveSettings(); updateClock();
  }
  function updateClock() {
    const prevRem = state.timer.remainingSec;
    state.timer = normalizeTimer(state.timer);
    if (state.timer.running && state.timer.remainingSec <= 0) {
      state.timer.running = false; state.timer.endAt = 0;
      if (prevRem > 0) {
        toast("⏱ タイマー終了！");
        $("timerDisplay")?.classList.add("flash");
        setTimeout(()=>$("timerDisplay")?.classList.remove("flash"), 2800);
      }
    }
    $("timerTime").textContent = fmt(state.timer.remainingSec);
    $("timerLabel").textContent = state.timer.running ? "REC RUNNING" : "REC TIMER";
    $("timerDisplay").classList.toggle("running", state.timer.running);
    $("timerStartBtn").textContent = state.timer.running ? "停止" : "開始";
    $("stageTimerToggle").textContent = state.timer.running ? "Ⅱ" : "▶";
    $("stageTimerToggle").classList.toggle("running", state.timer.running);
  }
  function fmt(sec) {
    const n=Math.max(0,parseInt(sec||0)||0), h=Math.floor(n/3600), m=Math.floor((n%3600)/60), s=n%60;
    return h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  }
  function pad(n) { return String(n).padStart(2,"0"); }
  function startClock() { updateClock(); setInterval(updateClock, 1000); }
  function toggleFullscreen() {
    document.fullscreenElement ? document.exitFullscreen?.() : $("stage").requestFullscreen?.();
  }

  /* ── Transcript ── */
  function pushTranscript(text) {
    const clean = text.replace(/\s+/g," ").trim();
    if (!clean) return;
    const key = clean.replace(/[\s、。,.!！?？]/g,"");
    if (!key || key === lastKey) return;
    lastKey = key;
    transcript.unshift({ text:clean, at:Date.now() });
    transcript = transcript.slice(0,40);
    const cap = $("caption");
    cap.textContent = clean;
    cap.classList.remove("flash-in"); void cap.offsetWidth; cap.classList.add("flash-in");
    $("transcriptLog").textContent = transcript.slice(0,10).map(x=>x.text).join("\n");
    if (clean.length >= 12) setTimeout(spawnComment, 900);
  }
  function queueTranscript(text) {
    transcriptBuf = [transcriptBuf, text].filter(Boolean).join(" ").replace(/\s+/g," ").trim();
    clearTimeout(flushTimer);
    flushTimer = setTimeout(() => { const t=transcriptBuf; transcriptBuf=""; if(t) pushTranscript(t); }, 820);
  }
  function recentText() { return transcript.slice(0,6).map(x=>x.text).reverse().join("\n").slice(-1000); }

  /* ── Mic ── */
  function toggleMic() {
    if (!SpeechRecognition) {
      $("caption").textContent = "⚠ Chrome / Edge が必要です（音声認識非対応）";
      toast("Chrome/Edge の音声認識が必要です"); return;
    }
    if (listening) {
      clearTimeout(restartTimer);
      listening = false; try { recognition.stop(); } catch {}
      stopMeter();
      $("micBtn").textContent="マイク開始"; $("micBtn").className="good";
      $("micLive")?.classList.remove("active");
      toast("マイク停止"); updateDockMeta();
      return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = "ja-JP"; recognition.continuous = true; recognition.interimResults = true;
    recognition.onresult = e => {
      let fin="", int="";
      for (let i=e.resultIndex; i<e.results.length; i++) {
        const t=e.results[i][0]?.transcript||"";
        if (e.results[i].isFinal) fin+=t; else int+=t;
      }
      if (int) $("caption").textContent = int;
      if (fin.trim()) queueTranscript(fin);
    };
    recognition.onerror = () => { if(listening){ clearTimeout(restartTimer); restartTimer=setTimeout(()=>{if(listening)try{recognition.start();}catch{}},1200); } };
    recognition.onend   = () => { if(listening){ clearTimeout(restartTimer); restartTimer=setTimeout(()=>{if(listening)try{recognition.start();}catch{}},700); } };
    recognition.start(); listening=true;
    $("micBtn").textContent="マイク停止"; $("micBtn").className="warn";
    $("micLive")?.classList.add("active");
    toast("マイク開始 — 話してください");
    startMeter(); updateDockMeta();
  }
  async function startMeter() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true } });
      audioCtx  = new AudioContext();
      const an  = audioCtx.createAnalyser();
      audioCtx.createMediaStreamSource(micStream).connect(an);
      an.fftSize = 256;
    } catch {}
  }
  function stopMeter() {
    clearInterval(meterTimer);
    if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx=null; }
    if (micStream) { micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  }

  /* ── Comments ── */
  function spawnComment(superChat=false) {
    const k = localStorage.getItem(GEMINI_KEY_STORE)||"";
    if(state.commentEngine==="gemini"&&k){ spawnGeminiComment(superChat); return; }
    const p = pickPersona();
    const text = buildComment(p);
    addComment(text, p.name, p.color, superChat);
    saveCommentLog({ user:p.name, text });
  }
  async function spawnGeminiComment(superChat=false) {
    const apiKey = localStorage.getItem(GEMINI_KEY_STORE)||"";
    const p = pickPersona();
    const topic = recentText()||[state.bookTitle,state.bookAuthor].filter(Boolean).join(" / ")||"本紹介配信中";
    const prompt = `あなたはYouTubeライブ配信の視聴者です。ロール：${p.roleType||"共感勢"}、名前：${p.name}。\n配信トピック：「${topic.slice(0,200)}」\n自然な日本語コメントを1つ、40文字以内で。コメントのみ返してください。`;
    try {
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:60,temperature:0.95}})});
      if(!resp.ok) throw new Error();
      const data = await resp.json();
      const comment = (data.candidates?.[0]?.content?.parts?.[0]?.text||"").trim().replace(/\n.*/,"").slice(0,40);
      if(!comment) throw new Error();
      addComment(comment, p.name, p.color, superChat);
      saveCommentLog({ user:p.name, text:comment });
    } catch {
      const text = buildComment(p);
      addComment(text, p.name, p.color, superChat);
      saveCommentLog({ user:p.name, text });
    }
  }
  function saveGeminiKey() {
    const k = $("geminiKey")?.value.trim(); if(!k) return;
    localStorage.setItem(GEMINI_KEY_STORE, k);
    state.commentEngine = "gemini"; if($("commentEngine"))$("commentEngine").value="gemini";
    if($("geminiArea"))$("geminiArea").style.display="flex";
    if($("geminiStatus")){$("geminiStatus").textContent="✓ 保存済み";$("geminiStatus").style.color="#64d2ff";}
    saveSettings(); toast("Gemini APIキーを保存しました");
  }

  function toggleComments() {
    commentsEnabled = !commentsEnabled;
    const btn = $("ccBtn");
    if(btn){btn.textContent=commentsEnabled?"💬 ON":"💬 OFF";btn.classList.toggle("off",!commentsEnabled);}
    toast(commentsEnabled ? "💬 コメント ON" : "💬 コメント OFF");
    if(commentsEnabled) scheduleComment(); else clearTimeout(commentTimer);
  }
  function setSpeed(spd) {
    state.commentSpeed = spd;
    document.querySelectorAll(".spd-btn").forEach(b => b.classList.toggle("active", b.dataset.speed === spd));
    if($("commentSpeed")) $("commentSpeed").value = spd;
    saveSettings(); if(commentsEnabled) scheduleComment();
    toast(spd==="slow"?"🐢 低速":spd==="fast"?"🔥 高速":"▷ 普通速");
  }
  function updateDockMeta() {
    const el = $("dockMeta");
    if(el) el.innerHTML = `💬 ${commentCountN}件　🎙 ${listening ? '<span class="on">● 収録中</span>' : "停止中"}`;
  }

  function toggleObsMode() {
    document.body.classList.toggle("obs-mode");
    const btn = $("btnObs"); if(btn) btn.classList.toggle("active");
  }

  let trackRR = 0;
  function addComment(text, name, color, superChat=false) {
    commentCountN++; updateDockMeta();
    const track = document.getElementById(`track${trackRR % 3}`);
    trackRR++;
    if (!track) return;
    const speed = Math.max(10, 10 + text.length * 0.3 + Math.random() * 5);
    const node = document.createElement("div");
    node.className = "comment-h" + (superChat ? " super" : "");
    node.style.setProperty("--user-color", color || "var(--accent)");
    node.style.setProperty("--speed", speed + "s");
    const u = document.createElement("span"); u.className = "user"; u.textContent = "@" + name;
    const t = document.createElement("span"); t.className = "text"; t.textContent = text;
    node.append(u, t);
    track.append(node);
    node.addEventListener("animationend", () => node.remove());
  }

// ══ Advanced Comment Engine v2 ══
const _RB_RECENT={};
function _rbTrack(name,text){const r=_RB_RECENT[name]||(_RB_RECENT[name]=[]);r.unshift(text);if(r.length>10)r.pop();}
function _rbPick(pool,name){const r=_RB_RECENT[name]||[];const f=pool.filter(t=>!r.includes(t));const s=f.length>0?f:pool;return s[Math.floor(Math.random()*s.length)];}
function _buildTemplates(role,kw,p){
  const w=(p.words||[]).concat(p.interests||[]);

    "知識勢":[kw+"の見方が面白い","もっと掘り下げてほしい",kw+"と"+pw+"の関係が気になる","考察したくなる","この視点は新しい","専門書でも別の説がある","実はここ奥が深い",kw+"の歴史も気になる","文献漁りたくなった","研究者の意見も聞きたい","データと逆になることある","定義から確認したい","ここ諸説ある",pw+"目線だと違う","理論と実践の乖離がある"],
    "質問勢":[kw+"はどこが入口？","もう少し詳しく","生活とどう繋がる？","初心者でもわかる？",kw+"と"+pw+"の違いは？","具体例があると助かる","どこで勉強した？","参考になる本ある？","次回のテーマは？","もう一度説明して","なんで"+kw+"が大事なの？","実生活での使い方が知りたい","初心者向けにまとめて",pw+"との関連も教えて","聞いていい？"],
    "懐疑勢":[kw+"本当に合ってる？","別の見方もある","前提から確認したい","慎重に見た方がいい","反論もある","それだけじゃない","エビデンスは？",kw+"って定義が違う","100%そうとは言えない","ケースによる","留保が必要では","データ次第じゃない？","専門家も意見分かれる","前提が違うと結論変わる","鵜呑みにしない方がいい"],
    "応援勢":["いい流れ！",kw+"のとこ好き","続けてください","この調子で","配信待ってた","いつも楽しみ","頑張れ","最高","ずっと応援してる","次回も来る",pw+"の話もいつか","毎回楽しみ","今日も良かった","モチベ上がる","ありがとう"],
    "初心者勢":["なるほど！",kw+"初めて聞いた","わかりやすい","ありがとうございます","勉強になった","難しいけど面白い","もっと知りたい","メモしてます","初心者でもわかった",pw+"との違いがわかった","次回も見ます","初めて来たけどわかりやすい","好きになった","友達にも教えたい","全然知らなかった"],
    "ネタ勢":["草","天才か",kw+"クセ強い","これは名言","待って笑う","草不可避","天才の発想","ほんと？笑","やばすぎ","なんでそうなった","それで笑う","好きすぎる","伝説の配信","歴史に残る","最高すぎ"],
    "妄想勢":[kw+"から広がる世界が好き","次回の展開が気になる","別の角度で考えると","もしも"+kw+"がなかったら","10年後どうなってるんだろ",pw+"との掛け合わせが面白い","深掘りしたら無限に広がる","誰かと議論したくなった","自分なりの答え出てきた","違う分野にも繋がる","壮大だな","想像膨らむ","あとで調べる","もっと考えたい","ここから派生する話がある"],
    "開発者勢":["実装してみたくなった","アーキテクチャが気になる","データ構造的に面白い","自動化できそう",kw+"をシステムで表すと","API設計に応用できる","アルゴリズム的な視点が好き","ここ最適化できそう","ツール作りたい","ロジックが綺麗","エンジニアとして共感","コードで書くと面白い","スケールするかな","設計が大事","技術的負債になりそう"],
    "投資家勢":["リターン計算してた",kw+"のリスクは？","ポートフォリオ見直すか","タイミングが難しい","長期目線で見てる","短期と長期で違う","分散の重要性がわかる","NISAで試してる","損切りのタイミングって",pw+"との相関がある","経済指標と連動してる","配当狙いで","積み立て派なので","チャート見てた","ベンチマーク比較したい"]
  };
  return T[role]||T["共感勢"];
}
function buildComment(p){
  const recentTxt=typeof recentText==="function"?recentText():"";
  const kw=recentTxt.split(/[\s、。,，\n]+/).filter(w=>w.length>=2)[0]||(p.words||[])[0]||(typeof state!=="undefined"?(state.keyword||""):"")|| "今の話";
  const role=p.roleType||"共感勢";
  const name=p.name||"?";
  if(p.catchphrase&&(p.catchphrase.length>3)&&Math.random()<.38)return p.catchphrase.slice(0,40);
  const templates=_buildTemplates(role,kw,p);
  const text=_rbPick(templates,name);
  _rbTrack(name,text);
  return text.slice(0,40);
}
function pickPersona(){
  const list=personas.length?personas:defaultPersonas();
  if(!list.length)return defaultPersonas()[0];
  const text=typeof recentText==="function"?recentText():"";
  const scored=list.map(p=>({p,s:_relevanceScore(p,text)+Math.random()*.4})).sort((a,b)=>b.s-a.s);
  const topN=Math.min(scored.length,Math.max(3,Math.ceil(scored.length/2)));
  return scored[Math.floor(Math.random()*topN)].p;
}
function _relevanceScore(p,text){
  if(!text)return 0;
  const hay=[p.name,p.roleType,p.reactionPattern,p.catchphrase,...(p.words||[]),...(p.interests||[]),p.tone||""].join(" ").toLowerCase();
  let s=0;
  text.toLowerCase().split(/s|、|。|,/).filter(w=>w.length>=2).forEach(w=>{if(hay.includes(w))s+=2;});
  const sg=typeof STREAM_GENRES!=="undefined"?STREAM_GENRES:[];
  const pg=(p.genres||[]).concat(p.tags||[]);
  s+=pg.filter(g=>sg.includes(g)).length*5;
  const boosts=typeof _domainBoosts!=="undefined"?_domainBoosts:[[/経済|金利|インフレ|為替/,/経済|知識|分析|投資/,5],[/ゲーム|攻略|ボス/,/ゲーム|エンタメ|応援/,4],[/映画|監督|シーン/,/映画|シネマ/,4],[/本|小説|作者/,/読書|文学|知識/,4],[/漫画|キャラ|作画/,/漫画|アニメ/,4],[/投資|株|NISA/,/投資|知識|分析/,5],[/草|笑/,/ネタ|共感/,3]];
  boosts.forEach(([a,b,sc])=>{if(a.test(text.toLowerCase())&&b.test(hay))s+=sc;});
  return s;
}

let _commentFreqLevel=1;
function setFrequencyLevel(lv){
  _commentFreqLevel=lv;
  document.querySelectorAll(".freq-btn").forEach(b=>b.classList.toggle("active",parseInt(b.dataset.freq)===lv));
  const labels={1:"少",2:"普通",3:"多め",4:"激熱"};
  if(typeof setStatus==="function")setStatus("💬 頻度: "+(labels[lv]||lv));
  if(typeof commentsEnabled!=="undefined"&&commentsEnabled){if(typeof commentTimer!=="undefined")clearTimeout(commentTimer);if(typeof scheduleComment==="function")scheduleComment();}
}
// Frequency-scaled interval
const _baseInterval=intervalRange;
function intervalRange(){const[mn,mx]=_baseInterval();const d=_commentFreqLevel||1;return[Math.max(700,Math.round(mn/d)),Math.max(1200,Math.round(mx/d))];}
