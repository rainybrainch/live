<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB-Tree投資</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/rainybrainch/rb-tree-archive@master/seeds/investment-data.js"></script>
<style>
:root {
  --bg:      #040a06;
  --line:    rgba(87,200,124,.18);
  --text:    #c8f0d8;
  --muted:   rgba(200,240,216,.52);
  --faint:   rgba(200,240,216,.3);
  --acc:     #57c87c;
  --acc2:    #1a5a30;
  --good:    #7ec87a;
  --danger:  #e07870;
  --font:    "Noto Sans JP", sans-serif;
  --serif:   "Noto Serif JP", serif;
  color-scheme: dark;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}
button,input,select,textarea{font:inherit;color:inherit;}
button{min-height:36px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.07);padding:7px 10px;cursor:pointer;transition:background .12s;}
button:hover{background:rgba(255,255,255,.13);}
button.primary{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.16);}
button.good{border-color:rgba(126,200,122,.5);background:rgba(126,200,122,.14);}
button.warn{border-color:rgba(224,120,112,.5);background:rgba(224,120,112,.14);}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:rgba(0,0,0,.3);padding:8px 10px;outline:none;}
textarea{min-height:70px;resize:vertical;line-height:1.55;}
label{color:var(--muted);font-size:11px;font-weight:900;}

/* ── STAGE ── */
.stage{
  position:fixed;inset:0;
  background:
    linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px) 0 0/56px 56px,
    linear-gradient(0deg, rgba(201,168,76,.03) 1px,transparent 1px) 0 0/56px 56px,
    radial-gradient(ellipse at 15% 80%, rgba(201,168,76,.12),transparent 36rem),
    radial-gradient(ellipse at 85% 20%, rgba(200,168,76,.08),transparent 30rem),
    linear-gradient(160deg,#07090a 0%,#060a04 60%,#090803 100%);
  overflow:hidden;
}
/* scanning line */
.stage::before{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(201,168,76,.015) 2px,rgba(201,168,76,.015) 4px);
  pointer-events:none;z-index:0;
}

/* ── BRAND (top-left) ── */
.brand{
  position:absolute;top:22px;left:26px;z-index:10;
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border:1px solid rgba(201,168,76,.2);border-radius:10px;
  background:rgba(6,10,4,.74);backdrop-filter:blur(14px);
  box-shadow:0 4px 24px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.06);
}
.brand-mark{
  width:32px;height:32px;display:grid;place-items:center;border-radius:8px;
  background:linear-gradient(135deg,#8a6f2a,#c9a84c);
  font-size:15px;box-shadow:0 2px 10px rgba(201,168,76,.3);
}
.brand strong{display:block;font-size:12px;line-height:1;letter-spacing:.04em;font-family:var(--serif);}
.brand span{display:block;color:var(--muted);font-size:9px;font-weight:700;margin-top:2px;letter-spacing:.14em;}

/* ── STAGE BADGE (top-center) ── */
.stage-badge{
  position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;align-items:center;gap:12px;
  padding:9px 20px;border:1px solid rgba(201,168,76,.22);border-radius:999px;
  background:rgba(6,10,4,.74);backdrop-filter:blur(14px);
}
.stage-icon{font-size:20px;line-height:1;}
.stage-name{font-family:var(--serif);font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--acc);}
.stage-en{font-size:9px;color:var(--muted);letter-spacing:.14em;margin-top:1px;}
.on-air-dot{
  width:7px;height:7px;border-radius:999px;background:#ff4040;
  animation:blink 1s ease-in-out infinite;display:none;
}
body.recording .on-air-dot{display:block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── TIMER (top-right) ── */
.timer-wrap{
  position:absolute;top:22px;right:26px;z-index:10;
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border:1px solid rgba(255,255,255,.1);border-radius:999px;
  background:rgba(6,10,4,.74);backdrop-filter:blur(14px);
}
.timer-time{font-size:clamp(18px,1.6vw,28px);font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:.08em;}
body.recording .timer-time{color:var(--acc);text-shadow:0 0 18px rgba(201,168,76,.35);}
.timer-btn{
  width:26px;height:26px;min-height:26px;padding:0;
  display:grid;place-items:center;border-radius:7px;font-size:12px;
  border-color:rgba(201,168,76,.3);color:var(--muted);
}
.timer-btn.running{background:linear-gradient(180deg,#f0d890,var(--acc));border-color:var(--acc);color:#030800;box-shadow:0 0 14px rgba(201,168,76,.28);}

/* ── KEYWORD CARD (top-left) ── */
.keyword-card{
  position:absolute;left:26px;top:22px;width:min(400px,38vw);
  padding:14px 18px;
  border-left:4px solid var(--acc);
  border-top:1px solid rgba(255,255,255,.1);
  border-right:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06);
  border-radius:8px;
  background:linear-gradient(100deg,rgba(6,10,4,.9),rgba(6,10,4,.55));
  backdrop-filter:blur(14px);
  box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.06);
  z-index:5;
}
.kicker{
  color:var(--acc);font-size:10px;font-weight:900;letter-spacing:.16em;
  text-transform:uppercase;margin-bottom:6px;
  display:flex;align-items:center;gap:7px;
}
.kicker::before{content:"";width:5px;height:5px;border-radius:999px;background:var(--acc);box-shadow:0 0 6px var(--acc);flex-shrink:0;}
.keyword-main{font-family:var(--serif);font-size:clamp(22px,2.8vw,42px);line-height:1.1;font-weight:700;}
.keyword-sub{margin-top:4px;color:rgba(240,232,200,.6);font-size:clamp(10px,.9vw,13px);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.keyword-agenda{
  margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(201,168,76,.15);
  display:flex;flex-direction:column;gap:3px;
}
.agenda-label{
  font-size:9px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(201,168,76,.55);
}
.agenda-text{
  font-size:clamp(11px,1vw,14px);color:var(--text);line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.keyword-footer{margin-top:10px;display:flex;align-items:center;gap:8px;}
.archive-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 11px;border-radius:999px;
  border:1px solid rgba(201,168,76,.28);background:rgba(201,168,76,.08);
  color:var(--acc);font-size:10px;font-weight:900;letter-spacing:.08em;
  cursor:pointer;transition:background .15s;text-decoration:none;
}
.archive-link:hover{background:rgba(201,168,76,.2);}

/* ── COMMENTS (both sides) ── */
.comments{
  /* 右側: タイトルカードなし → 上から流れる */
  position:absolute;
  right:28px;top:80px;bottom:130px;
  width:min(280px,20vw);
  overflow:hidden;pointer-events:none;z-index:2;
}
.comments-left{
  /* 左側: タイトルカードの下から流れる */
  right:auto;left:28px;
  top:290px;
}
.comments-left .comment{
  border-left:none;
  border-right:3px solid var(--uc);
}
.comment{
  --uc:var(--acc);
  position:absolute;left:0;right:0;bottom:0;
  padding:10px 12px;border-radius:11px;
  background:rgba(6,10,4,.8);
  border:1px solid rgba(255,255,255,.1);
  border-left:3px solid var(--uc);
  animation:rise var(--life,16s) linear forwards;
  backdrop-filter:blur(12px);
  box-shadow:0 6px 20px rgba(0,0,0,.3);
}
.comment .user{color:var(--uc);font-size:clamp(10px,.8vw,12px);font-weight:900;margin-right:6px;}
.comment .tag{color:var(--muted);font-size:9px;font-weight:900;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:1px 5px;margin-right:6px;}
.comment .text{display:block;margin-top:4px;font-size:clamp(12px,1.1vw,16px);line-height:1.52;font-weight:700;overflow-wrap:anywhere;}
@keyframes rise{0%{opacity:0;transform:translateY(20px) scale(.97);}8%{opacity:1;transform:none;}80%{opacity:1;}100%{opacity:0;transform:translateY(calc(-100vh + 50px));}}

/* ── CAPTION (lower-third) ── */
.caption{
  position:absolute;left:0;right:0;bottom:0;z-index:6;
  /* キャラゾーン（左右約250px）を避ける */
  padding:0 clamp(24px, 22vw, 280px) 16px;
  display:flex;justify-content:center;align-items:flex-end;
  pointer-events:none;
}
.caption::before{
  content:"";position:absolute;left:0;right:0;bottom:0;height:160px;
  background:linear-gradient(to top,rgba(6,10,4,.92),transparent);
  z-index:-1;
}
.caption-card{
  width:100%;
  display:flex;align-items:stretch;
  border-radius:12px;overflow:hidden;
  border:1px solid rgba(201,168,76,.2);
  background:rgba(6,10,4,.88);
  backdrop-filter:blur(20px);
  box-shadow:0 10px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(201,168,76,.1);
  min-height:52px;
}
.caption-bar{width:4px;flex-shrink:0;background:linear-gradient(180deg,var(--acc),#8a6f2a);animation:borderFlow 3s ease-in-out infinite alternate;}
@keyframes borderFlow{0%{opacity:.6;}100%{opacity:1;filter:brightness(1.3);}}
.caption-who{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:62px;border-right:1px solid rgba(255,255,255,.07);padding:8px;}
.caption-who-dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.18);transition:background .3s,box-shadow .3s;}
.caption-who-dot.host{background:var(--acc);box-shadow:0 0 12px rgba(201,168,76,.55);}
.caption-who-label{font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,232,200,.38);transition:color .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px;text-align:center;}
.caption-who-label.host{color:var(--acc);}
.caption-text{flex:1;padding:10px 18px 10px 14px;display:flex;flex-direction:column;gap:5px;overflow-wrap:break-word;}
.caption-line{line-height:1.45;font-weight:800;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.caption-line.c-current{font-size:clamp(15px,1.5vw,25px);opacity:1;}
.caption-line.c-prev1{font-size:clamp(12px,1.2vw,20px);opacity:0.5;}
.caption-line.c-prev2{font-size:clamp(10px,.98vw,16px);opacity:0.26;}
.caption-line.c-interim{font-size:clamp(14px,1.4vw,24px);opacity:0.5;font-style:italic;}
@keyframes captionIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.caption-line.c-flash{animation:captionIn .28s ease forwards;}

/* ── STAGE CONTROLS (bottom-right) ── */
.sc-btns{position:absolute;bottom:22px;right:22px;display:flex;gap:6px;z-index:8;}
.sc-btn{
  width:34px;height:34px;min-height:34px;padding:0;
  display:grid;place-items:center;border-radius:8px;
  border:1px solid rgba(255,255,255,.14);background:rgba(6,10,4,.62);backdrop-filter:blur(10px);
  color:var(--muted);font-size:14px;cursor:pointer;transition:all .15s;
}
.sc-btn:hover{background:rgba(201,168,76,.18);color:var(--text);}
.sc-btn.active{background:rgba(201,168,76,.22);border-color:var(--acc);color:var(--acc);}

/* ── DOCK ── */
.dock{
  position:fixed;left:50%;top:14px;transform:translateX(-50%);
  width:min(480px,calc(100vw - 28px));max-height:calc(100vh - 28px);overflow:auto;
  user-select:none;min-width:240px;min-height:80px;
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015)),rgba(6,10,4,.95);
  backdrop-filter:blur(18px);z-index:20;
  box-shadow:0 28px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.18) transparent;
}
/* リサイズハンドル */
.dock-resize{
  height:14px;cursor:ns-resize;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.06);
  position:relative;
}
.dock-resize::before{content:"";width:32px;height:3px;border-radius:999px;background:rgba(255,255,255,.2);}
.dock-resize-corner{
  position:absolute;right:0;top:0;bottom:0;
  width:18px;cursor:ew-resize;
}
/* セクション折りたたみ */
.section-title{cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:900;padding-right:4px;}
.section-toggle{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;line-height:1;pointer-events:none;}
.section.collapsed .section-toggle{transform:rotate(-90deg);}
/* DOM操作不要 — 直接子要素のうちタイトル以外を隠す */
.section.collapsed > *:not(.section-title){display:none;}
body.panel-hidden .dock{display:none;}

/* ── DOCK ヘッダー ── */
.dock-head{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:12px 14px 10px;
  border-bottom:1px solid rgba(201,168,76,.18);
  background:linear-gradient(135deg,rgba(201,168,76,.16) 0%,rgba(201,168,76,.06) 50%,transparent 100%);
  cursor:grab;position:relative;
}
.dock-head::after{
  content:"";position:absolute;bottom:0;left:14px;right:14px;
  height:1px;background:linear-gradient(90deg,rgba(201,168,76,.35),transparent);
}
.dock-head:active{cursor:grabbing;}
.dock-title{flex:1;min-width:0;}
.dock-title strong{display:block;font-size:14px;font-weight:900;font-family:var(--serif);letter-spacing:.03em;}
.dock-title span{display:block;color:var(--muted);font-size:9px;margin-top:2px;letter-spacing:.14em;text-transform:uppercase;}
/* マイク中インジケーター */
.mic-live-dot{
  width:7px;height:7px;border-radius:50%;background:#ff4040;
  animation:blink 1s ease-in-out infinite;display:none;margin-right:2px;
}
body.listening .mic-live-dot{display:inline-block;}
body.listening #micBtn{border-color:rgba(126,200,122,.7);background:rgba(126,200,122,.22);color:var(--good);}

/* ── DOCK BODY ── */
.dock-body{padding:10px 12px 4px;display:grid;gap:8px;}

/* ── SECTION 共通 ── */
.section{
  border:1px solid rgba(255,255,255,.07);
  border-left:3px solid transparent;
  border-radius:10px;
  background:rgba(255,255,255,.03);
  padding:12px;display:grid;gap:10px;
  transition:background .15s;
}
.section:hover{background:rgba(255,255,255,.045);}
.section.collapsed{background:rgba(255,255,255,.02);}
/* セクション色分け */
.section:nth-child(1){border-left-color:#c9a84c;}  /* 🌱 学習設定 — ゴールド */
.section:nth-child(2){border-left-color:#5aafcf;}  /* ⏱ タイマー   — ブルー */
.section:nth-child(3){border-left-color:#7ec87a;}  /* 🎙 文字起こし — グリーン */
.section:nth-child(4){border-left-color:#e8a054;}  /* 🌲 Archive   — オレンジ */
/* セクションタイトル */
.section-title{
  display:flex;align-items:center;gap:9px;
  font-size:12px;font-weight:900;letter-spacing:.06em;
  cursor:pointer;
}
.section-title:hover .section-toggle{opacity:1;}
.section-toggle{opacity:.5;}
/* ステップ番号: セクション色に対応 */
.section:nth-child(1) .step{background:#c9a84c;color:#1a1000;}
.section:nth-child(2) .step{background:#5aafcf;color:#001a22;}
.section:nth-child(3) .step{background:#7ec87a;color:#001a00;}
.section:nth-child(4) .step{background:#e8a054;color:#1a0800;}
.step{width:22px;height:22px;display:grid;place-items:center;border-radius:999px;font-size:11px;font-weight:900;flex-shrink:0;}

/* ── FORM ELEMENTS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.wide{grid-column:1/-1;}
.field{display:grid;gap:4px;}
input,select,textarea{transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{border-color:rgba(201,168,76,.55);box-shadow:0 0 0 3px rgba(201,168,76,.08);}
.log{
  color:var(--muted);font-size:11px;line-height:1.6;
  border:1px solid var(--line);border-radius:8px;
  padding:8px 10px;background:rgba(0,0,0,.25);
  max-height:160px;overflow:auto;white-space:pre-wrap;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.15) transparent;
}

/* ── STAGE SELECTOR ── */
.stage-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.stage-sel-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px;border-radius:9px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);cursor:pointer;font-size:10px;font-weight:900;
  color:var(--muted);transition:all .15s;
}
.stage-sel-btn:hover{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--text);}
.stage-sel-btn.active{
  border-color:rgba(201,168,76,.65);
  background:linear-gradient(160deg,rgba(201,168,76,.22),rgba(201,168,76,.1));
  color:var(--acc);
  box-shadow:0 2px 12px rgba(201,168,76,.18);
}
.stage-sel-btn .ico{font-size:17px;}

/* ── ARCHIVE SECTION ── */
.archive-form{
  border:1px solid rgba(201,168,76,.22);border-radius:9px;
  background:linear-gradient(160deg,rgba(201,168,76,.07),rgba(201,168,76,.02));
  padding:12px;display:grid;gap:9px;
}
.archive-form-title{
  font-size:11px;font-weight:900;color:var(--acc);
  letter-spacing:.06em;display:flex;align-items:center;gap:7px;
}
.archive-form-title::before{content:"🌲";font-size:13px;}

/* Open tab */
.open-tab{
  position:fixed;right:14px;bottom:14px;z-index:40;
  display:none;align-items:center;gap:8px;
  min-height:44px;padding:0 15px;
  border:1px solid rgba(201,168,76,.3);border-radius:10px;
  background:rgba(6,10,4,.9);backdrop-filter:blur(16px);
  font-weight:900;font-size:13px;
  box-shadow:0 14px 36px rgba(0,0,0,.46);
}
body.panel-hidden .open-tab{display:inline-flex;}
.open-tab-dot{width:8px;height:8px;border-radius:999px;background:var(--acc);box-shadow:0 0 0 3px rgba(201,168,76,.18);}

/* Status toast */
.status-toast{
  position:absolute;bottom:88px;left:50%;transform:translateX(-50%);
  padding:6px 16px;border-radius:999px;
  background:rgba(6,10,4,.9);border:1px solid rgba(201,168,76,.3);
  color:var(--muted);font-size:11px;font-weight:900;
  white-space:nowrap;pointer-events:none;z-index:20;
  opacity:0;transition:opacity .25s;
}
.status-toast.show{opacity:1;}

/* OBS mode */
body.obs-mode .dock,body.obs-mode .open-tab,body.obs-mode .sc-btns{display:none!important;}

/* ── SEED PICKER ── */
.seed-level-hd{
  font-size:8px;font-weight:900;letter-spacing:.12em;color:var(--faint);
  margin:8px 0 4px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;cursor:pointer;
}
.seed-level-hd::after{content:"▾";font-size:10px;margin-left:auto;transition:transform .15s;}
.seed-level-hd.collapsed::after{transform:rotate(-90deg);}
.seed-pick-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px;}
.seed-pick-grid.hidden{display:none;}
.seed-pick-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 2px;border-radius:7px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);cursor:pointer;font-size:9px;font-weight:900;
  color:var(--muted);transition:all .12s;text-align:center;line-height:1.3;
}
.seed-pick-btn:hover{background:rgba(201,168,76,.1);color:var(--text);}

function hydrate(){
  $("keywordInput").value = state.keyword||"";

function bind(){
  $("hideDock")?.addEventListener("click",()=>document.body.classList.add("panel-hidden"));
  $("openDock")?.addEventListener("click",()=>document.body.classList.remove("panel-hidden"));
  $("applyBtn")?.addEventListener("click",applyStage);
  $("keywordInput")?.addEventListener("input",()=>{state.keyword=$("keywordInput").value;save();});
  $("subInput")?.addEventListener("input",()=>{state.sub=$("subInput").value;save();});
  $("stageFullscreenBtn")?.addEventListener("click",toggleFullscreen);
  $("dockFullscreenBtn")?.addEventListener("click",toggleFullscreen);

  // ── セクション折りたたみ（DOM操作なし・クラストグルのみ） ──
  document.querySelectorAll(".section").forEach(sec=>{
    const title=sec.querySelector(".section-title");
    if(!title) return;
    const tog=document.createElement("span");
    tog.className="section-toggle"; tog.textContent="▼";
    title.appendChild(tog);
    title.addEventListener("click",e=>{
      if(e.target.closest("button,input,select,textarea,a,label")) return;
      sec.classList.toggle("collapsed");
    });
  });

  // ── Dock リサイズ ──
  (function(){
    const dock=$("dock");
    if(!dock) return;
    // 高さリサイズ
    const rh=$("dockResizeH");
    if(rh){
      let ry=0, rh0=0;
      rh.addEventListener("mousedown",e=>{
        ry=e.clientY; rh0=dock.offsetHeight; e.preventDefault();
        const onMove=e2=>{
          const h=Math.max(120,Math.min(window.innerHeight-20,rh0+(e2.clientY-ry)));
          dock.style.maxHeight=h+"px";
        };
        const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
        document.addEventListener("mousemove",onMove);
        document.addEventListener("mouseup",onUp);
      });
    }
    // 幅リサイズ（右端）
    const rw=$("dockResizeW");
    if(rw){
      let rx=0, rw0=0;
      rw.addEventListener("mousedown",e=>{
        rx=e.clientX; rw0=dock.offsetWidth; e.stopPropagation(); e.preventDefault();
        const onMove=e2=>{
          const w=Math.max(240,Math.min(window.innerWidth-20,rw0+(e2.clientX-rx)));
          dock.style.width=w+"px";
        };
        const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
        document.addEventListener("mousemove",onMove);
        document.addEventListener("mouseup",onUp);
      });
    }
  })();

  // ── Dock ドラッグ ──
  (function(){
    const dock=$("dock"), head=$("dock")?.querySelector(".dock-head");
    if(!dock||!head) return;
    let dragging=false, ox=0, oy=0;
    head.addEventListener("mousedown",e=>{
      if(e.target.closest("button")) return;
      dragging=true;
      const r=dock.getBoundingClientRect();
      dock.style.transform="none";
      dock.style.left=r.left+"px"; dock.style.top=r.top+"px";
      ox=e.clientX-r.left; oy=e.clientY-r.top;
      e.preventDefault();
    });
    document.addEventListener("mousemove",e=>{
      if(!dragging) return;
      const maxX=window.innerWidth-dock.offsetWidth;
      const maxY=window.innerHeight-dock.offsetHeight;
      dock.style.left=Math.max(0,Math.min(maxX,e.clientX-ox))+"px";
      dock.style.top=Math.max(0,Math.min(maxY,e.clientY-oy))+"px";
    });
    document.addEventListener("mouseup",()=>{dragging=false;});
    head.addEventListener("touchstart",e=>{
      if(e.target.closest("button")) return;
      const t=e.touches[0], r=dock.getBoundingClientRect();
      dock.style.transform="none";
      dock.style.left=r.left+"px"; dock.style.top=r.top+"px";
      ox=t.clientX-r.left; oy=t.clientY-r.top;
    },{passive:true});
    document.addEventListener("touchmove",e=>{
      if(!head.matches(":active")) return;
      const t=e.touches[0];
      dock.style.left=Math.max(0,Math.min(window.innerWidth-dock.offsetWidth,t.clientX-ox))+"px";
      dock.style.top=Math.max(0,Math.min(window.innerHeight-dock.offsetHeight,t.clientY-oy))+"px";
    },{passive:true});
  })();
  $("stageTimerToggle")?.addEventListener("click",toggleTimer);
  $("stageTimerReset")?.addEventListener("click",resetTimer);
  $("timerPreset")?.addEventListener("change",()=>{$("timerMinutes").value=$("timerPreset").value;setTimer();});
  $("timerSetBtn")?.addEventListener("click",setTimer);
  $("timerStartBtn")?.addEventListener("click",toggleTimer);
  $("timerResetBtn")?.addEventListener("click",resetTimer);
  $("micBtn")?.addEventListener("click",toggleMic);
  $("clearTranscriptBtn")?.addEventListener("click",()=>{
    captionLines=[];lastKey="";state.transcript=[];save();
    $("transcriptLog").textContent="まだ文字起こしはありません。";
    renderCaption();
  });
  $("commentBtn")?.addEventListener("click",()=>spawnComment());
  $("manualTranscript")?.addEventListener("keydown",e=>{
    if(e.key==="Enter"){const v=$("manualTranscript").value.trim();if(!v)return;$("manualTranscript").value="";pushTranscript(v);spawnComment();e.preventDefault();}
  });
  $("geminiSaveBtn")?.addEventListener("click",()=>{
    const k=$("geminiKey")?.value.trim();
    const st=$("geminiStatus");
    if(!k){if(st){st.textContent="キーが入力されていません";st.style.color="var(--danger)";}return;}
    localStorage.setItem(GEMINI_KEY_STORE,k);
    state.commentEngine="gemini";
    if($("commentEngine"))$("commentEngine").value="gemini";
    save();scheduleComment();
    if(st){st.textContent="✓ 保存済み・Gemini AI で動作中";st.style.color="var(--good)";}
    setStatus("Gemini API キーを保存しました");
  });
  $("commentSpeed")?.addEventListener("change",()=>{state.commentSpeed=$("commentSpeed").value;save();scheduleComment();});
  $("commentEngine")?.addEventListener("change",()=>{state.commentEngine=$("commentEngine").value;save();});
  $("syncPersonaBtn")?.addEventListener("click",()=>syncPersonas(false));
  $("archiveSaveBtn")?.addEventListener("click",saveToArchive);

  // Stage selector
  document.querySelectorAll(".stage-sel-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".stage-sel-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      state.currentStage=btn.dataset.stage;
      save();
      updateStageBadge(state.currentStage);
    });
  });

  document.addEventListener("fullscreenchange",()=>{
    const fs=!!document.fullscreenElement;
    if($("stageFullscreenBtn"))$("stageFullscreenBtn").textContent=fs?"✕":"⛶";
    const db=$("dockFullscreenBtn");
    if(db){db.textContent=fs?"✕ 全画面解除":"⛶ 全画面";db.className=fs?"warn":"";}
  });
  document.addEventListener("keydown",e=>{
    if(e.key==="f"||e.key==="F"){if(document.activeElement?.tagName!=="INPUT"&&document.activeElement?.tagName!=="TEXTAREA")toggleFullscreen();}
    if(e.key==="Escape"&&!document.fullscreenElement)document.body.classList.remove("panel-hidden");
  });
}

// ── Seed Picker ──
function renderSeedPicker(){
  const container=$("seedPicker");
  if(!container)return;
  const levels=["ROOT","TRUNK","BRANCH","CROWN","FOREST"];
  let html="";
  levels.forEach(lv=>{
    const seeds=SEEDS_DATA.filter(s=>s.level===lv);
    const hasActive=seeds.some(s=>s.num===state.selectedSeed);
    const col=(!hasActive&&lv!=="ROOT")?"collapsed":"";
    html+=`<div class="seed-level-hd ${col}" data-lv="${lv}">${lv}</div>`;
    html+=`<div class="seed-pick-grid ${col?"hidden":""}">`;
    seeds.forEach(s=>{
      const active=state.selectedSeed===s.num?"active":"";
      html+=`<button class="seed-pick-btn ${active}" data-num="${s.num}" type="button"><span class="seed-pick-num">${String(s.num).padStart(2,"0")}</span>${s.name}</button>`;
    });
    html+="</div>";
  });
  container.innerHTML=html;
  container.querySelectorAll(".seed-pick-btn").forEach(btn=>{
    btn.addEventListener("click",()=>selectSeed(Number(btn.dataset.num)));
  });
  container.querySelectorAll(".seed-level-hd").forEach(hd=>{
    hd.addEventListener("click",()=>{
      hd.classList.toggle("collapsed");
      const grid=hd.nextElementSibling;
      if(grid) grid.classList.toggle("hidden");
    });
  });
  updateSeedUI();
}

function selectSeed(num){
  state.selectedSeed=state.selectedSeed===num?null:num;
  save();
  renderSeedPicker();
  if(state.selectedSeed){
    const s=SEEDS_DATA.find(x=>x.num===state.selectedSeed);
    if(s){
      $("keywordInput").value=s.kw; state.keyword=s.kw;
      $("subInput").value=s.sub;   state.sub=s.sub;
      applyStage(); save();
    }
  } else {
    updateSeedUI();
  }
}

function updateSeedUI(){

  if(!s){ ref.classList.remove("show"); ref.innerHTML=""; return; }

  const sk="E"+String(s.num).padStart(3,"0");
  const db=window.INVESTMENT_DB&&window.INVESTMENT_DB[sk];
  const noteKey=`rbt_inv_notes_${sk}`;
  let notes={};
  try{ notes=JSON.parse(localStorage.getItem(noteKey)||"{}"); }catch{}

  const isCollapsed = state[`ref_collapsed_${sk}`]||false;
  let html=`<div class="src-hd" onclick="toggleRef('${sk}')" style="cursor:pointer;">
    <span class="src-badge">${sk}</span>
    <span class="src-level">${s.level}</span>
    <span style="font-size:10px;color:var(--muted);margin-left:6px;">${s.name}</span>

  if(db?.tagline){
    html+=`<div class="src-def">${xss(db.tagline)}</div>`;
  }
  if(db?.rootQuestions?.length){
    html+=`<div class="src-sec"><div class="src-lbl">Root Question</div><div class="src-qs">`;
    db.rootQuestions.slice(0,3).forEach(q=>{ html+=`<div class="src-q">${xss(q)}</div>`; });
    html+=`</div></div>`;
  }
  if(db?.glossTerms?.length){
    html+=`<div class="src-sec"><div class="src-lbl">キーワード</div><div class="src-kws">`;
    db.glossTerms.slice(0,7).forEach(t=>{
      const w=typeof t==="string"?t:t.word;

    });

  }
  html+=`<div class="src-sec"><div class="src-lbl">🍃 Leaf — 自分の言葉でまとめる</div>
    <textarea class="src-leaf" rows="3" placeholder="引用禁止。自分の理解を書く…" oninput="saveLeaf('${sk}',this.value)">${xss(notes._leaf||"")}</textarea>

function saveNote(sk,i,val){
  const noteKey=`rbt_inv_notes_${sk}`;
  let notes={};
  try{ notes=JSON.parse(localStorage.getItem(noteKey)||"{}"); }catch{}
  notes[i]=val;
  try{ localStorage.setItem(noteKey,JSON.stringify(notes)); }catch{}
}

function saveLeaf(sk,val){
  const noteKey=`rbt_inv_notes_${sk}`;
  let notes={};
  try{ notes=JSON.parse(localStorage.getItem(noteKey)||"{}"); }catch{}
  notes._leaf=val;
  try{ localStorage.setItem(noteKey,JSON.stringify(notes)); }catch{}
}

function saveSeedToArchive(sk){
  const noteKey=`rbt_inv_notes_${sk}`;
  let notes={};
  try{ notes=JSON.parse(localStorage.getItem(noteKey)||"{}"); }catch{}
  const db=window.INVESTMENT_DB&&window.INVESTMENT_DB[sk];
  const seedNum=parseInt(sk.replace("E",""),10);
  const s=SEEDS_DATA.find(x=>x.num===seedNum);
  if(!s){setStatus("Seed データが見つかりません");return;}
  const stopText=Object.entries(notes).filter(([k])=>k!=="leaf"&&k!=="l_leaf"&&k!=="_leaf").map(([i,v])=>{
    const pt=db?.stopPoints?.[i]||`Stop ${parseInt(i)+1}`;
    return v?`[${pt}]\n${v}`:"";
  }).filter(Boolean).join("\n\n");
  const body=[notes._leaf,stopText].filter(Boolean).join("\n---\n")||`${sk} ${s.name}の配信メモ`;
  const branches=(db?.glossTerms||[]).map(t=>typeof t==="string"?t:t.word).slice(0,8);
  if(!branches.includes(s.kw)) branches.unshift(s.kw);
  const entry={
    id:`rbt_${sk}_stream_${Date.now()}`,
    category:"economics",stage:state.currentStage,
    keyword:s.kw, body, branches, sources:[],
    session:`RB-Tree Economics 配信 — ${s.name}`,
    sessionUrl:"",
    createdAt:new Date().toISOString().slice(0,10),
    updatedAt:new Date().toISOString().slice(0,10)
  };
  try{
    const arr=JSON.parse(localStorage.getItem(ARCHIVE_KEY)||"[]");
    const idx=arr.findIndex(x=>x.id?.startsWith(`rbt_${sk}_stream_`));
    if(idx>=0) arr[idx]=entry; else arr.unshift(entry);
    localStorage.setItem(ARCHIVE_KEY,JSON.stringify(arr));
    setStatus(`🌱「${s.name}」をArchiveに保存しました`);
  }catch{ setStatus("Archive保存に失敗しました"); }
}

function toggleRef(sk){
  const body=document.getElementById("src-body-"+sk);
  const isNowHidden=body?.style.display==="none";
  if(body) body.style.display=isNowHidden?"":"none";
  state["ref_collapsed_"+sk]=!isNowHidden;
  const hd=body?.previousElementSibling;
  if(hd){
    const spans=hd.querySelectorAll("span");
    const chev=spans[spans.length-1];
    if(chev) chev.textContent=isNowHidden?"▼":"▶";
  }
}

function saveToArchive(){

    id:"rbt_"+Date.now()+"_"+Math.random().toString(36).slice(2,5),

    keyword:kw,body,branches,sources:[],
    session:"RB-Tree Economics",sessionUrl:"",

  }catch{setStatus("Archive への保存に失敗しました");}
}

// ── Timer ──
function normTimer(t){
  const dur=Math.max(60,parseInt(t?.durationSec||3600)||3600);
  const end=parseInt(t?.endAt||0)||0;
  const run=Boolean(t?.running&&end>Date.now());
  const rem=run?Math.max(0,Math.ceil((end-Date.now())/1000)):Math.max(0,Math.min(dur,parseInt(t?.remainingSec||dur)||dur));
  return{durationSec:dur,remainingSec:rem,running:run,endAt:run?end:0};
}
function setTimer(){
  const m=Math.max(1,Math.min(240,parseInt($("timerMinutes").value||"60")||60));
  state.timer={durationSec:m*60,remainingSec:m*60,running:false,endAt:0};save();updateClock();
}
function toggleTimer(){
  state.timer=normTimer(state.timer);
  if(state.timer.running){state.timer.running=false;state.timer.endAt=0;}
  else{
    if(state.timer.remainingSec<=0)state.timer.remainingSec=state.timer.durationSec;
    state.timer.running=true;state.timer.endAt=Date.now()+state.timer.remainingSec*1000;
  }
  save();updateClock();
}
function resetTimer(){
  state.timer=normTimer(state.timer);
  state.timer.running=false;state.timer.endAt=0;state.timer.remainingSec=state.timer.durationSec;
  save();updateClock();
}
function updateClock(){
  state.timer=normTimer(state.timer);
  if(state.timer.running&&state.timer.remainingSec<=0){state.timer.running=false;state.timer.endAt=0;}
  $("timerTime").textContent=fmt(state.timer.remainingSec);
  $("timerDisplay")?.classList.toggle("running",state.timer.running);
  document.body.classList.toggle("recording",state.timer.running);
  if($("timerStartBtn"))$("timerStartBtn").textContent=state.timer.running?"停止":"開始";
  if($("stageTimerToggle")){
    $("stageTimerToggle").textContent=state.timer.running?"Ⅱ":"▶";
    $("stageTimerToggle").classList.toggle("running",state.timer.running);
  }
}
function fmt(sec){const n=Math.max(0,parseInt(sec)||0),h=Math.floor(n/3600),m=Math.floor((n%3600)/60),s=n%60;return h>0?`${h}:${p(m)}:${p(s)}`:`${p(m)}:${p(s)}`;}
function p(n){return String(n).padStart(2,"0");}
function startClock(){updateClock();setInterval(updateClock,1000);}
function toggleFullscreen(){
  if(document.fullscreenElement){
    document.exitFullscreen?.();
  } else {
    (document.documentElement.requestFullscreen?.() || Promise.resolve())
      .catch(()=>{});
  }
}

// ── Caption (multi-line) ──
function renderCaption(interim){
  const el=$("caption");
  if(!captionLines.length&&!interim){
    el.innerHTML='<span class="caption-line c-current">「マイク開始」で文字起こしが始まります</span>';
    return;
  }
  el.innerHTML="";
  const show=captionLines.slice(-3);
  const clsMap=["c-prev2","c-prev1","c-current"];
  show.forEach((text,i)=>{
    const offset=show.length-1-i;
    const cls=clsMap[Math.min(i,2)];
    const span=document.createElement("span");
    span.className="caption-line "+cls;
    if(offset===0&&!interim)span.classList.add("c-flash");
    span.textContent=text;
    el.appendChild(span);
  });
  if(interim){
    const span=document.createElement("span");
    span.className="caption-line c-interim";
    span.textContent=interim;
    el.appendChild(span);
  }
}

function pushTranscript(text){
  const clean=text.replace(/\s+/g," ").replace(/([。、！？!?])\s+/g,"$1").replace(/^(えー|えっと|あの|その|まあ)\s+/g,"").trim();
  if(!clean)return;
  const key=clean.replace(/[\s、。,.!！?？]/g,"");
  if(!key||key===lastKey)return;
  lastKey=key;
  if(!state.transcript)state.transcript=[];
  state.transcript.unshift({text:clean,at:Date.now()});
  state.transcript=state.transcript.slice(0,40);save();
  captionLines.push(clean);
  if(captionLines.length>6)captionLines.shift();
  renderCaption();
  $("transcriptLog").textContent=state.transcript.slice(0,10).map(x=>"▸ "+x.text).join("\n");
  // Auto-fill archive keyword from transcript
  if(!$("archiveKw")?.value&&state.keyword&&state.keyword!=="今日のキーワード"){
    $("archiveKw").value=state.keyword;
  }
  if(clean.length>=14)setTimeout(spawnComment,900);
}
function queueTranscript(text){
  transcriptBuf=[transcriptBuf,text].filter(Boolean).join(" ").replace(/\s+/g," ").trim();
  clearTimeout(flushTimer);
  flushTimer=setTimeout(()=>{const t=transcriptBuf;transcriptBuf="";if(t)pushTranscript(t);},820);
}
function recentText(){return(state.transcript||[]).slice(0,6).map(x=>x.text).reverse().join("\n").slice(-1200);}

// ── Mic ──
function toggleMic(){
  if(!SR){setStatus("Chrome/Edgeの音声認識が必要です");return;}
  if(listening){
    clearTimeout(restartTimer);listening=false;try{recognition.stop();}catch{}stopMeter();
    $("micBtn").textContent="マイク開始";$("micBtn").className="good";return;
  }
  recognition=new SR();
  recognition.lang="ja-JP";recognition.continuous=true;recognition.interimResults=true;
  recognition.onresult=e=>{
    let fin="",int="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0]?.transcript||"";
      if(e.results[i].isFinal)fin+=t;else int+=t;
    }
    if(int)renderCaption(int);
    if(fin.trim())queueTranscript(fin);
  };
  recognition.onerror=()=>{if(listening){clearTimeout(restartTimer);restartTimer=setTimeout(()=>{if(listening)try{recognition.start();}catch{}},1200);}};
  recognition.onend=()=>{if(listening){clearTimeout(restartTimer);restartTimer=setTimeout(()=>{if(listening)try{recognition.start();}catch{}},700);}};
  recognition.start();listening=true;updateDockMeta();
  $("micBtn").textContent="マイク停止";$("micBtn").className="warn";
  startMeter();
}

async function startMeter(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    audioCtx=new AudioContext();
    const an=audioCtx.createAnalyser();audioCtx.createMediaStreamSource(micStream).connect(an);
    an.fftSize=64;const buf=new Uint8Array(an.frequencyBinCount);
    meterTimer=setInterval(()=>{
      an.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length/255;
      const lvl=Math.min(1,avg*3.2);
      const dot=$("captionDot"),lbl=$("captionLabel");
      if(dot&&lvl>0.08){
        dot.className="caption-who-dot host";
        if(lbl){lbl.className="caption-who-label host";lbl.textContent=state.keyword?.slice(0,8)||"HOST";}
      } else if(dot&&lvl<=0.08){
        dot.className="caption-who-dot";
        if(lbl){lbl.className="caption-who-label";lbl.textContent="音声";}
      }
    },80);
  }catch{}
}
function stopMeter(){
  clearInterval(meterTimer);
  if(audioCtx){audioCtx.close().catch(()=>{});audioCtx=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
}

// ── Comments ──
function cleanName(raw){
  const s=String(raw||"").trim();
  if(s.includes(";"))return s.split(/\s/)[0].trim();
  const slots=["好奇心旺盛","マイペース","熱血","冷静","慎重","楽観的","負けず嫌い","天然","職人気質","優しい","皮肉屋"];
  for(const t of slots){const i=s.indexOf(" "+t);if(i>0)return s.slice(0,i).trim();}
  return s;
}

function spawnComment(superChat=false){
  const streamKey=localStorage.getItem(GEMINI_KEY_STORE)||"";
  if(state.commentEngine==="gemini"&&streamKey){spawnGeminiComment(superChat,streamKey);return;}
  const p=pickPersona(),text=buildComment(p);
  addComment(text,p.name,p.color,superChat);
}

async function spawnGeminiComment(superChat,apiKey){
  try{
    const p=pickPersona(),recent=recentText();
    const prompt=`あなたは「${p.name}」というライブ配信の視聴者です。
口調: ${p.tone||p.roleType||"自然に反応する"}
${p.catchphrase?`口癖: ${p.catchphrase}`:""}

今の配信内容（経済学習配信）:
今日のキーワード: 「${state.keyword}」/ ステージ: ${STAGES_META[state.currentStage]?.name}
${recent||"経済学習配信中。"}

この学習配信に対して視聴者として自然なコメントを1つだけ。
35文字以内、日本語のみ、コメント文のみ出力。`;
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.9,maxOutputTokens:80}})});
    if(!res.ok)throw new Error("API "+res.status);
    const data=await res.json();
    const text=(data.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/[\n\r「」『』]/g,"").trim().slice(0,35);
    if(!text)throw new Error("empty");
    addComment(text,p.name,p.color,superChat);
  }catch{
    const p=pickPersona(),text=buildComment(p);
    addComment(text,p.name,p.color,superChat);
  }
}

function addComment(text,name,color,superChat=false){
    commentCount++;updateDockMeta();
  if(!text)return;
  const node=document.createElement("article");
  node.className=`comment${superChat?" super":""}`;
  node.style.setProperty("--uc",color||"var(--acc)");
  node.style.setProperty("--life",`${text.length>30?18:14}s`);
  node.innerHTML=`<span class="user"></span><span class="tag"></span><span class="text"></span>`;
  node.querySelector(".user").textContent="@"+cleanName(name);
  node.querySelector(".tag").textContent=superChat?"Super":"AI";
  node.querySelector(".text").textContent=text;
  const stream=Math.random()<0.5?$("commentStream"):($("commentStreamLeft")||$("commentStream"));
  stream.append(node);
  node.addEventListener("animationend",()=>node.remove());
}

function pickPersona(){
  const list=personas.length?personas:defaultPersonas(),text=recentText();
  return list.map(p=>({p,s:relevance(p,text)+Math.random()*.5})).sort((a,b)=>b.s-a.s)
    .slice(0,Math.min(list.length,6))[Math.floor(Math.random()*Math.min(list.length,6))].p;
}

function relevance(p,text){
  const hay=[p.name,p.roleType,p.reactionPattern,p.catchphrase,...(p.words||[]),...(p.interests||[])].join(" ");
  let s=0;
  text.split(/[\s、。,]+/).filter(w=>w.length>=2).forEach(w=>{if(hay.includes(w))s+=2;});
  [[/経済|金利|インフレ|為替|GDP/i,/経済|知識|分析/],[/投資|NISA|株/i,/投資|開発|知識/],
   [/政治|選挙|国会/i,/政治|知識|懐疑/],[/草|面白|ネタ/i,/ネタ|共感/]]
  .forEach(([a,b])=>{if(a.test(text)&&b.test(hay))s+=4;});
  return s;
}

function buildComment(p){
  if(p.catchphrase&&Math.random()<.42)return p.catchphrase.slice(0,35);
  const text=recentText(),kw=text.split(/[\s、。,]+/).filter(w=>w.length>=2)[0]||(p.words||[])[0]||state.keyword||"経済";
  const role=p.roleType||"共感勢";
  const map={
    "共感勢":[`${kw}、なるほどです`,`今の話わかります`,`${kw}ってそういうことか`,`今日初めて知りました`,"深い","このシリーズ好きです"],
    "知識勢":[`${kw}の見方が面白い`,`もっと掘り下げてほしい`,`${kw}と金利の関係が気になる`,`考察したくなる`,"この視点は新しい"],
    "質問勢":[`${kw}ってどこが入口？`,`今のもう少し詳しく聞きたい`,`生活とどう繋がりますか？`,`NISAにも関係しますか？`],
    "懐疑勢":[`${kw}、本当にそれで合ってる？`,`別の見方もある気が`,`前提から確認したいです`,"慎重に見た方が良さそう"],
    "応援勢":[`いい流れです`,`${kw}のとこ好きです`,`続けてください！`,`この調子でお願いします`],
    "初心者勢":[`なるほどー！`,`${kw}って初めて聞きました`,`わかりやすいです`,`また来ます！`],
    "ネタ勢":[`草`,`天才か`,`${kw}クセ強い`,`これは名言`]
  };
  return(map[role]||map["共感勢"])[Math.floor(Math.random()*(map[role]||map["共感勢"]).length)].slice(0,35);
}

function intervalRange(){
  if(state.commentSpeed==="fast")return[3000,7000];
  if(state.commentSpeed==="slow")return[10000,18000];
  return[6000,12000];
}

function toggleComments(){
  commentsEnabled=!commentsEnabled;
  const b=document.getElementById('ccBtn');
  if(b){b.textContent=commentsEnabled?'💬 ON':'💬 OFF';b.classList.toggle('off',!commentsEnabled);}
  setStatus(commentsEnabled?'💬 コメント ON':'💬 コメント OFF');
  if(commentsEnabled)scheduleComment();else clearTimeout(commentTimer);
}
function setCommentSpeed(spd){
  state.commentSpeed=spd;
  document.querySelectorAll('.spd-btn').forEach(b=>b.classList.toggle('active',b.dataset.speed===spd));
  const cs=document.getElementById('commentSpeed');if(cs)cs.value=spd;
  save();if(commentsEnabled)scheduleComment();
  setStatus(spd==='slow'?'🐢 低速':spd==='fast'?'🔥 高速':'▷ 普通速');
}
function updateDockMeta(){
  const el=document.getElementById('dockMeta');
  if(el)el.innerHTML='💬 '+commentCount+'件　🎤 '+(listening?'<span class="on">● 収録中</span>':'停止中');
}

function scheduleComment(){
  clearTimeout(commentTimer);
  if(!commentsEnabled)return;
  const[mn,mx]=intervalRange();
  commentTimer=setTimeout(()=>{spawnComment();scheduleComment();},mn+Math.random()*(mx-mn));
}

    {name:"自動化研究員",roleType:"開発者勢",catchphrase:"そこ自動化できるのか",color:"#57d68d",words:["AI","経済","仕組み"]},
    {name:"徹夜ラジオさん",roleType:"共感勢",catchphrase:"この感じ好きだなあ",color:"#8fa8ff",words:["雑談","学習","深夜"]},
    {name:"不満足なソクラテス",roleType:"懐疑勢",catchphrase:"その問いは面白い",color:"#c890d8",words:["哲学","経済","問い"]},
    {name:"竜神王",roleType:"応援勢",catchphrase:"これぞ学びの王道よ",color:"#f2c14e",words:["応援","学習","成長"]},

  ];

function loadPersonas(){
  const result=[];
  try{
    const p=JSON.parse(localStorage.getItem(PERSONA_KEY)||"[]");
    result.push(...p.filter(x=>x&&x.name&&x.enabled!==false).map(x=>({...x,name:cleanName(x.name)})));
  }catch{}
  try{
    const ids=new Set(result.map(x=>x.id||x.name));
    const p=JSON.parse(localStorage.getItem(SHARED_PERSONA_KEY)||"[]");
    result.push(...p.filter(x=>x&&x.name&&!ids.has(x.id||x.name)).map(x=>({...x,name:cleanName(x.name)})));
  }catch{}
  return result;
}

async function syncPersonas(silent){
  if(sheetSyncing)return;sheetSyncing=true;
  try{
    const url=state.personaSheetUrl;
    if(!url)throw new Error("no url");
    const r=await fetch(url,{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const csv=await r.text();
    personas=parsePersonas(csv);
    if(!personas.length)throw new Error("empty");
    setStatus(`人格 ${personas.length}件 同期済み`);
  }catch{
    personas=loadPersonas();
    if(!personas.length)personas=defaultPersonas();
    if(!silent)setStatus(`人格 ${personas.length}件（デフォルト）`);
  }finally{sheetSyncing=null;if($("personaStatus"))$("personaStatus").textContent=`人格 ${personas.length}件`;}
}

function parsePersonas(csv){
  const rows=parseCSV(csv);
  return rows.map((r,i)=>{
    const name=r[0];if(!name||name==="名前")return null;
    return{id:"s"+i,name,roleType:r[2]||"",reactionPattern:r[3]||"",catchphrase:r[4]||"",
           words:tags(r[6]),interests:tags(r[8]),color:["#c9a84c","#f097c8","#8fa8ff","#9be870","#c890d8"][i%5]};
  }).filter(Boolean);
}
function parseCSV(text){
  const rows=[];let row=[],cell="",quote=false;
  const src=String(text||""),d=src.includes("\t")?"\t":",";
  for(let i=0;i<src.length;i++){
    const ch=src[i],nx=src[i+1];
    if(ch==='"'){if(quote&&nx==='"'){cell+='"';i++;}else quote=!quote;}
    else if(ch===d&&!quote){row.push(cell.trim());cell="";}
    else if((ch==="\n"||ch==="\r")&&!quote){
      if(ch==="\r"&&nx==="\n")i++;row.push(cell.trim());
      if(row.some(Boolean))rows.push(row);row=[];cell="";
    }else cell+=ch;
  }
  row.push(cell.trim());if(row.some(Boolean))rows.push(row);return rows;
}
function tags(v){return String(v||"").split(/[;,、，・\s]+/).map(x=>x.trim()).filter(Boolean).slice(0,10);}

// ── Storage / Status ──
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({...state,transcript:state.transcript?.slice(0,40)}));}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch{return{};}}
function setStatus(t){
  if($("personaStatus"))$("personaStatus").textContent=t;
  const toast=$("statusToast");
  if(toast){toast.textContent=t;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),3000);}
}

window.addEventListener("storage",e=>{
  if(e.key===PERSONA_KEY){
    try{
      const cos=JSON.parse(e.newValue||"[]").filter(x=>x&&x.name&&x.enabled!==false).map(x=>({...x,name:cleanName(x.name)}));
      if(cos.length){
        const cosIds=new Set(cos.map(x=>x.id||x.name));
        personas=[...cos,...personas.filter(x=>!cosIds.has(x.id||x.name))];
        setStatus(`Channel OS から ${cos.length}件 更新`);
      }
    }catch{}
  }
});
})();
