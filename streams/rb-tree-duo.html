<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB-Tree学習 — 2人セッション</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #060c08;
  --bg2:   #0c1810;
  --line:  rgba(100,180,120,.13);
  --text:  #d4e8d0;
  --muted: rgba(180,210,180,.52);
  --faint: rgba(180,210,180,.22);
  --acc:   #c9a84c;
  --green: #57c87c;
  --stop:  #e05555;
  --blue:  #6bb6ff;
  --a-color: #c9a84c; /* キャラA色 - 変更可 */
  --b-color: #6bb6ff; /* キャラB色 - 変更可 */
  --font:  "Noto Sans JP", sans-serif;
  --serif: "Noto Serif JP", serif;
  color-scheme: dark;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg);}
button,input,textarea{font:inherit;color:inherit;}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:0 18px;min-height:52px;
  background:rgba(6,12,8,.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.logo{display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;}
.logo-mark{font-size:18px;}
.logo-name{font-family:var(--serif);font-size:13px;font-weight:700;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;}
.session-timer{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--muted);padding:4px 11px;border:1px solid var(--line);border-radius:8px;min-width:58px;text-align:center;flex-shrink:0;}
.btn-stop{padding:6px 16px;border-radius:8px;border:1px solid rgba(224,85,85,.4);background:rgba(224,85,85,.1);color:var(--stop);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;flex-shrink:0;}
.btn-stop:hover{background:rgba(224,85,85,.2);}
.btn-resume{padding:6px 16px;border-radius:8px;border:1px solid rgba(87,200,124,.4);background:rgba(87,200,124,.1);color:var(--green);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;display:none;align-items:center;gap:5px;flex-shrink:0;}
.btn-resume:hover{background:rgba(87,200,124,.2);}
.header-btns{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn-hd{padding:5px 12px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:11px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .15s;}
.btn-hd:hover{border-color:rgba(201,168,76,.3);color:var(--acc);}
.btn-hd.active{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.1);color:var(--acc);}
.h-back{font-size:11px;color:var(--muted);text-decoration:none;white-space:nowrap;transition:color .15s;}
.h-back:hover{color:var(--text);}

/* ── MAIN LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr 240px;height:calc(100vh - 52px);overflow:hidden;gap:0;}

/* ── CHARACTER PANELS ── */
.char-panel{display:flex;flex-direction:column;gap:0;border-right:1px solid var(--line);background:var(--bg2);overflow:hidden;}
.char-panel.right{border-right:none;border-left:1px solid var(--line);}

.char-header{padding:14px 14px 12px;border-bottom:1px solid var(--line);}
.char-avatar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.char-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;border:2px solid transparent;transition:all .2s;}
.char-avatar.speaking{animation:glow 1.2s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 6px currentColor;opacity:.6}}
.char-info{}
.char-name-input{width:100%;background:0;border:0;font-size:14px;font-weight:900;color:var(--text);outline:none;padding:0;font-family:var(--serif);}
.char-name-input:focus{color:var(--acc);}
.char-role{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.role-a{color:var(--a-color);}
.role-b{color:var(--b-color);}
.char-color-row{display:flex;align-items:center;gap:6px;}
.char-color-lbl{font-size:9px;color:var(--muted);}
.char-color-input{width:32px;height:22px;border:1px solid var(--line);border-radius:4px;cursor:pointer;background:0;padding:1px;}

.speak-btn{width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:11px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.speak-btn.on{color:var(--text);font-size:12px;}
.char-panel.a .speak-btn.on{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.1);color:var(--a-color);}
.char-panel.b .speak-btn.on{border-color:rgba(107,182,255,.45);background:rgba(107,182,255,.1);color:var(--b-color);}

.char-body{flex:1;overflow-y:auto;padding:12px;}
.char-section-lbl{font-size:9px;font-weight:900;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;padding-bottom:5px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.char-note{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:11px;color:var(--text);outline:none;min-height:80px;line-height:1.6;resize:none;transition:border-color .15s;}
.char-note:focus{border-color:rgba(201,168,76,.35);}
.char-seeds{display:flex;flex-direction:column;gap:4px;margin-top:10px;}
.char-seed-card{padding:6px 9px;border-radius:6px;background:rgba(255,255,255,.02);border:1px solid var(--line);font-size:11px;}
.char-seed-title{font-weight:700;color:var(--text);}
.char-seed-words{font-size:10px;color:var(--muted);margin-top:1px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── CENTER ── */
.center{overflow-y:auto;padding:16px 20px 40px;display:flex;flex-direction:column;gap:14px;}

/* Topic bar */
.topic-bar{border:1px solid var(--line);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.018);}
.topic-label{font-size:9px;font-weight:900;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.topic-input{flex:1;background:0;border:0;font-size:14px;font-weight:700;color:var(--text);outline:none;font-family:var(--serif);}
.topic-input::placeholder{color:var(--faint);}
.stop-timer-inline{font-family:var(--serif);font-size:13px;color:var(--stop);font-weight:700;white-space:nowrap;display:none;}
.stop-timer-inline.show{display:block;}

/* Stats */
.stats-row{display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.stat{flex:1;padding:9px 10px;text-align:center;border-right:1px solid var(--line);background:rgba(255,255,255,.018);}
.stat:last-child{border-right:0;}
.stat-n{font-family:var(--serif);font-size:20px;font-weight:700;line-height:1;}
.stat-n.s{color:var(--stop);}
.stat-n.g{color:var(--acc);}
.stat-n.q{color:var(--blue);}
.stat-l{font-size:9px;color:var(--muted);font-weight:900;letter-spacing:.06em;margin-top:3px;}

/* Step flow */
.step-section{border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.step-head{padding:11px 15px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.step-lbl{font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.step-prog{margin-left:auto;font-size:10px;color:var(--muted);font-weight:700;}
.step-mode-badge{font-size:10px;padding:2px 9px;border-radius:999px;background:rgba(201,168,76,.1);color:var(--acc);border:1px solid rgba(201,168,76,.22);}
.step-reset{padding:3px 10px;border-radius:6px;background:0;border:1px solid var(--line);font-size:10px;color:var(--muted);cursor:pointer;transition:all .15s;}
.step-reset:hover{border-color:rgba(201,168,76,.3);color:var(--acc);}

.step-current{padding:18px 18px 14px;}
.sc-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sc-num{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--acc);line-height:1;}
.sc-of{font-size:12px;color:var(--muted);margin-top:6px;}
.sc-speaker{display:flex;align-items:center;gap:6px;}
.speaker-badge{font-size:10px;font-weight:900;padding:3px 10px;border-radius:999px;border:1px solid transparent;}
.speaker-a{background:rgba(201,168,76,.12);color:var(--a-color);border-color:rgba(201,168,76,.28);}
.speaker-b{background:rgba(107,182,255,.1);color:var(--b-color);border-color:rgba(107,182,255,.22);}
.speaker-both{background:rgba(87,200,124,.08);color:var(--green);border-color:rgba(87,200,124,.22);}
.sc-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3;}
.sc-desc{font-size:12px;color:var(--muted);line-height:1.7;}
.sc-input{width:100%;margin-top:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,.3);font-size:12px;color:var(--text);outline:none;transition:border-color .15s;}
.sc-input:focus{border-color:rgba(201,168,76,.4);}
.sc-textarea{width:100%;margin-top:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,.3);font-size:12px;color:var(--text);outline:none;transition:border-color .15s;min-height:70px;resize:vertical;line-height:1.6;}
.sc-textarea:focus{border-color:rgba(201,168,76,.4);}

.step-nav-row{padding:10px 18px;border-top:1px solid var(--line);background:rgba(255,255,255,.01);display:flex;gap:6px;align-items:center;}
.step-list{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.step-dot{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .2s;flex-shrink:0;}
.step-dot.done{background:rgba(87,200,124,.18);border-color:rgba(87,200,124,.45);color:var(--green);}
.step-dot.active{background:rgba(201,168,76,.18);border-color:rgba(201,168,76,.45);color:var(--acc);}
.step-dot:hover:not(.active):not(.done){border-color:rgba(201,168,76,.3);color:var(--acc);}
.btn-step-next{padding:7px 16px;border-radius:7px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.1);color:var(--acc);font-size:11px;font-weight:900;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.btn-step-next:hover{background:rgba(201,168,76,.2);}
.btn-step-next:disabled{opacity:.3;cursor:default;}

/* Seed form */
.seed-section{border:1px solid rgba(201,168,76,.22);border-radius:12px;overflow:hidden;background:rgba(201,168,76,.02);}
.seed-head{padding:11px 15px;background:rgba(201,168,76,.06);border-bottom:1px solid rgba(201,168,76,.14);display:flex;align-items:center;gap:8px;}
.seed-lbl{font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--acc);text-transform:uppercase;}
.seed-cnt{margin-left:auto;font-family:var(--serif);font-size:13px;font-weight:700;color:var(--acc);}
.seed-form{padding:13px 15px;display:flex;gap:8px;align-items:flex-end;}
.seed-form .sf-main{flex:1;display:flex;flex-direction:column;gap:7px;}
.sf-input{width:100%;padding:8px 11px;border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,.35);font-size:12px;outline:none;transition:border-color .15s;color:var(--text);}
.sf-input:focus{border-color:rgba(201,168,76,.45);}
.btn-seed-save{padding:9px 14px;border-radius:8px;background:rgba(201,168,76,.14);border:1px solid rgba(201,168,76,.32);color:var(--acc);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;white-space:nowrap;height:fit-content;}
.btn-seed-save:hover{background:rgba(201,168,76,.24);}

.seed-history{border-top:1px solid rgba(201,168,76,.1);padding:10px 15px;display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;}
.sh-lbl{font-size:9px;font-weight:900;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.seed-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.015);}
.si-stage{font-size:9px;padding:2px 6px;border-radius:999px;background:rgba(201,168,76,.1);color:var(--acc);border:1px solid rgba(201,168,76,.18);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.si-body{flex:1;min-width:0;}
.si-title{font-size:12px;font-weight:700;}
.si-words{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-del{background:0;border:0;padding:2px 4px;font-size:10px;color:var(--muted);cursor:pointer;opacity:.4;transition:opacity .15s;flex-shrink:0;}
.si-del:hover{opacity:1;}
.empty-msg{padding:12px;text-align:center;font-size:11px;color:var(--faint);}

/* Question log (center) */
.q-bar{border:1px solid rgba(107,182,255,.15);border-radius:10px;padding:10px 14px;background:rgba(107,182,255,.03);display:flex;flex-direction:column;gap:8px;}
.q-bar-head{display:flex;align-items:center;gap:8px;}
.q-bar-lbl{font-size:9px;font-weight:900;letter-spacing:.14em;color:var(--blue);text-transform:uppercase;}
.q-bar-cnt{font-size:9px;padding:1px 6px;border-radius:999px;background:rgba(107,182,255,.12);color:var(--blue);border:1px solid rgba(107,182,255,.2);}
.q-input-row{display:flex;gap:6px;}
.q-input{flex:1;padding:7px 10px;border-radius:7px;border:1px solid rgba(107,182,255,.18);background:rgba(0,0,0,.3);font-size:11px;color:var(--text);outline:none;transition:border-color .15s;}
.q-input:focus{border-color:rgba(107,182,255,.4);}
.q-add{padding:7px 10px;border-radius:7px;border:1px solid rgba(107,182,255,.22);background:rgba(107,182,255,.08);color:var(--blue);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;}
.q-add:hover{background:rgba(107,182,255,.16);}
.q-list{display:flex;flex-direction:column;gap:3px;max-height:100px;overflow-y:auto;}
.q-item{display:flex;align-items:flex-start;gap:5px;padding:5px 8px;border-radius:6px;background:rgba(107,182,255,.05);border:1px solid rgba(107,182,255,.1);}
.q-item.done{opacity:.5;}
.q-item.done .q-text{text-decoration:line-through;}
.q-mark{color:var(--blue);font-size:10px;flex-shrink:0;margin-top:2px;}
.q-text{flex:1;font-size:10px;color:var(--muted);line-height:1.4;}
.q-check,.q-del{background:0;border:0;padding:1px 3px;font-size:9px;color:var(--muted);cursor:pointer;opacity:.45;transition:opacity .15s;}
.q-check:hover,.q-del:hover{opacity:1;}

/* Export */
.export-bar{border:1px solid var(--line);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.export-lbl{font-size:11px;color:var(--muted);flex:1;}
.btn-exp{padding:6px 13px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:11px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .15s;}
.btn-exp:hover{border-color:rgba(201,168,76,.3);color:var(--acc);}

/* ── OBS OVERLAY MODE ── */
body.obs-mode{background:transparent!important;}
body.obs-mode .header{background:rgba(6,12,8,.82);}
body.obs-mode .char-panel{background:rgba(6,12,8,.7);}
body.obs-mode .center{background:transparent;}
body.obs-mode .topic-bar,
body.obs-mode .stats-row,
body.obs-mode .seed-section,
body.obs-mode .q-bar,
body.obs-mode .export-bar{background:rgba(6,12,8,.82)!important;backdrop-filter:blur(8px);}
body.obs-mode .step-section{background:rgba(6,12,8,.85);backdrop-filter:blur(8px);}
body.obs-mode .step-current{background:rgba(6,12,8,.9);}

/* ── MINI MODE ── */
body.mini .layout{display:none!important;}
body.mini .mini-duo{display:flex!important;}
.mini-duo{
  display:none;flex-direction:column;gap:10px;
  height:calc(100vh - 52px);overflow:hidden;
  padding:12px 14px;max-width:300px;margin:0 auto;
}
.mini-char-row{display:flex;gap:6px;}
.mini-char-pill{
  flex:1;padding:7px 10px;border-radius:8px;border:2px solid transparent;
  background:rgba(255,255,255,.025);
  display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s;
}
.mini-char-pill.a{border-color:rgba(201,168,76,.35);}
.mini-char-pill.b{border-color:rgba(107,182,255,.3);}
.mini-char-pill.speaking{box-shadow:0 0 0 2px currentColor;opacity:.9;}
.mini-char-pill.a.speaking{box-shadow:0 0 0 2px var(--a-color);}
.mini-char-pill.b.speaking{box-shadow:0 0 0 2px var(--b-color);}
.mcp-avatar{font-size:18px;flex-shrink:0;}
.mcp-info{flex:1;min-width:0;}
.mcp-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcp-role{font-size:9px;color:var(--muted);}
.mini-stop-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;border:2px solid rgba(224,85,85,.4);background:rgba(224,85,85,.1);color:var(--stop);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;}
.mini-stop-btn.resume{border-color:rgba(87,200,124,.4);background:rgba(87,200,124,.1);color:var(--green);}
.mini-step-card{flex:1;min-height:0;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.018);padding:14px;display:flex;flex-direction:column;gap:8px;overflow:hidden;transition:border-color .2s,background .2s;}
.mini-step-card.on{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.05);}
.mini-step-num-row{display:flex;align-items:baseline;gap:6px;}
.mini-step-num{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--acc);}
.mini-step-of{font-size:11px;color:var(--muted);}
.mini-step-title{font-size:13px;font-weight:900;line-height:1.35;}
.mini-step-desc{font-size:10px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mini-speaker-badge{font-size:10px;padding:3px 9px;border-radius:999px;display:inline-block;}
.mini-step-input{width:100%;padding:7px 9px;border-radius:7px;border:1px solid var(--line);background:rgba(0,0,0,.3);font-size:11px;color:var(--text);outline:none;}
.mini-step-input:focus{border-color:rgba(201,168,76,.4);}
.mini-nav{display:flex;gap:6px;margin-top:auto;padding-top:4px;}
.mini-nav-btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:11px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .15s;}
.mini-nav-btn:hover:not(:disabled){border-color:rgba(201,168,76,.3);color:var(--acc);}
.mini-nav-btn:disabled{opacity:.3;cursor:default;}
.mini-seed-panel{border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:10px;background:rgba(201,168,76,.03);flex-shrink:0;}
.mini-seed-lbl{font-size:9px;font-weight:900;letter-spacing:.14em;color:var(--acc);text-transform:uppercase;margin-bottom:6px;}
.mini-seed-input{width:100%;padding:7px 9px;border-radius:7px;border:1px solid rgba(201,168,76,.22);background:rgba(0,0,0,.3);font-size:12px;color:var(--text);outline:none;margin-bottom:6px;}
.mini-seed-input:focus{border-color:rgba(201,168,76,.45);}
.mini-seed-save{width:100%;padding:8px;border-radius:7px;background:rgba(201,168,76,.14);border:1px solid rgba(201,168,76,.3);color:var(--acc);font-size:11px;font-weight:900;cursor:pointer;transition:all .15s;}
.mini-seed-save:hover{background:rgba(201,168,76,.24);}
.mini-footer{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.mini-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);}
.mini-stats b{color:var(--text);}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:8px 16px;border-radius:8px;background:#0d1c10;border:1px solid rgba(87,200,124,.4);color:var(--green);font-size:12px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;max-width:280px;}
.toast.show{opacity:1;}
.toast.milestone{border-color:rgba(201,168,76,.4);color:var(--acc);background:#1c160a;}

/* Responsive */
@media(max-width:900px){.layout{grid-template-columns:1fr;height:auto;}.char-panel{display:none;}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ── HEADER ── -->
<header class="header">
  <div class="logo">
    <span class="logo-mark">🌳</span>
    <div>
      <div class="logo-name">RB-Tree学習</div>
      <div class="logo-sub">2人セッション</div>
    </div>
  </div>
  <div class="session-timer" id="sessionTimer">00:00</div>
  <button class="btn-stop"   id="btnStop"   onclick="toggleStop()">⏸ 止める</button>
  <button class="btn-resume" id="btnResume" onclick="toggleStop()">▶ 再開</button>
  <div class="header-btns">
    <button class="btn-hd" id="btnMini" onclick="toggleMiniMode()">⬜ ミニ</button>
    <button class="btn-hd" id="btnObs"  onclick="toggleObsMode()">📺 OBS</button>
    <a class="h-back btn-hd" href="index.html">← TOP</a>
  </div>
</header>

<!-- ── MAIN LAYOUT ── -->
<div class="layout">

  <!-- キャラA（左） -->
  <div class="char-panel a">
    <div class="char-header">
      <div class="char-avatar-row">
        <div class="char-avatar" id="avatarA" style="background:rgba(201,168,76,.15);color:var(--a-color);">
          <span id="avatarAIcon">🦁</span>
        </div>
        <div class="char-info">
          <input class="char-name-input" id="nameA" value="ガオル" oninput="syncNames()">
          <div class="char-role role-a">進行役</div>
        </div>
      </div>
      <input type="color" class="char-color-input" id="colorA" value="#c9a84c" oninput="setCharColor('a',this.value)" style="display:none">
      <button class="speak-btn" id="speakBtnA" onclick="toggleSpeak('a')">
        🎙 話す
      </button>
    </div>
    <div class="char-body">
      <div class="char-section-lbl">メモ</div>
      <textarea class="char-note" id="noteA" placeholder="Aのメモ・気づき…"></textarea>
      <div style="margin-top:12px;">
        <div class="char-section-lbl">Seedログ</div>
        <div class="char-seeds" id="seedsA"></div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <main class="center">

    <!-- トピック -->
    <div class="topic-bar">
      <span class="topic-label">今日のテーマ</span>
      <input class="topic-input" id="topicInput" placeholder="例: インフレと金利の関係">
      <span class="stop-timer-inline" id="stopTimerInline">停止中 0:00</span>
    </div>

    <!-- 統計 -->
    <div class="stats-row">
      <div class="stat"><div class="stat-n s" id="statStop">0</div><div class="stat-l">⏸ 停止</div></div>
      <div class="stat"><div class="stat-n g" id="statSeed">0</div><div class="stat-l">🌱 Seeds</div></div>
      <div class="stat"><div class="stat-n q" id="statQ">0</div><div class="stat-l">❓ 問い</div></div>
    </div>

    <!-- ステップフロー -->
    <div class="step-section">
      <div class="step-head">
        <span class="step-lbl">解説フロー</span>
        <span class="step-mode-badge" id="stepModeBadge">📹 動画</span>
        <div style="display:flex;gap:4px;margin-left:8px;">
          <button onclick="setMode('video')" id="modeVideoBtnHead" style="padding:2px 8px;border-radius:5px;border:1px solid var(--line);background:0;font-size:10px;color:var(--acc);cursor:pointer;">動画</button>
          <button onclick="setMode('text')"  id="modeTextBtnHead"  style="padding:2px 8px;border-radius:5px;border:1px solid var(--line);background:0;font-size:10px;color:var(--muted);cursor:pointer;">文章</button>
        </div>
        <span class="step-prog" id="stepProg">0/6</span>
        <button class="step-reset" onclick="resetSteps()">リセット</button>
      </div>

      <!-- 現在ステップ（大きく） -->
      <div class="step-current" id="stepCurrent">
        <div class="sc-meta">
          <div>
            <span class="sc-num" id="scNum">1</span>
            <span class="sc-of" id="scOf">/ 6</span>
          </div>
          <div class="sc-speaker" id="scSpeaker"></div>
        </div>
        <div class="sc-title" id="scTitle">—</div>
        <div class="sc-desc"  id="scDesc">—</div>
        <div id="scInputWrap"></div>
      </div>

      <!-- ステップドット + 次へ -->
      <div class="step-nav-row">
        <div class="step-list" id="stepDots"></div>
        <button class="btn-step-next" id="btnStepNext" onclick="nextStep()">次へ →</button>
      </div>
    </div>

    <!-- Seed記録 -->
    <div class="seed-section">
      <div class="seed-head">
        <span class="seed-lbl">🌱 Seed を記録</span>
        <span class="seed-cnt" id="seedCount">0 seeds</span>
      </div>
      <div class="seed-form">
        <div class="sf-main">
          <input class="sf-input" id="seedTitle" placeholder="用語名 *" required>
          <input class="sf-input" id="seedWords" placeholder="自分の言葉で一言">
        </div>
        <button class="btn-seed-save" onclick="saveSeed()">🌱 記録</button>
      </div>
      <div class="seed-history" id="seedHistory">
        <div class="sh-lbl">このセッションの記録</div>
        <div class="empty-msg" id="seedEmpty">まだ記録がありません</div>
      </div>
    </div>

    <!-- 問いログ -->
    <div class="q-bar">
      <div class="q-bar-head">
        <span class="q-bar-lbl">❓ 問いログ</span>
        <span class="q-bar-cnt" id="qCount">0</span>
      </div>
      <div class="q-input-row">
        <input class="q-input" id="qInput" placeholder="生まれた「なぜ？」を記録…"
          onkeydown="if(event.key==='Enter')addQuestion()">
        <button class="q-add" onclick="addQuestion()">＋</button>
      </div>
      <div class="q-list" id="qList">
        <div style="font-size:10px;color:var(--faint);padding:4px;">疑問が浮かんだらここに</div>
      </div>
    </div>

    <!-- 書き出し -->
    <div class="export-bar">
      <span class="export-lbl" id="exportLbl">セッションの記録を書き出せます</span>
      <button class="btn-exp" onclick="exportSession()">📄 書き出し</button>
      <button class="btn-exp" onclick="clearSession()">🗑 クリア</button>
    </div>

  </main>

  <!-- キャラB（右） -->
  <div class="char-panel b right">
    <div class="char-header">
      <div class="char-avatar-row">
        <div class="char-avatar" id="avatarB" style="background:rgba(107,182,255,.12);color:var(--b-color);">
          <span id="avatarBIcon">🐺</span>
        </div>
        <div class="char-info">
          <input class="char-name-input" id="nameB" value="ルナ" oninput="syncNames()">
          <div class="char-role role-b">学習者</div>
        </div>
      </div>
      <button class="speak-btn" id="speakBtnB" onclick="toggleSpeak('b')">
        🎙 話す
      </button>
    </div>
    <div class="char-body">
      <div class="char-section-lbl">メモ</div>
      <textarea class="char-note" id="noteB" placeholder="Bのメモ・気づき…"></textarea>
      <div style="margin-top:12px;">
        <div class="char-section-lbl">理解チェック</div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;" id="understandList"></div>
      </div>
    </div>
  </div>

</div>

<!-- ── MINI DUO VIEW ── -->
<div class="mini-duo" id="miniDuo">

  <div class="mini-char-row">
    <div class="mini-char-pill a" id="miniPillA" onclick="toggleSpeak('a')" title="クリックで発話ON/OFF">
      <span class="mcp-avatar" id="miniAvatarA">🦁</span>
      <div class="mcp-info">
        <div class="mcp-name" id="miniNameA">ガオル</div>
        <div class="mcp-role">進行役</div>
      </div>
    </div>
    <div class="mini-char-pill b" id="miniPillB" onclick="toggleSpeak('b')" title="クリックで発話ON/OFF">
      <span class="mcp-avatar" id="miniAvatarB">🐺</span>
      <div class="mcp-info">
        <div class="mcp-name" id="miniNameB">ルナ</div>
        <div class="mcp-role">学習者</div>
      </div>
    </div>
  </div>

  <button class="mini-stop-btn" id="miniStopBtn" onclick="toggleStop()">
    <span id="miniStopLabel">⏸ 止める</span>
    <span id="miniStopTimer" style="display:none;font-family:var(--serif);font-size:13px;font-weight:700;">0:00</span>
  </button>

  <div class="mini-step-card" id="miniStepCard">
    <div class="mini-step-num-row">
      <span class="mini-step-num" id="miniNum">1</span>
      <span class="mini-step-of" id="miniOf">/ 6</span>
      <span class="mini-speaker-badge" id="miniSpeakerBadge"></span>
    </div>
    <div class="mini-step-title" id="miniTitle">—</div>
    <div class="mini-step-desc"  id="miniDesc">—</div>
    <div id="miniInWrap"></div>
    <div class="mini-nav">
      <button class="mini-nav-btn" id="miniPrevBtn" onclick="prevStep()" disabled>← 前</button>
      <button class="mini-nav-btn" id="miniNextBtn" onclick="nextStep()">次 →</button>
    </div>
  </div>

  <div class="mini-seed-panel">
    <div class="mini-seed-lbl">🌱 Seed</div>
    <input class="mini-seed-input" id="miniSeedInput" placeholder="用語名…"
      onkeydown="if(event.key==='Enter')miniSaveSeed()">
    <button class="mini-seed-save" onclick="miniSaveSeed()">🌱 記録する</button>
  </div>

  <div class="mini-footer">
    <div class="mini-stats">
      <span>⏸ <b id="mStatStop">0</b></span>
      <span>🌱 <b id="mStatSeed">0</b></span>
      <span>❓ <b id="mStatQ">0</b></span>
    </div>
    <button onclick="exportSession()" style="font-size:10px;background:0;border:1px solid var(--line);border-radius:5px;padding:4px 9px;color:var(--muted);cursor:pointer;">📄</button>
  </div>

</div>

<script>
// ════════════════════════════════════
//  Constants
// ════════════════════════════════════
const TODAY    = new Date().toISOString().slice(0,10);
const SEED_KEY = `rbtree_seeds_${TODAY}`;
const Q_KEY    = `rbtree_questions_${TODAY}`;
const STAGE_META = {
  seed:{emoji:'🌱',label:'Seed'}, sprout:{emoji:'🌿',label:'Sprout'},
  sapling:{emoji:'🌲',label:'Sapling'}, tree:{emoji:'🌳',label:'Tree'}, forest:{emoji:'🏔',label:'Forest'}
};

// ════════════════════════════════════
//  State
// ════════════════════════════════════
let mode        = 'video';
let stopped     = false;
let sessionStart = Date.now();
let stopStart   = null;
let stopInterval = null;
let stopCount   = 0;
let currentStep = 0;
let doneSteps   = new Set();
let stepInputs  = {};
let seeds       = [];
let questions   = [];
let speakingA   = false;
let speakingB   = false;
let miniMode    = false;
let obsMode     = false;

// ════════════════════════════════════
//  2-Person Flow (役割付き)
// ════════════════════════════════════
// speaker: 'a'=進行役, 'b'=学習者, 'both'=両方
const FLOWS = {
  video: [
    {title:'① 止めた理由を言う',    desc:'「ここで止めます。——という言葉が出ました」とAが声に出す。',                       speaker:'a', inputType:'input',    placeholder:'止めた理由・キーワード', seedField:'title'},
    {title:'② Bに問いを投げる',      desc:'AがBへ：「これって何だと思う？」Bが自分の言葉で答えてみる。',                      speaker:'a', inputType:null},
    {title:'③ Bが自分の言葉で答える',desc:'Bが説明する。Aはコメントを拾いながら補足する。',                                     speaker:'b', inputType:'textarea', placeholder:'Bの説明（Seedの「自分の言葉」に転記）', seedField:'myWords'},
    {title:'④ 一緒に例えを作る',     desc:'AとBで日常の例えを出し合う。「バナナで言うと…」「給料で言うと…」',                  speaker:'both', inputType:'input', placeholder:'例え（Seedの「例え」に転記）', seedField:'example'},
    {title:'⑤ Seedに記録する',       desc:'Aが下のフォームに入力して記録。③と④の内容が転記されています。',                      speaker:'a', inputType:null},
    {title:'⑥ 再生へ',               desc:'「では続きを見ましょう」と声に出して再開。',                                          speaker:'both', inputType:null}
  ],
  text: [
    {title:'① 止めた箇所を読み上げる',desc:'Aがゆっくり読む。「ここで止めます」と声に出す。',                                   speaker:'a', inputType:'input',    placeholder:'止めた箇所のキーワード', seedField:'title'},
    {title:'② Bが言い換える',          desc:'AがBへ：「このセンテンス、自分の言葉で言うと？」Bが言い換えを試みる。',             speaker:'b', inputType:'textarea', placeholder:'Bの言い換え（Seedの「自分の言葉」に転記）', seedField:'myWords'},
    {title:'③ 一緒に最適な表現を選ぶ', desc:'AとBで「一番しっくりきた表現」を選んで共有する。',                                  speaker:'both', inputType:'input', placeholder:'選んだ表現', seedField:'example'},
    {title:'④ 文脈を確認する',          desc:'「この段落で言いたいことは？」骨格を整理。AとBで前後のつながりを見る。',            speaker:'both', inputType:'input', placeholder:'文脈メモ', seedField:null},
    {title:'⑤ Seedに記録する',          desc:'Aが下のフォームに入力して記録。②と③の内容が転記されています。',                    speaker:'a', inputType:null},
    {title:'⑥ 次の段落へ',              desc:'「では次に進みます」と一言添えて読み進める。',                                       speaker:'both', inputType:null}
  ]
};

const SPEAKER_META = {
  a:    {badge:'speaker-a',    label: () => document.getElementById('nameA').value || 'A'},
  b:    {badge:'speaker-b',    label: () => document.getElementById('nameB').value || 'B'},
  both: {badge:'speaker-both', label: () => '両方'}
};

// ════════════════════════════════════
//  Init
// ════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  renderCurrentStep();
  renderDots();
  startSessionTimer();
  loadSeeds();
  loadQuestions();
  renderMiniDuo();
  // rb-tree-method.htmlとのSeed共有チェック
  const existing = localStorage.getItem(SEED_KEY);
  if (existing) {
    try { seeds = JSON.parse(existing); renderSeeds(); updateStats(); } catch {}
  }
});

// ════════════════════════════════════
//  Mode (video/text)
// ════════════════════════════════════
function setMode(m) {
  mode = m;
  document.getElementById('stepModeBadge').textContent = m==='video' ? '📹 動画' : '📄 文章';
  document.getElementById('modeVideoBtnHead').style.color = m==='video' ? 'var(--acc)' : 'var(--muted)';
  document.getElementById('modeTextBtnHead' ).style.color = m==='text'  ? 'var(--acc)' : 'var(--muted)';
  doneSteps = new Set(); stepInputs = {}; currentStep = 0;
  renderCurrentStep(); renderDots(); renderMiniDuo();
}

// ════════════════════════════════════
//  Step flow
// ════════════════════════════════════
function renderCurrentStep() {
  const steps = FLOWS[mode];
  const s     = steps[currentStep];
  if (!s) return;

  document.getElementById('scNum'  ).textContent = currentStep + 1;
  document.getElementById('scOf'   ).textContent = `/ ${steps.length}`;
  document.getElementById('scTitle').textContent = s.title;
  document.getElementById('scDesc' ).textContent = s.desc;
  document.getElementById('stepProg').textContent = `${doneSteps.size}/${steps.length}`;

  // 話者バッジ
  const meta = SPEAKER_META[s.speaker];
  document.getElementById('scSpeaker').innerHTML = meta
    ? `<span class="speaker-badge ${meta.badge}">${meta.label()} が話す</span>` : '';

  // 入力
  const wrap = document.getElementById('scInputWrap');
  const val  = stepInputs[currentStep] || '';
  if (s.inputType === 'input') {
    wrap.innerHTML = `<input class="sc-input" id="scIn"
      placeholder="${escHtml(s.placeholder||'')}" value="${escHtml(val)}"
      oninput="onStepInput(this.value)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();nextStep();}">`;
  } else if (s.inputType === 'textarea') {
    wrap.innerHTML = `<textarea class="sc-textarea" id="scIn"
      placeholder="${escHtml(s.placeholder||'')}"
      oninput="onStepInput(this.value)"
      onkeydown="if(event.key==='Enter'&&event.ctrlKey){event.preventDefault();nextStep();}"
    >${escHtml(val)}</textarea>`;
  } else {
    wrap.innerHTML = '';
  }

  // 次へボタン
  const btn = document.getElementById('btnStepNext');
  btn.disabled = currentStep >= steps.length - 1;
  btn.textContent = currentStep === steps.length - 2 ? 'Seedを記録 🌱' : '次へ →';

  renderMiniDuo();
}

function renderDots() {
  const steps = FLOWS[mode];
  document.getElementById('stepDots').innerHTML = steps.map((s, i) => {
    const cls = doneSteps.has(i) ? 'done' : i===currentStep ? 'active' : '';
    return `<div class="step-dot ${cls}" onclick="goToStep(${i})" title="${s.title}">${doneSteps.has(i)?'✓':i+1}</div>`;
  }).join('');
}

function goToStep(idx) {
  for (let i = 0; i < FLOWS[mode].length; i++) {
    if (i < idx) doneSteps.add(i);
    else doneSteps.delete(i);
  }
  currentStep = idx;
  renderCurrentStep(); renderDots();
}

function nextStep() {
  const max = FLOWS[mode].length - 1;
  if (currentStep >= max) return;
  doneSteps.add(currentStep);
  currentStep++;
  renderCurrentStep(); renderDots();
  if (currentStep === max && stopped) setTimeout(() => { if(stopped) toggleStop(); }, 600);
}

function prevStep() {
  if (currentStep === 0) return;
  doneSteps.delete(currentStep - 1);
  currentStep--;
  renderCurrentStep(); renderDots();
}

function resetSteps() {
  doneSteps = new Set(); stepInputs = {}; currentStep = 0;
  renderCurrentStep(); renderDots();
  document.getElementById('seedTitle').value = '';
  document.getElementById('seedWords').value = '';
}

function onStepInput(val) {
  stepInputs[currentStep] = val;
  const s = FLOWS[mode][currentStep];
  if (!s.seedField) return;
  if (s.seedField === 'title') {
    const el = document.getElementById('seedTitle');
    if (el && !el.value) el.value = val;
    const mi = document.getElementById('miniSeedInput');
    if (mi && !mi.value) mi.value = val;
  } else if (s.seedField === 'myWords') {
    document.getElementById('seedWords').value = val;
  }
}

// ════════════════════════════════════
//  Stop / Resume
// ════════════════════════════════════
function toggleStop() {
  stopped = !stopped;
  document.getElementById('btnStop'  ).style.display = stopped ? 'none'        : 'inline-flex';
  document.getElementById('btnResume').style.display = stopped ? 'inline-flex' : 'none';

  if (stopped) {
    stopCount++;
    stopStart    = Date.now();
    stopInterval = setInterval(updateStopTimer, 1000);
    resetSteps();
    updateStats();
  } else {
    if (stopStart) stopStart = null;
    clearInterval(stopInterval);
    document.getElementById('stopTimerInline').classList.remove('show');
    document.getElementById('stopTimerInline').textContent = '停止中 0:00';
    updateStats();
  }

  // Mini sync
  const msb   = document.getElementById('miniStopBtn');
  const mslbl = document.getElementById('miniStopLabel');
  const mstmr = document.getElementById('miniStopTimer');
  if (msb) {
    msb.classList.toggle('resume', !stopped);
    mslbl.textContent = stopped ? '▶ 再開' : '⏸ 止める';
    if (mstmr) mstmr.style.display = stopped ? '' : 'none';
  }
  const card = document.getElementById('miniStepCard');
  if (card) card.classList.toggle('on', stopped);

  renderMiniDuo();
}

function updateStopTimer() {
  if (!stopStart) return;
  const sec = Math.floor((Date.now() - stopStart) / 1000);
  const txt = `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
  const inl = document.getElementById('stopTimerInline');
  if (inl) { inl.textContent = `停止中 ${txt}`; inl.classList.add('show'); }
  const mt = document.getElementById('miniStopTimer');
  if (mt) mt.textContent = txt;
}

// ════════════════════════════════════
//  Session timer
// ════════════════════════════════════
function startSessionTimer() {
  setInterval(() => {
    const sec = Math.floor((Date.now() - sessionStart) / 1000);
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    document.getElementById('sessionTimer').textContent =
      h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
             : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

// ════════════════════════════════════
//  Characters
// ════════════════════════════════════
function toggleSpeak(who) {
  if (who === 'a') { speakingA = !speakingA; renderSpeakState(); }
  else             { speakingB = !speakingB; renderSpeakState(); }
}

function renderSpeakState() {
  const btnA    = document.getElementById('speakBtnA');
  const btnB    = document.getElementById('speakBtnB');
  const avA     = document.getElementById('avatarA');
  const avB     = document.getElementById('avatarB');
  const pillA   = document.getElementById('miniPillA');
  const pillB   = document.getElementById('miniPillB');
  if (btnA) { btnA.classList.toggle('on', speakingA); btnA.textContent = speakingA ? '🎙 話し中…' : '🎙 話す'; }
  if (btnB) { btnB.classList.toggle('on', speakingB); btnB.textContent = speakingB ? '🎙 話し中…' : '🎙 話す'; }
  if (avA)  avA.classList.toggle('speaking', speakingA);
  if (avB)  avB.classList.toggle('speaking', speakingB);
  if (pillA) pillA.classList.toggle('speaking', speakingA);
  if (pillB) pillB.classList.toggle('speaking', speakingB);
}

function syncNames() {
  document.getElementById('miniNameA').textContent = document.getElementById('nameA').value || 'A';
  document.getElementById('miniNameB').textContent = document.getElementById('nameB').value || 'B';
  renderCurrentStep(); // 話者バッジを更新
}

function setCharColor(who, color) {
  document.documentElement.style.setProperty(who==='a' ? '--a-color' : '--b-color', color);
}

// ════════════════════════════════════
//  Seeds
// ════════════════════════════════════
const MILESTONES = {1:'最初のSeedを記録 🌱', 5:'5件到達！🌿', 10:'10件！森が育っています 🌳'};

function loadSeeds() {
  try { seeds = JSON.parse(localStorage.getItem(SEED_KEY)||'[]'); } catch { seeds=[]; }
  renderSeeds(); updateStats();
}

function saveSeed() {
  const title = document.getElementById('seedTitle').value.trim();
  if (!title) { showToast('用語名を入力してください'); return; }
  const seed = {
    id: Date.now().toString(), title,
    myWords: document.getElementById('seedWords').value.trim(),
    stage: 'seed',
    time: new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})
  };
  seeds.unshift(seed);
  localStorage.setItem(SEED_KEY, JSON.stringify(seeds));
  document.getElementById('seedTitle').value = '';
  document.getElementById('seedWords').value = '';
  renderSeeds(); updateStats(); renderSidebarSeeds();
  resetSteps();
  const m = MILESTONES[seeds.length];
  if (m) showToast(m, 'milestone'); else showToast(`🌱 「${title}」を記録しました`);
}

function deleteSeed(id) {
  seeds = seeds.filter(s => s.id !== id);
  localStorage.setItem(SEED_KEY, JSON.stringify(seeds));
  renderSeeds(); updateStats(); renderSidebarSeeds();
}

function renderSeeds() {
  const hist  = document.getElementById('seedHistory');
  const empty = document.getElementById('seedEmpty');
  const count = document.getElementById('seedCount');
  count.textContent = `${seeds.length} seeds`;
  hist.querySelectorAll('.seed-item').forEach(el => el.remove());
  empty.style.display = seeds.length === 0 ? 'block' : 'none';
  seeds.forEach(s => {
    const el = document.createElement('div');
    el.className = 'seed-item';
    el.innerHTML = `
      <span class="si-stage">🌱</span>
      <div class="si-body">
        <div class="si-title">${escHtml(s.title)}</div>
        ${s.myWords ? `<div class="si-words">${escHtml(s.myWords)}</div>` : ''}
      </div>
      <button class="si-del" onclick="deleteSeed('${s.id}')">✕</button>`;
    hist.appendChild(el);
  });
  if (document.getElementById('miniSeedInput')) {
    document.getElementById('mStatSeed').textContent = seeds.length;
  }
}

function renderSidebarSeeds() {
  // キャラA/Bのサイドバーに最新3件ずつ表示
  ['seedsA'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = seeds.slice(0,5).map(s => `
      <div class="char-seed-card">
        <div class="char-seed-title">${escHtml(s.title)}</div>
        ${s.myWords ? `<div class="char-seed-words">${escHtml(s.myWords)}</div>` : ''}
      </div>`).join('');
  });
  // Bの理解チェック
  const ul = document.getElementById('understandList');
  if (ul) {
    ul.innerHTML = seeds.slice(0,5).map(s => `
      <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--line);">
        <span style="font-size:11px;flex:1;color:var(--muted);">${escHtml(s.title)}</span>
        <span onclick="this.textContent=this.textContent==='✅'?'❓':'✅'"
          style="cursor:pointer;font-size:13px;">❓</span>
      </div>`).join('');
  }
}

// ════════════════════════════════════
//  Questions
// ════════════════════════════════════
function loadQuestions() {
  try { questions = JSON.parse(localStorage.getItem(Q_KEY)||'[]'); } catch { questions=[]; }
  renderQuestions();
}

function addQuestion() {
  const inp = document.getElementById('qInput');
  const q   = inp.value.trim();
  if (!q) return;
  questions.unshift({id:Date.now().toString(), text:q, done:false});
  localStorage.setItem(Q_KEY, JSON.stringify(questions));
  inp.value = '';
  renderQuestions(); updateStats();
}

function toggleQ(id) {
  const q = questions.find(q => q.id===id);
  if (q) { q.done = !q.done; localStorage.setItem(Q_KEY, JSON.stringify(questions)); renderQuestions(); }
}

function deleteQ(id) {
  questions = questions.filter(q => q.id!==id);
  localStorage.setItem(Q_KEY, JSON.stringify(questions));
  renderQuestions(); updateStats();
}

function renderQuestions() {
  const list = document.getElementById('qList');
  const cnt  = document.getElementById('qCount');
  cnt.textContent = questions.filter(q => !q.done).length;
  list.querySelectorAll('.q-item').forEach(el => el.remove());
  questions.forEach(q => {
    const el = document.createElement('div');
    el.className = 'q-item' + (q.done?' done':'');
    el.innerHTML = `
      <span class="q-mark">❓</span>
      <span class="q-text">${escHtml(q.text)}</span>
      <button class="q-check" onclick="toggleQ('${q.id}')">✓</button>
      <button class="q-del"   onclick="deleteQ('${q.id}')">✕</button>`;
    list.appendChild(el);
  });
  if (document.getElementById('mStatQ')) document.getElementById('mStatQ').textContent = questions.length;
}

// ════════════════════════════════════
//  Stats
// ════════════════════════════════════
function updateStats() {
  document.getElementById('statStop').textContent = stopCount;
  document.getElementById('statSeed').textContent = seeds.length;
  document.getElementById('statQ'   ).textContent = questions.length;
  const lbl = document.getElementById('exportLbl');
  if (lbl && seeds.length > 0) lbl.textContent = `Seeds ${seeds.length}件・問い ${questions.length}件`;
}

// ════════════════════════════════════
//  Export
// ════════════════════════════════════
function exportSession() {
  if (seeds.length===0 && questions.length===0) { showToast('まだ記録がありません'); return; }
  const nameA = document.getElementById('nameA').value || 'A';
  const nameB = document.getElementById('nameB').value || 'B';
  const topic = document.getElementById('topicInput').value || '（テーマ未設定）';
  const date  = new Date().toLocaleDateString('ja-JP');
  const lines = [
    `# RB-Tree学習 2人セッション — ${date}`,
    `> テーマ: ${topic}　進行役: ${nameA}　学習者: ${nameB}`,
    `> 停止: ${stopCount}回　Seeds: ${seeds.length}件　問い: ${questions.length}件`, ''
  ];
  if (seeds.length > 0) {
    lines.push('## 🌱 Seeds', '');
    seeds.slice().reverse().forEach(s => {
      lines.push(`### ${s.title} (${s.time})`);
      if (s.myWords) lines.push(`**自分の言葉**: ${s.myWords}`);
      lines.push('');
    });
  }
  if (questions.length > 0) {
    lines.push('## ❓ 問いログ', '');
    questions.slice().reverse().forEach(q => {
      lines.push(`- ${q.done?'~~':''}${q.text}${q.done?'~~':''}`);
    });
    lines.push('');
  }
  const noteA = document.getElementById('noteA')?.value.trim();
  const noteB = document.getElementById('noteB')?.value.trim();
  if (noteA) lines.push(`## ${nameA} のメモ`, noteA, '');
  if (noteB) lines.push(`## ${nameB} のメモ`, noteB, '');

  const blob = new Blob([lines.join('\n')],{type:'text/markdown;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `rbtree-duo-${TODAY}.md`; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 500);
  showToast('📄 書き出しました');
}

function clearSession() {
  if (seeds.length===0 && questions.length===0) { showToast('記録がありません'); return; }
  if (!confirm(`Seeds ${seeds.length}件・問い ${questions.length}件をクリアしますか？`)) return;
  seeds=[]; questions=[]; stopCount=0;
  localStorage.removeItem(SEED_KEY); localStorage.removeItem(Q_KEY);
  renderSeeds(); renderSidebarSeeds(); renderQuestions(); updateStats(); resetSteps();
  showToast('クリアしました');
}

// ════════════════════════════════════
//  Mini Mode
// ════════════════════════════════════
function toggleMiniMode() {
  miniMode = !miniMode;
  document.body.classList.toggle('mini', miniMode);
  const btn = document.getElementById('btnMini');
  btn.textContent = miniMode ? '⛶ フル' : '⬜ ミニ';
  btn.classList.toggle('active', miniMode);
  if (miniMode) renderMiniDuo();
}

function renderMiniDuo() {
  if (!miniMode) return;
  const steps = FLOWS[mode];
  const s     = steps[currentStep];
  if (!s) return;

  document.getElementById('miniNum'  ).textContent = currentStep + 1;
  document.getElementById('miniOf'   ).textContent = `/ ${steps.length}`;
  document.getElementById('miniTitle').textContent = s.title;
  document.getElementById('miniDesc' ).textContent = s.desc;

  const meta = SPEAKER_META[s.speaker];
  const badge = document.getElementById('miniSpeakerBadge');
  if (badge && meta) {
    badge.className = `mini-speaker-badge ${meta.badge==='speaker-a'?'speaker-a':meta.badge==='speaker-b'?'speaker-b':'speaker-both'}`;
    badge.textContent = meta.label() + ' が話す';
  }

  const wrap = document.getElementById('miniInWrap');
  const val  = stepInputs[currentStep] || '';
  if (s.inputType === 'input') {
    wrap.innerHTML = `<input class="mini-step-input" value="${escHtml(val)}"
      placeholder="${escHtml(s.placeholder||'')}"
      oninput="onStepInput(this.value)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();nextStep();}">`;
  } else if (s.inputType === 'textarea') {
    wrap.innerHTML = `<textarea class="mini-step-input" style="min-height:48px;resize:none;"
      placeholder="${escHtml(s.placeholder||'')}"
      oninput="onStepInput(this.value)"
      onkeydown="if(event.key==='Enter'&&event.ctrlKey){event.preventDefault();nextStep();}"
    >${escHtml(val)}</textarea>`;
  } else {
    wrap.innerHTML = '';
  }

  document.getElementById('miniPrevBtn').disabled = currentStep === 0;
  document.getElementById('miniNextBtn').disabled = currentStep >= steps.length - 1;
  document.getElementById('miniNameA').textContent = document.getElementById('nameA')?.value || 'A';
  document.getElementById('miniNameB').textContent = document.getElementById('nameB')?.value || 'B';
  document.getElementById('mStatStop').textContent = stopCount;
  document.getElementById('mStatSeed').textContent = seeds.length;
  document.getElementById('mStatQ'   ).textContent = questions.length;
}

function miniSaveSeed() {
  const inp = document.getElementById('miniSeedInput');
  const t   = inp?.value.trim();
  if (!t) return;
  document.getElementById('seedTitle').value = t;
  saveSeed();
  if (inp) inp.value = '';
}

// ════════════════════════════════════
//  OBS Mode
// ════════════════════════════════════
function toggleObsMode() {
  obsMode = !obsMode;
  document.body.classList.toggle('obs-mode', obsMode);
  const btn = document.getElementById('btnObs');
  btn.textContent = obsMode ? '📺 OBS解除' : '📺 OBS';
  btn.classList.toggle('active', obsMode);
}

// ════════════════════════════════════
//  Utils
// ════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
