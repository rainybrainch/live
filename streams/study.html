<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学朱雨会 — RAINYBRAIN</title>
<style>
:root {
  --accent: #c890d8;
  --line: rgba(255,255,255,.13);
  --text: #f7f8fb;
  --muted: rgba(247,248,251,.58);
  --font-ui: "Yu Gothic","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  --font-title: "Yu Mincho","Hiragino Mincho ProN","BIZ UDPMincho",serif;
  color-scheme: dark;
}
* { box-sizing: border-box; }
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#080612; color:var(--text); font-family:var(--font-ui); }
button,input,select,textarea { font:inherit; }
button { min-height:36px; border:1px solid var(--line); border-radius:8px; background:rgba(255,255,255,.08); color:var(--text); padding:7px 10px; cursor:pointer; }
button:hover { background:rgba(255,255,255,.14); }
button.primary { border-color:rgba(200,144,216,.55); background:rgba(200,144,216,.18); }
button.good    { border-color:rgba(100,210,255,.5);  background:rgba(100,210,255,.16); }
button.warn    { border-color:rgba(255,147,189,.5);  background:rgba(255,147,189,.14); }
input,select,textarea { width:100%; border:1px solid var(--line); border-radius:8px; background:rgba(0,0,0,.28); color:var(--text); padding:9px 10px; outline:none; }
textarea { min-height:70px; resize:vertical; line-height:1.55; }

.stage { position:fixed; inset:0; background:radial-gradient(circle at 22% 12%, rgba(200,144,216,.16), transparent 30rem),radial-gradient(circle at 78% 14%, rgba(120,60,180,.1), transparent 26rem),linear-gradient(160deg,#0a0414,#0d0820 55%,#080612); }
.stage::before,.stage::after { content:''; position:absolute; pointer-events:none; border-radius:50%; filter:blur(90px); z-index:0; }
.stage::before { width:44vw; height:42vh; left:4%; top:5%; background:radial-gradient(circle,rgba(200,144,216,.14),transparent 70%); animation:orb1 30s ease-in-out infinite alternate; }
.stage::after  { width:38vw; height:38vh; right:1%; bottom:16%; background:radial-gradient(circle,rgba(80,40,140,.14),transparent 70%); animation:orb2 38s ease-in-out infinite alternate; }
@keyframes orb1{from{transform:translate(0,0) scale(1);}to{transform:translate(9vw,11vh) scale(1.22);}}
@keyframes orb2{from{transform:translate(0,0) scale(1);}to{transform:translate(-7vw,-9vh) scale(0.82);}}

.brand { position:absolute; top:20px; left:24px; display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--line); border-radius:8px; background:rgba(8,6,18,.65); backdrop-filter:blur(10px); z-index:10; }
.mark { width:30px; height:30px; display:grid; place-items:center; border-radius:7px; background:linear-gradient(135deg,var(--accent),#8040c0); color:#080612; font-weight:900; font-size:12px; }
.brand strong { display:block; font-size:13px; line-height:1; }
.brand span   { display:block; color:var(--muted); font-size:10px; font-weight:800; margin-top:2px; }

.timer-display { position:absolute; top:20px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:10px; padding:9px 16px; border:1px solid rgba(255,255,255,.14); border-radius:999px; background:rgba(8,6,18,.65); backdrop-filter:blur(10px); z-index:10; }
.timer-time { font-size:clamp(18px,1.6vw,28px); font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:.06em; }
.timer-display.running { border-color:rgba(200,144,216,.45); box-shadow:0 0 22px rgba(200,144,216,.16),inset 0 0 12px rgba(200,144,216,.06); }
.timer-display.running .timer-time { color:var(--accent); }
.timer-label { font-size:10px; font-weight:900; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; }
.timer-btn { width:28px; height:28px; min-height:28px; padding:0; display:grid; place-items:center; border-radius:8px; font-size:13px; border-color:rgba(200,144,216,.36); }
.timer-btn.running { background:linear-gradient(180deg,#edd0f8,var(--accent)); color:#080612; }

.avatar { position:absolute; right:2vw; bottom:118px; width:30vw; height:calc(100vh - 155px); display:grid; place-items:end center; }
.avatar.empty::before { content:"V CHARACTER"; width:100%; height:100%; display:grid; place-items:center; border:2px dashed rgba(255,255,255,.16); border-radius:12px; color:rgba(255,255,255,.32); font-weight:900; letter-spacing:.08em; }
.avatar img,.avatar video { max-width:100%; max-height:100%; object-fit:contain; filter:drop-shadow(0 24px 40px rgba(0,0,0,.48)); }

/* 黒板スタイルのキーポイント表示 */
.keypoint-display { position:absolute; left:34vw; bottom:240px; width:clamp(180px,18vw,280px); padding:14px 16px; border:2px solid rgba(200,144,216,.3); border-radius:10px; background:rgba(20,10,40,.82); backdrop-filter:blur(8px); display:none; }
.keypoint-display.show { display:block; }
.kp-label { font-size:9px; font-weight:900; letter-spacing:.16em; color:rgba(200,144,216,.65); text-transform:uppercase; margin-bottom:7px; }
.kp-text  { font-family:var(--font-title); font-size:clamp(14px,1.4vw,20px); font-weight:700; color:#f0eeff; line-height:1.4; }

.comment-tracks { position:absolute; left:0; right:0; bottom:0; height:108px; overflow:hidden; pointer-events:none; z-index:8; background:linear-gradient(0deg,rgba(0,0,0,.40),transparent); box-shadow:0 -28px 56px rgba(0,0,0,.44); }
.c-track { height:36px; position:relative; overflow:hidden; border-bottom:1px solid rgba(255,255,255,.045); }
.comment-h { position:absolute; top:0; left:0; height:100%; display:inline-flex; align-items:center; gap:7px; padding:0 18px 0 10px; border-left:3px solid var(--user-color); background:rgba(0,0,0,.56); backdrop-filter:blur(8px); border-radius:0 999px 999px 0; font-size:clamp(13px,1.35vw,19px); font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,.7); transform:translateX(100vw); animation:fly-left var(--speed,14s) linear forwards,comment-enter 1s ease-out forwards; white-space:nowrap; }
.comment-h .user { color:var(--user-color); font-weight:900; font-size:.8em; opacity:.9; }
.comment-h .user::before { content:'●'; margin-right:4px; font-size:.55em; vertical-align:middle; opacity:.7; }
.comment-h .text { color:var(--text); }
@keyframes fly-left{from{transform:translateX(100vw);}to{transform:translateX(calc(-100% - 20px));}}
@keyframes comment-enter{0%{opacity:0;box-shadow:0 0 28px var(--user-color),inset 0 0 10px rgba(255,255,255,.06);}10%{opacity:1;box-shadow:0 0 16px var(--user-color);}45%{box-shadow:0 0 6px color-mix(in srgb,var(--user-color) 50%,transparent);}100%{box-shadow:0 0 2px color-mix(in srgb,var(--user-color) 18%,transparent);}}

.title-card { position:absolute; left:32px; bottom:178px; width:min(500px,42vw); padding:14px 18px; border-left:5px solid var(--accent); border-top:1px solid rgba(255,255,255,.12); border-right:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08); border-radius:8px; background:linear-gradient(90deg,rgba(8,6,18,.88),rgba(8,6,18,.42)); backdrop-filter:blur(10px); }
.kicker { color:var(--accent); font-size:11px; font-weight:900; letter-spacing:.1em; margin-bottom:6px; text-transform:uppercase; }
.card-title { font-family:var(--font-title); font-size:clamp(22px,2.6vw,42px); line-height:1.1; font-weight:900; overflow-wrap:anywhere; }
.card-meta  { margin-top:5px; color:rgba(247,248,251,.7); font-size:clamp(12px,1.1vw,15px); font-family:var(--font-title); }

.caption { position:absolute; left:50%; bottom:112px; transform:translateX(-50%); width:min(860px,calc(100vw - 56px)); min-height:52px; display:grid; place-items:center; padding:11px 20px; border:1px solid rgba(255,255,255,.14); border-top:2px solid rgba(200,144,216,.28); border-radius:8px; background:rgba(4,2,12,.75); backdrop-filter:blur(10px); text-align:center; font-family:var(--font-title); font-size:clamp(18px,1.9vw,28px); line-height:1.35; font-weight:900; text-shadow:0 2px 3px rgba(0,0,0,.6); z-index:6; transition:border-top-color .3s; }
@keyframes cap-flash{0%{border-top-color:var(--accent);box-shadow:0 -2px 20px rgba(200,144,216,.32);}100%{border-top-color:rgba(200,144,216,.28);box-shadow:none;}}
.caption.flash-in { animation:cap-flash 0.8s ease-out forwards; }

.dock { position:fixed; right:14px; top:14px; width:min(420px,calc(100vw - 28px)); max-height:calc(100vh - 28px); overflow:auto; border:1px solid rgba(255,255,255,.13); border-radius:10px; background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018)),rgba(10,6,20,.92); backdrop-filter:blur(16px); z-index:20; box-shadow:0 28px 80px rgba(0,0,0,.44); }
body.panel-hidden .dock { display:none; }
.dock-head { display:flex; align-items:center; gap:9px; padding:12px 14px; border-bottom:1px solid var(--line); background:linear-gradient(90deg,rgba(200,144,216,.14),transparent 60%),rgba(255,255,255,.04); }
.dock-title { flex:1; font-size:14px; font-weight:900; }
.dock-title span { display:block; color:var(--muted); font-size:10px; margin-top:2px; }
.dock-body { padding:12px; display:grid; gap:12px; }
.section { border:1px solid rgba(255,255,255,.1); border-radius:8px; background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.024)); padding:12px; display:grid; gap:10px; }
.section-title { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:900; }
.step { width:22px; height:22px; display:grid; place-items:center; border-radius:999px; background:var(--accent); color:#080612; font-size:12px; font-weight:900; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.actions .wide { grid-column:1/-1; }
.actions button { min-height:44px; font-weight:900; }
.field { display:grid; gap:5px; }
.field label { color:var(--muted); font-size:11px; font-weight:900; }
.field input,.field select,.field textarea { min-height:40px; }
.log { color:var(--muted); font-size:11px; line-height:1.45; border:1px solid var(--line); border-radius:8px; padding:8px; background:rgba(0,0,0,.2); max-height:80px; overflow:auto; }
.status-text { color:var(--muted); font-size:11px; font-weight:800; }
details { border:1px solid rgba(255,255,255,.1); border-radius:8px; background:rgba(0,0,0,.14); }
summary { cursor:pointer; padding:10px; color:var(--muted); font-size:12px; font-weight:900; }
details .inner { padding:0 10px 10px; display:grid; gap:10px; }
.transcript-plan-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.plan-btn { position:relative; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 8px; border-radius:9px; font-size:12px; font-weight:900; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--muted); cursor:pointer; transition:all .15s; }
.plan-btn.active { border-color:rgba(200,144,216,.5); background:rgba(200,144,216,.14); color:var(--text); }
.plan-btn.pro { border-color:rgba(200,144,216,.3); color:rgba(200,144,216,.6); cursor:default; }
.plan-tag { font-size:9px; font-weight:700; letter-spacing:.08em; opacity:.7; }
.plan-soon { position:absolute; top:-7px; right:-4px; background:rgba(200,144,216,.22); border:1px solid rgba(200,144,216,.4); color:#c890d8; font-size:9px; font-weight:900; padding:2px 6px; border-radius:999px; }
.pro-placeholder { display:grid; gap:10px; padding:14px; border:1px dashed rgba(200,144,216,.25); border-radius:10px; background:rgba(200,144,216,.04); text-align:center; }
.pro-placeholder-title { font-size:13px; font-weight:900; color:rgba(200,144,216,.8); }
.pro-placeholder-desc  { font-size:11px; color:var(--muted); line-height:1.6; }

.open-tab { position:fixed; right:14px; bottom:122px; z-index:40; display:none; align-items:center; gap:8px; min-height:44px; padding:0 14px; border:1px solid rgba(255,255,255,.22); border-radius:8px; background:rgba(8,6,18,.86); color:var(--text); box-shadow:0 16px 40px rgba(0,0,0,.44); backdrop-filter:blur(14px); font-weight:900; font-size:13px; }
body.panel-hidden .open-tab { display:inline-flex; }
.open-tab-dot { width:8px; height:8px; border-radius:999px; background:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent); }
.toast { position:absolute; bottom:230px; left:50%; transform:translateX(-50%); padding:9px 18px; border-radius:8px; background:rgba(6,4,16,.92); border:1px solid rgba(255,255,255,.2); color:var(--text); font-size:12px; font-weight:900; letter-spacing:.04em; z-index:50; pointer-events:none; white-space:nowrap; opacity:0; transition:opacity .22s; }
.toast.show { opacity:1; }
.mic-live { display:none; color:var(--accent); font-size:10px; font-weight:900; letter-spacing:.1em; }
.mic-live.active { display:block; animation:blink 1.2s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes flashanim{0%,100%{opacity:1}50%{opacity:.15}}
.timer-display.flash { animation:flashanim .35s 8; }
</style>
</head>
<body>

<main class="stage" id="stage">
  <div id="toast" class="toast"></div>
  <div class="brand">
    <div class="mark">RB</div>
    <div><strong>RAINYBRAIN</strong><span id="brandMode">GAKUSHUUKAI</span></div>
    <div class="mic-live" id="micLive">● LIVE</div>
  </div>
  <div class="timer-display" id="timerDisplay">
    <div>
      <div class="timer-time" id="timerTime">--:--</div>
      <div class="timer-label" id="timerLabel">REC TIMER</div>
    </div>
    <button class="timer-btn" id="stageTimerToggle" type="button">▶</button>
    <button class="timer-btn" id="stageTimerReset"  type="button">↺</button>
  </div>
  <div class="avatar empty" id="avatar"></div>
  <div class="keypoint-display" id="keypointDisplay">
    <div class="kp-label">KEY POINT</div>
    <div class="kp-text" id="kpText">—</div>
  </div>
  <div class="comment-tracks" id="commentTracks">
    <div class="c-track" id="track0"></div>
    <div class="c-track" id="track1"></div>
    <div class="c-track" id="track2"></div>
  </div>
  <section class="title-card">
    <div class="kicker" id="kicker">GAKUSHUUKAI</div>
    <div class="card-title" id="cardTitle">今日のテーマ</div>
    <div class="card-meta"  id="cardMeta"></div>
  </section>
  <div class="caption" id="caption">「マイク開始」で文字起こしが始まります</div>
</main>

<aside id="dock" class="dock">
  <div class="dock-head">
    <div class="dock-title">学朱雨会<span>RAINYBRAIN 教育・AI解説配信</span></div>
    <button id="hideDock"  type="button">閉じる</button>
    <button id="micBtn" class="good" type="button">マイク開始</button>
  </div>
  <div class="dock-body">
    <section class="section">
      <div class="section-title"><span class="step">1</span>授業情報</div>
      <div class="field"><label for="lessonTitle">今日のテーマ</label><input id="lessonTitle" placeholder="例: AIの仕組みを学ぶ"></div>
      <div class="field"><label for="subject">科目・カテゴリ</label><input id="subject" placeholder="例: AI・機械学習　/ 数学　/ 哲学"></div>
      <div class="field"><label for="keyPoint">キーポイント（ステージ表示）</label><input id="keyPoint" placeholder="例: 機械学習とは「経験から学ぶ」プログラム"></div>
      <div class="actions">
        <button id="applyBtn" class="primary wide" type="button">ステージに反映</button>
        <button id="copyObsBtn" type="button">OBS URL</button>
        <button id="fullscreenBtn" type="button">全画面</button>
      </div>
    </section>
    <section class="section">
      <div class="section-title"><span class="step">2</span>収録タイマー</div>
      <div class="grid2">
        <div class="field"><label for="timerMinutes">分</label><input id="timerMinutes" type="number" min="1" max="240" value="45"></div>
        <div class="field"><label for="timerPreset">プリセット</label>
          <select id="timerPreset"><option value="45">45分</option><option value="30">30分</option><option value="60">60分</option><option value="90">90分</option></select>
        </div>
      </div>
      <div class="actions">
        <button id="timerSetBtn"   type="button">反映</button>
        <button id="timerStartBtn" class="good" type="button">開始</button>
        <button id="timerResetBtn" type="button">リセット</button>
      </div>
    </section>
    <section class="section">
      <div class="section-title"><span class="step">3</span>文字起こし</div>
      <div class="transcript-plan-row">
        <button class="plan-btn active" id="planFreeBtn" type="button">無料<span class="plan-tag">Web Speech</span></button>
        <button class="plan-btn pro"    id="planProBtn"  type="button">Pro<span class="plan-tag">Whisper API</span><span class="plan-soon">準備中</span></button>
      </div>
      <div id="planFreeArea">
        <div class="actions">
          <button id="clearTranscriptBtn" type="button">字幕クリア</button>
          <button id="commentBtn" class="warn" type="button">コメント1件</button>
        </div>
        <div class="field"><label for="manualTranscript">板書・キーワード入力（Enter で反映）</label><input id="manualTranscript" placeholder="例: 過学習とは何か"></div>
        <div id="transcriptLog" class="log">まだ文字起こしはありません。</div>
      </div>
      <div id="planProArea" style="display:none">
        <div class="pro-placeholder">
          <div style="font-size:1.8rem">🎙</div>
          <div class="pro-placeholder-title">Whisper API 連携</div>
          <div class="pro-placeholder-desc">高精度な音声認識。Pro プランで利用可能になります。</div>
        </div>
      </div>
    </section>
    <details>
      <summary>コメント人格設定</summary>
      <div class="inner">
        <div class="field"><label for="personaSheetUrl">人格 CSV / Google Sheets URL</label><input id="personaSheetUrl" value="https://docs.google.com/spreadsheets/d/1YNQUnDv18WsMm7H84Ytg3lIgvWmetLZ3bqyMm3RCgkI/export?format=csv"></div>
        <div class="grid2">
          <div class="field"><label for="commentSpeed">コメント速度</label>
            <select id="commentSpeed"><option value="normal">ふつう</option><option value="slow">ゆっくり</option><option value="fast">多め</option></select>
          </div>
          <div class="field"><label for="avatarInput">Vキャラ素材 URL</label><input id="avatarInput" placeholder="assets/v-character.webm"></div>
        </div>
        <div class="actions">
          <button id="syncPersonaBtn" class="primary" type="button">人格同期</button>
          <a href="https://rainybrainch.github.io/comment-studio/ai-comment-personas.html" target="_blank" style="display:flex;align-items:center;justify-content:center;min-height:44px;padding:7px 10px;border:1px solid rgba(224,160,255,.45);border-radius:8px;background:rgba(224,160,255,.12);color:#e0a0ff;font-weight:900;font-size:12px;text-decoration:none;letter-spacing:.04em;">🎭 Channel OS</a>
        </div>
        <div class="status-text" id="personaStatus">未同期</div>
      </div>
    </details>
  </div>
</aside>

<button class="open-tab" id="openDock" type="button">
  <span class="open-tab-dot"></span>設定
</button>

<script>
(() => {
"use strict";
const SHARED_PERSONA_KEY = "rainybrain_personas_v1";
const SHARED_COMMENT_KEY = "rainybrain_comment_log_v1";
const SETTINGS_KEY       = "rainybrain_study_stream_v1";
const PARAMS = new URLSearchParams(location.search);
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const $ = id => document.getElementById(id);

const state = {
  lessonTitle:"", subject:"", keyPoint:"",
  avatarInput:"", personaSheetUrl:"https://docs.google.com/spreadsheets/d/1YNQUnDv18WsMm7H84Ytg3lIgvWmetLZ3bqyMm3RCgkI/export?format=csv",
  commentSpeed:"normal",
  timer:{ durationSec:2700, remainingSec:2700, running:false, endAt:0 }
};
Object.assign(state, loadSettings());
if(PARAMS.get("title")) state.lessonTitle = PARAMS.get("title");
state.timer = normalizeTimer(state.timer);

let personas=loadPersonas(), transcript=[], commentTimer=null, recognition=null;
let restartTimer=null, listening=false, audioCtx=null, micStream=null;
let lastKey="", transcriptBuf="", flushTimer=null, trackRR=0;

init();

function init() { hydrate(); bind(); applyStage(); startClock(); scheduleComment(); }

function hydrate() {
  ["lessonTitle","subject","keyPoint","avatarInput","personaSheetUrl","commentSpeed"].forEach(id=>{ if($(id)) $(id).value=state[id]||""; });
  $("timerMinutes").value = Math.max(1,Math.round(state.timer.durationSec/60));
  $("timerPreset").value  = String(Math.max(1,Math.round(state.timer.durationSec/60)));
}

function bind() {
  ["lessonTitle","subject","keyPoint","avatarInput","personaSheetUrl","commentSpeed"].forEach(id=>{ if($(id)) $(id).addEventListener("input",()=>{ state[id]=$(id).value; saveSettings(); applyStage(); }); });
  $("applyBtn")?.addEventListener("click",applyStage);
  $("copyObsBtn")?.addEventListener("click",copyObsUrl);
  $("fullscreenBtn")?.addEventListener("click",toggleFullscreen);
  $("timerPreset")?.addEventListener("change",()=>{ $("timerMinutes").value=$("timerPreset").value; setTimerFromInput(); });
  $("timerSetBtn")?.addEventListener("click",setTimerFromInput);
  $("timerStartBtn")?.addEventListener("click",toggleTimer);
  $("timerResetBtn")?.addEventListener("click",resetTimer);
  $("stageTimerToggle")?.addEventListener("click",toggleTimer);
  $("stageTimerReset")?.addEventListener("click",resetTimer);
  $("micBtn")?.addEventListener("click",toggleMic);
  $("clearTranscriptBtn")?.addEventListener("click",()=>{ transcript=[]; $("transcriptLog").textContent="まだ文字起こしはありません。"; $("caption").textContent="「マイク開始」で文字起こしが始まります"; });
  $("commentBtn")?.addEventListener("click",spawnComment);
  $("manualTranscript")?.addEventListener("keydown",e=>{ if(e.key!=="Enter")return; const v=$("manualTranscript").value.trim(); if(!v)return; $("manualTranscript").value=""; pushTranscript(v); spawnComment(); });
  $("syncPersonaBtn")?.addEventListener("click",syncPersonas);
  $("hideDock")?.addEventListener("click",()=>document.body.classList.add("panel-hidden"));
  $("openDock")?.addEventListener("click",()=>document.body.classList.remove("panel-hidden"));
  $("planFreeBtn")?.addEventListener("click",()=>{ $("planFreeBtn").classList.add("active"); $("planProBtn").classList.remove("active"); $("planFreeArea").style.display=""; $("planProArea").style.display="none"; });
  $("planProBtn")?.addEventListener("click",()=>{ $("planProBtn").classList.add("active"); $("planFreeBtn").classList.remove("active"); $("planFreeArea").style.display="none"; $("planProArea").style.display=""; });
  document.addEventListener("fullscreenchange",()=>{ $("fullscreenBtn").textContent=document.fullscreenElement?"全画面解除":"全画面"; });
  document.addEventListener("keydown",e=>{
    if(e.target.matches("input,textarea,select"))return;
    if(e.code==="Space"){e.preventDefault();toggleTimer();toast(state.timer.running?"⏸ タイマー停止":"▶ タイマー開始");}
    if(e.key==="m"||e.key==="M") toggleMic();
    if(e.key==="c"||e.key==="C"){spawnComment();toast("💬 コメント生成");}
    if(e.key==="f"||e.key==="F") toggleFullscreen();
    if(e.key==="h"||e.key==="H"){document.body.classList.toggle("panel-hidden");toast(document.body.classList.contains("panel-hidden")?"パネル非表示":"パネル表示");}
  });
}

function applyStage() {
  $("cardTitle").textContent = state.lessonTitle||"今日のテーマ";
  $("cardMeta").textContent  = state.subject||"";
  const kp = $("keypointDisplay"), kpText = $("kpText");
  if(state.keyPoint){ kpText.textContent=state.keyPoint; kp.classList.add("show"); } else kp.classList.remove("show");
  updateAvatar();
}

function updateAvatar(){ const src=state.avatarInput.trim(),av=$("avatar");av.innerHTML="";av.classList.toggle("empty",!src);if(!src)return;const el=document.createElement(/\.(webm|mp4|mov)(\?.*)?$/i.test(src)?"video":"img");el.src=src;if(el.tagName==="VIDEO"){el.autoplay=true;el.loop=true;el.muted=true;el.playsInline=true;}av.append(el); }

function normalizeTimer(t){ const dur=Math.max(60,parseInt(t?.durationSec||2700,10)||2700);const endAt=parseInt(t?.endAt||0,10)||0;const run=Boolean(t?.running&&endAt>Date.now());const rem=run?Math.max(0,Math.ceil((endAt-Date.now())/1000)):Math.max(0,Math.min(dur,parseInt(t?.remainingSec||dur,10)||dur));return{durationSec:dur,remainingSec:rem,running:run,endAt:run?endAt:0}; }
function setTimerFromInput(){ const m=Math.max(1,Math.min(240,parseInt($("timerMinutes").value||"45")||45));state.timer={durationSec:m*60,remainingSec:m*60,running:false,endAt:0};saveSettings();updateClock(); }
function toggleTimer(){ state.timer=normalizeTimer(state.timer);if(state.timer.running){state.timer.running=false;state.timer.endAt=0;}else{if(state.timer.remainingSec<=0)state.timer.remainingSec=state.timer.durationSec;state.timer.running=true;state.timer.endAt=Date.now()+state.timer.remainingSec*1000;}saveSettings();updateClock(); }
function resetTimer(){ state.timer=normalizeTimer(state.timer);state.timer.running=false;state.timer.endAt=0;state.timer.remainingSec=state.timer.durationSec;saveSettings();updateClock(); }
function updateClock(){ const prevRem=state.timer.remainingSec;state.timer=normalizeTimer(state.timer);if(state.timer.running&&state.timer.remainingSec<=0){state.timer.running=false;state.timer.endAt=0;if(prevRem>0){toast("⏱ タイマー終了！");$("timerDisplay")?.classList.add("flash");setTimeout(()=>$("timerDisplay")?.classList.remove("flash"),2800);}}$("timerTime").textContent=fmt(state.timer.remainingSec);$("timerLabel").textContent=state.timer.running?"REC RUNNING":"REC TIMER";$("timerDisplay").classList.toggle("running",state.timer.running);$("timerStartBtn").textContent=state.timer.running?"停止":"開始";$("stageTimerToggle").textContent=state.timer.running?"Ⅱ":"▶";$("stageTimerToggle").classList.toggle("running",state.timer.running); }
function fmt(sec){const n=Math.max(0,parseInt(sec||0)||0),h=Math.floor(n/3600),m=Math.floor((n%3600)/60),s=n%60;return h>0?`${h}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;}
function pad(n){return String(n).padStart(2,"0");}
function startClock(){updateClock();setInterval(updateClock,1000);}
function toggleFullscreen(){document.fullscreenElement?document.exitFullscreen?.():$("stage").requestFullscreen?.();}

function pushTranscript(text){
  const clean=text.replace(/\s+/g," ").trim();if(!clean)return;
  const key=clean.replace(/[\s、。,.!！?？]/g,"");if(!key||key===lastKey)return;
  lastKey=key;transcript.unshift({text:clean,at:Date.now()});transcript=transcript.slice(0,40);
  const cap=$("caption");cap.textContent=clean;cap.classList.remove("flash-in");void cap.offsetWidth;cap.classList.add("flash-in");
  $("transcriptLog").textContent=transcript.slice(0,10).map(x=>x.text).join("\n");
  if(clean.length>=8)setTimeout(spawnComment,900);
}
function queueTranscript(text){ transcriptBuf=[transcriptBuf,text].filter(Boolean).join(" ").replace(/\s+/g," ").trim();clearTimeout(flushTimer);flushTimer=setTimeout(()=>{const t=transcriptBuf;transcriptBuf="";if(t)pushTranscript(t);},820); }
function recentText(){return transcript.slice(0,6).map(x=>x.text).reverse().join("\n").slice(-1000);}

function toggleMic(){
  if(!SpeechRecognition){$("caption").textContent="⚠ Chrome / Edge が必要です";toast("Chrome/Edge の音声認識が必要です");return;}
  if(listening){clearTimeout(restartTimer);listening=false;try{recognition.stop();}catch{}stopMeter();$("micBtn").textContent="マイク開始";$("micBtn").className="good";$("micLive")?.classList.remove("active");toast("マイク停止");return;}
  recognition=new SpeechRecognition();recognition.lang="ja-JP";recognition.continuous=true;recognition.interimResults=true;
  recognition.onresult=e=>{let fin="",int="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0]?.transcript||"";if(e.results[i].isFinal)fin+=t;else int+=t;}if(int)$("caption").textContent=int;if(fin.trim())queueTranscript(fin);};
  recognition.onerror=()=>{if(listening){clearTimeout(restartTimer);restartTimer=setTimeout(()=>{if(listening)try{recognition.start();}catch{}},1200);}};
  recognition.onend=()=>{if(listening){clearTimeout(restartTimer);restartTimer=setTimeout(()=>{if(listening)try{recognition.start();}catch{}},700);}};
  recognition.start();listening=true;$("micBtn").textContent="マイク停止";$("micBtn").className="warn";$("micLive")?.classList.add("active");toast("マイク開始 — 話してください");startMeter();
}
async function startMeter(){try{micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});audioCtx=new AudioContext();const an=audioCtx.createAnalyser();audioCtx.createMediaStreamSource(micStream).connect(an);}catch{}}
function stopMeter(){if(audioCtx){audioCtx.close().catch(()=>{});audioCtx=null;}if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}}

function spawnComment(){const p=pickPersona();const text=buildComment(p);addComment(text,p.name,p.color);saveCommentLog({user:p.name,text});}
function addComment(text,name,color){ const track=document.getElementById(`track${trackRR%3}`);trackRR++;if(!track)return;const speed=Math.max(10,10+text.length*0.3+Math.random()*5);const node=document.createElement("div");node.className="comment-h";node.style.setProperty("--user-color",color||"var(--accent)");node.style.setProperty("--speed",speed+"s");const u=document.createElement("span");u.className="user";u.textContent="@"+name;const t=document.createElement("span");t.className="text";t.textContent=text;node.append(u,t);track.append(node);node.addEventListener("animationend",()=>node.remove()); }
function pickPersona(){ const list=personas.length?personas:defaultPersonas();const text=recentText();return list.map(p=>({p,s:relevance(p,text)+Math.random()*.4})).sort((a,b)=>b.s-a.s).slice(0,Math.min(list.length,6))[Math.floor(Math.random()*Math.min(list.length,6))].p; }
function relevance(p,text){ const hay=[p.name,p.roleType,p.reactionPattern,p.catchphrase,...(p.words||[]),...(p.interests||[])].join(" ");let s=0;text.split(/[\s、。,]+/).filter(w=>w.length>=2).forEach(w=>{if(hay.includes(w))s+=2;});if(/AI|機械学習|プログラム|アルゴリズム|データ/.test(text)&&/AI|技術|開発/.test(hay))s+=4;if(/数学|統計|確率|微分/.test(text)&&/数学|理系/.test(hay))s+=3;return s; }
function buildComment(p){
  if(p.catchphrase&&Math.random()<.36)return p.catchphrase.slice(0,40);
  const text=recentText(),kw=text.split(/[\s、。,]+/).filter(w=>w.length>=2)[0]||(p.words||[])[0]||"今の説明";
  const role=p.roleType||"共感勢";
  const map={
    "応援勢":   ["わかりやすすぎる","この授業続けてほしい","天才的な説明","毎回楽しみにしてる"],
    "質問勢":   [`${kw}をもっと詳しく`,`${kw}と前回の話のつながりは？`,"実例も見てみたい","一度聞いただけじゃ足りない"],
    "共感勢":   [`${kw}！そういうことか`,"やっと繋がった","言語化してくれてありがとう","自分も考えてたとこだった","メモした"],
    "懐疑勢":   [`${kw}の例外は？`,"全部それで説明できる？","前提が怪しい気がする","反例ありそう"],
    "知識勢":   [`${kw}は論文でも重要テーマ`,"この概念の歴史面白い","発展的な話もしてほしい","研究者目線で補足すると"],
    "ネタ勢":   ["脳が焼ける","天才に教わってる","これ大学でやった","ここで寝落ちしてた"],
    "妄想勢":   [`${kw}を応用すると面白そう`,"これ社会問題に使えそう","未来変わりそう","次のテーマも気になる"],
    "初心者勢": [`${kw}初めて聞いた`,"難しいけどおもしろい","もう少し噛み砕いて","ノートに書き写してる"],
    "開発者勢": ["実装で詰まってたとこだ","コードに落とすとこうなる","ライブラリあるの知ってる","実務で使える"],
    "投資家勢": ["ビジネスに活かせそう","この知識で差がつく","コスパいい学習","チームに共有したい"]
  };
  const pool=map[role]||map["共感勢"];return pool[Math.floor(Math.random()*pool.length)].slice(0,40);
}
function defaultPersonas(){ return[{name:"学習者",roleType:"共感勢",catchphrase:"やっと繋がった",color:"#c890d8",words:[]},{name:"質問マン",roleType:"質問勢",catchphrase:"もう少し詳しく",color:"#64d2ff",words:[]},{name:"エンジニア",roleType:"開発者勢",catchphrase:"実装してみる",color:"#57c87c",words:[]},{name:"初見さん",roleType:"初心者勢",catchphrase:"難しいけどおもしろい",color:"#f79f57",words:[]}]; }
function intervalRange(){if(state.commentSpeed==="fast")return[3000,7000];if(state.commentSpeed==="slow")return[10000,18000];return[5000,10000];}
function scheduleComment(){clearTimeout(commentTimer);const[mn,mx]=intervalRange();commentTimer=setTimeout(()=>{spawnComment();scheduleComment();},mn+Math.random()*(mx-mn));}

function loadPersonas(){ const result=[];try{const p=JSON.parse(localStorage.getItem("all_domedia_personas_v5")||"[]");result.push(...p.filter(x=>x&&x.name&&x.enabled!==false));}catch{}try{const ids=new Set(result.map(x=>x.id||x.name));const p=JSON.parse(localStorage.getItem(SHARED_PERSONA_KEY)||"[]");result.push(...p.filter(x=>x&&x.name&&!ids.has(x.id||x.name)));}catch{}return result; }
async function syncPersonas(){ try{const csvUrl=toSheetCsvUrl(state.personaSheetUrl);let csv=null;try{const r=await fetch(csvUrl,{cache:"no-store"});if(r.ok)csv=await r.text();}catch{}if(!csv)throw new Error("no csv");personas=parsePersonas(csv);localStorage.setItem(SHARED_PERSONA_KEY,JSON.stringify(personas));setStatus(`人格 ${personas.length}件 同期済み`);}catch{personas=loadPersonas();if(!personas.length)personas=defaultPersonas();setStatus(`人格 ${personas.length}件（キャッシュ）`);} }
function parsePersonas(csv){return parseCSV(csv).map((r,i)=>{const name=r[0];if(!name||name==="名前")return null;return{id:"s"+i,name,personalityType:r[1]||"",roleType:r[2]||"",reactionPattern:r[3]||"",catchphrase:r[4]||"",words:tags(r[6]),interests:tags(r[8]),color:["#c890d8","#64d2ff","#ff93bd","#9be870","#f2c14e"][i%5]};}).filter(Boolean);}
function parseCSV(text){const rows=[];let row=[],cell="",quote=false;const src=String(text||""),d=src.includes("\t")?"\t":",";for(let i=0;i<src.length;i++){const ch=src[i],nx=src[i+1];if(ch==='"'){if(quote&&nx==='"'){cell+='"';i++;}else quote=!quote;}else if(ch===d&&!quote){row.push(cell.trim());cell="";}else if((ch==="\n"||ch==="\r")&&!quote){if(ch==="\r"&&nx==="\n")i++;row.push(cell.trim());if(row.some(Boolean))rows.push(row);row=[];cell="";}else cell+=ch;}row.push(cell.trim());if(row.some(Boolean))rows.push(row);return rows;}
function tags(v){return String(v||"").split(/[;,、・\s]+/).map(x=>x.trim()).filter(Boolean).slice(0,12);}
function saveCommentLog(entry){try{const log=JSON.parse(localStorage.getItem(SHARED_COMMENT_KEY)||"[]");log.push({...entry,screen:"study",at:new Date().toISOString()});localStorage.setItem(SHARED_COMMENT_KEY,JSON.stringify(log.slice(-200)));}catch{}}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify({lessonTitle:state.lessonTitle,subject:state.subject,keyPoint:state.keyPoint,avatarInput:state.avatarInput,personaSheetUrl:state.personaSheetUrl,commentSpeed:state.commentSpeed,timer:state.timer}));}
function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}");}catch{return{};}}
function copyObsUrl(){const url=new URL(location.href);if(state.lessonTitle)url.searchParams.set("title",state.lessonTitle);const str=url.toString();if(navigator.clipboard){navigator.clipboard.writeText(str).then(()=>toast("OBS URL をコピーしました ✓")).catch(()=>{prompt("URL:",str);});}else{prompt("URL:",str);}}
function toSheetCsvUrl(url){const t=String(url||"").trim(),m=t.match(/\/spreadsheets\/d\/([^/]+)/);if(!m)return t;const gid=(t.match(/[?&]gid=(\d+)/)||[])[1];return`https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv${gid?`&gid=${gid}`:""}` ;}
let toastTimer=null;
function toast(msg){const el=$("toast");if(!el)return;clearTimeout(toastTimer);el.textContent=msg;el.classList.add("show");toastTimer=setTimeout(()=>el.classList.remove("show"),2800);}
function setStatus(t){if($("personaStatus"))$("personaStatus").textContent=t;toast(t);}
})();
</script>
