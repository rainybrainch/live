<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌ってみた配信 — 服牢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0d0810;
  --bg2:   #140c18;
  --line:  rgba(232,121,160,.15);
  --text:  #f5e6ef;
  --muted: rgba(245,230,239,.52);
  --faint: rgba(245,230,239,.22);
  --acc:   #e879a0;
  --acc2:  #b8527a;
  --done:  #57c87c;
  --font:  "Noto Sans JP", sans-serif;
  --serif: "Noto Serif JP", serif;
  color-scheme: dark;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg);}
button,input,textarea{font:inherit;color:inherit;}
textarea{resize:vertical;}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:0 18px;min-height:52px;
  background:rgba(13,8,16,.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.logo{display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;}
.logo-mark{font-size:20px;}
.logo-name{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--acc);}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;}


.header-btns{margin-left:auto;display:flex;gap:6px;align-items:center;}
.btn-hd{padding:5px 12px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:11px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .15s;}
.btn-hd:hover{border-color:rgba(232,121,160,.3);color:var(--acc);}
.btn-hd.active{border-color:rgba(232,121,160,.4);background:rgba(232,121,160,.1);color:var(--acc);}
.h-back{font-size:11px;color:var(--muted);text-decoration:none;white-space:nowrap;transition:color .15s;}
.h-back:hover{color:var(--text);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 52px);overflow:hidden;}

/* ── SETLIST PANEL ── */
.setlist-panel{
  border-right:1px solid var(--line);background:var(--bg2);
  overflow-y:auto;padding:16px 13px;display:flex;flex-direction:column;gap:14px;
}
.sp-label{font-size:9px;font-weight:900;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--line);}

/* 曲追加フォーム（サイドバー） */
.song-add-form{display:flex;flex-direction:column;gap:7px;}
.sa-input{
  width:100%;padding:7px 10px;border-radius:7px;
  border:1px solid var(--line);background:rgba(0,0,0,.3);
  font-size:12px;color:var(--text);outline:none;transition:border-color .15s;
}
.sa-input:focus{border-color:rgba(232,121,160,.4);}
.sa-add-btn{
  width:100%;padding:8px;border-radius:7px;
  background:rgba(232,121,160,.14);border:1px solid rgba(232,121,160,.3);
  color:var(--acc);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;
}
.sa-add-btn:hover{background:rgba(232,121,160,.24);}

/* セットリスト一覧 */
.setlist{display:flex;flex-direction:column;gap:5px;}
.song-item{
  padding:9px 10px;border-radius:8px;border:1px solid var(--line);
  background:rgba(255,255,255,.02);cursor:pointer;transition:all .2s;
  display:flex;align-items:flex-start;gap:8px;
}
.song-item:hover{background:rgba(232,121,160,.06);border-color:rgba(232,121,160,.2);}
.song-item.active{background:rgba(232,121,160,.12);border-color:rgba(232,121,160,.4);}
.song-item.done{opacity:.45;}
.song-item.done .si-title{text-decoration:line-through;}
.si-num{
  font-family:var(--serif);font-size:11px;font-weight:700;color:var(--muted);
  flex-shrink:0;min-width:18px;margin-top:1px;
}
.song-item.active .si-num{color:var(--acc);}
.si-body{flex:1;min-width:0;}
.si-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-artist{font-size:10px;color:var(--muted);margin-top:1px;}
.si-status{font-size:10px;flex-shrink:0;margin-top:2px;}
.si-actions{display:flex;gap:3px;flex-shrink:0;}
.si-btn{background:0;border:0;padding:2px 5px;font-size:10px;color:var(--muted);cursor:pointer;opacity:.5;transition:opacity .15s;}
.si-btn:hover{opacity:1;}

.sp-stats{font-size:10px;color:var(--muted);text-align:center;padding:6px 0;border-top:1px solid var(--line);}

/* ── CENTER ── */
.center{overflow-y:auto;padding:20px 24px 40px;display:flex;flex-direction:column;gap:16px;}


/* NOW PLAYING */
.now-playing{
  border:1px solid rgba(232,121,160,.3);border-radius:14px;
  padding:20px 22px;background:rgba(232,121,160,.05);
  display:flex;flex-direction:column;gap:8px;
}
.np-label{font-size:9px;font-weight:900;letter-spacing:.18em;color:var(--acc);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.np-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:npulse 1.5s ease-in-out infinite;}
@keyframes npulse{0%,100%{opacity:1}50%{opacity:.3}}
.np-title{font-family:var(--serif);font-size:clamp(20px,3vw,32px);font-weight:700;line-height:1.2;}
.np-artist{font-size:13px;color:var(--muted);}
.np-empty{font-size:13px;color:var(--faint);font-style:italic;}
.np-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.np-btn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--line);
  background:rgba(255,255,255,.03);font-size:11px;font-weight:900;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.np-btn:hover{border-color:rgba(232,121,160,.3);color:var(--acc);}
.np-btn.done-btn:hover{border-color:rgba(87,200,124,.3);color:var(--done);}

/* LYRICS */
.lyrics-section{border:1px solid var(--line);border-radius:12px;overflow:hidden;flex:1;}
.lyrics-head{
  padding:11px 16px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
.lyrics-lbl{font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.lyrics-toggle{
  margin-left:auto;padding:3px 10px;border-radius:6px;
  background:0;border:1px solid var(--line);font-size:10px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.lyrics-toggle:hover{border-color:rgba(232,121,160,.3);color:var(--acc);}

.lyrics-display{
  padding:20px 22px;font-size:15px;line-height:2.2;
  min-height:200px;white-space:pre-wrap;
  font-family:var(--serif);color:var(--text);
  overflow-y:auto;max-height:420px;
  scroll-behavior:smooth;
}
.lyrics-display.empty{color:var(--faint);font-style:italic;font-size:13px;font-family:var(--font);}

.lyrics-edit{
  width:100%;padding:16px 22px;
  border:0;border-top:1px solid var(--line);
  background:rgba(0,0,0,.3);font-size:13px;color:var(--text);
  outline:none;min-height:180px;line-height:1.8;font-family:var(--serif);
}
.lyrics-edit:focus{background:rgba(0,0,0,.4);}

/* ── FULLSCREEN LYRICS MODE ── */
body.fullscreen-lyrics .layout{display:none!important;}
body.fullscreen-lyrics .mini-view{display:none!important;}
.fullscreen-view{
  display:none;
  position:fixed;inset:0;z-index:20;
  background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 60px;
}
body.fullscreen-lyrics .fullscreen-view{display:flex;}
.fl-song{
  text-align:center;margin-bottom:28px;flex-shrink:0;
}
.fl-title{font-family:var(--serif);font-size:clamp(22px,3.5vw,42px);font-weight:700;color:var(--text);margin-bottom:6px;}
.fl-artist{font-size:14px;color:var(--muted);}
.fl-lyrics{
  width:100%;max-width:820px;max-height:70vh;overflow-y:auto;
  font-family:var(--serif);font-size:clamp(16px,2.2vw,26px);line-height:2.4;
  white-space:pre-wrap;text-align:center;color:var(--text);
  scroll-behavior:smooth;
}
.fl-lyrics.empty{color:var(--faint);font-style:italic;}
.fl-actions{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:25;
}
.fl-btn{
  padding:7px 18px;border-radius:8px;border:1px solid rgba(232,121,160,.3);
  background:rgba(13,8,16,.85);backdrop-filter:blur(10px);
  color:var(--muted);font-size:11px;font-weight:900;cursor:pointer;transition:all .15s;
}
.fl-btn:hover{border-color:rgba(232,121,160,.6);color:var(--acc);}

/* ── COUNTDOWN TIMER ── */
.countdown-wrap{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.countdown-display{
  font-family:var(--serif);font-size:15px;font-weight:700;
  color:var(--muted);letter-spacing:.06em;min-width:58px;text-align:right;
  transition:color .3s;
}
.countdown-display.running{color:var(--acc);}
.countdown-display.urgent{color:#ff6b6b;animation:urgentPulse .8s ease-in-out infinite;}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.5}}
.countdown-input{
  width:52px;padding:4px 7px;border-radius:6px;
  border:1px solid var(--line);background:rgba(0,0,0,.3);
  font-size:11px;color:var(--text);outline:none;text-align:center;
}
.countdown-input:focus{border-color:rgba(232,121,160,.4);}
.countdown-btn{
  padding:4px 10px;border-radius:6px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);font-size:10px;font-weight:900;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.countdown-btn:hover{border-color:rgba(232,121,160,.3);color:var(--acc);}
.countdown-btn.active{border-color:rgba(232,121,160,.4);background:rgba(232,121,160,.1);color:var(--acc);}

/* ── OBS MODE ── */
body.obs-mode{background:transparent!important;}
body.obs-mode .header{background:rgba(13,8,16,.82);}
body.obs-mode .setlist-panel{background:rgba(13,8,16,.7);}
body.obs-mode .now-playing,
body.obs-mode .lyrics-section{background:rgba(13,8,16,.82)!important;backdrop-filter:blur(8px);}

/* ── MINI MODE ── */
body.mini .layout{display:none!important;}
body.mini .mini-view{display:flex!important;}
.mini-view{
  display:none;flex-direction:column;gap:10px;
  height:calc(100vh - 52px);overflow:hidden;
  padding:12px 14px;max-width:300px;margin:0 auto;
}
.mini-now{
  border:1px solid rgba(232,121,160,.3);border-radius:10px;
  padding:14px;background:rgba(232,121,160,.06);
  display:flex;flex-direction:column;gap:6px;flex-shrink:0;
}
.mini-now-lbl{font-size:9px;font-weight:900;letter-spacing:.12em;color:var(--acc);text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.mini-now-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:npulse 1.5s ease-in-out infinite;}
.mini-now-title{font-family:var(--serif);font-size:16px;font-weight:700;line-height:1.3;}
.mini-now-artist{font-size:11px;color:var(--muted);}
.mini-lyrics{
  flex:1;min-height:0;overflow-y:auto;
  font-family:var(--serif);font-size:13px;line-height:2;
  white-space:pre-wrap;color:var(--text);padding:4px 0;
}
.mini-next{
  border:1px solid var(--line);border-radius:8px;padding:10px 12px;
  flex-shrink:0;
}
.mini-next-lbl{font-size:9px;font-weight:900;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.mini-next-song{font-size:11px;color:var(--muted);}
.mini-footer{display:flex;gap:5px;flex-shrink:0;}
.mini-foot-btn{
  flex:1;padding:8px;border-radius:7px;
  border:1px solid rgba(232,121,160,.25);background:rgba(232,121,160,.08);
  color:var(--acc);font-size:11px;font-weight:900;cursor:pointer;transition:all .15s;
}
.mini-foot-btn:hover{background:rgba(232,121,160,.18);}
.mini-foot-btn.done{border-color:rgba(87,200,124,.25);background:rgba(87,200,124,.08);color:var(--done);}

/* ── COMMENTS ── */
.comments-wrap{
  position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;
}
.comment-item{
  position:absolute;
  display:inline-flex;align-items:flex-start;gap:7px;
  padding:8px 11px;border-radius:10px;
  background:rgba(13,8,16,.88);backdrop-filter:blur(10px);
  border:1px solid rgba(232,121,160,.25);
  pointer-events:none;white-space:nowrap;max-width:220px;
  animation:commentRise var(--cr-dur,9s) ease-out forwards;
}
@keyframes commentRise{
  0%  {transform:translateY(0) scale(.82);opacity:0;}
  7%  {transform:translateY(-18px) scale(1);opacity:1;}
  78% {opacity:1;}
  100%{transform:translateY(-96vh);opacity:0;}
}
.ci-icon{font-size:15px;flex-shrink:0;line-height:1.3;}
.ci-body{flex:1;min-width:0;}
.ci-name{font-size:9px;font-weight:900;color:var(--acc);letter-spacing:.04em;margin-bottom:2px;}
.ci-text{font-size:12px;color:var(--text);line-height:1.45;}
.comment-ctrl{
  position:fixed;right:16px;bottom:4px;
  display:flex;gap:5px;z-index:51;
}
.cc-btn{
  padding:4px 10px;border-radius:6px;
  border:1px solid rgba(232,121,160,.2);background:rgba(13,8,16,.8);
  font-size:10px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.cc-btn:hover{border-color:rgba(232,121,160,.4);color:var(--acc);}
.cc-btn.active{border-color:rgba(232,121,160,.5);background:rgba(232,121,160,.1);color:var(--acc);}

/* ── SING EFFECT ── */
.bg-effect{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  transition:opacity 2s ease;opacity:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, var(--glow-center,transparent), transparent 70%),
    radial-gradient(ellipse 100% 40% at 50% 100%, var(--glow-bottom,transparent), transparent 60%);
}
.edge-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  box-shadow:inset 0 0 0px var(--edge-color,transparent);
  transition:box-shadow 2s ease, opacity 2s ease;opacity:0;
}
/* intensity levels */
body[data-lv="1"] .bg-effect{opacity:1;--glow-center:rgba(232,121,160,.07);--glow-bottom:rgba(184,82,122,.06);}
body[data-lv="2"] .bg-effect{opacity:1;--glow-center:rgba(232,121,160,.14);--glow-bottom:rgba(184,82,122,.12);}
body[data-lv="3"] .bg-effect{opacity:1;--glow-center:rgba(232,121,160,.25);--glow-bottom:rgba(150,60,200,.18);}
body[data-lv="4"] .bg-effect{opacity:1;--glow-center:rgba(240,100,180,.4);--glow-bottom:rgba(120,40,220,.3);}
body[data-lv="1"] .edge-glow{opacity:1;box-shadow:inset 0 0 40px rgba(232,121,160,.12);}
body[data-lv="2"] .edge-glow{opacity:1;box-shadow:inset 0 0 70px rgba(232,121,160,.22);}
body[data-lv="3"] .edge-glow{opacity:1;box-shadow:inset 0 0 120px rgba(232,121,160,.38),inset 0 0 40px rgba(150,60,200,.2);animation:edgePulse 2s ease-in-out infinite;}
body[data-lv="4"] .edge-glow{opacity:1;box-shadow:inset 0 0 160px rgba(240,80,180,.55),inset 0 0 60px rgba(120,40,220,.4);animation:edgePulse .9s ease-in-out infinite;}
@keyframes edgePulse{0%,100%{opacity:1}50%{opacity:.6}}

/* particles */
.particle{
  position:fixed;pointer-events:none;z-index:2;
  font-size:var(--ps,16px);opacity:0;user-select:none;
  animation:particleRise var(--pd,4s) ease-in forwards;
}
@keyframes particleRise{
  0%  {transform:translateY(0)   translateX(0)                  rotate(0deg);  opacity:0;}
  8%  {opacity:var(--po,.9);}
  88% {opacity:var(--po,.9);}
  100%{transform:translateY(-90vh) translateX(var(--px,0px))  rotate(var(--pr,180deg)); opacity:0;}
}

/* intensity badge */
.lv-badge{
  position:fixed;left:16px;bottom:20px;z-index:51;
  padding:5px 12px;border-radius:999px;
  font-size:11px;font-weight:900;letter-spacing:.08em;
  background:rgba(13,8,16,.8);border:1px solid rgba(232,121,160,.3);
  color:var(--acc);display:none;
  transition:all .5s;
}
body[data-lv] .lv-badge{display:block;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:8px 16px;border-radius:8px;background:#1a0814;border:1px solid rgba(232,121,160,.4);color:var(--acc);font-size:12px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;max-width:280px;}
.toast.show{opacity:1;}

@media(max-width:680px){.layout{grid-template-columns:1fr;height:auto;}.setlist-panel{display:none;}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ── SING EFFECT LAYERS ── -->
<div class="bg-effect" id="bgEffect"></div>
<div class="edge-glow" id="edgeGlow"></div>
<div class="lv-badge" id="lvBadge"></div>

<!-- ── COMMENTS ── -->
<div class="comments-wrap" id="commentsWrap"></div>
<div class="comment-ctrl">
  <button class="cc-btn active" id="ccBtn" onclick="toggleComments()">💬 コメント ON</button>
</div>

<!-- ── HEADER ── -->
<header class="header">
  <div class="logo">
    <span class="logo-mark">🎤</span>
    <div>
      <div class="logo-name">歌ってみた配信</div>
      <div class="logo-sub">服牢</div>
    </div>
  </div>

  <!-- カウントダウンタイマー -->
  <div class="countdown-wrap">
    <input class="countdown-input" id="cdInput" type="text" value="4:00" placeholder="4:00" title="分:秒">
    <button class="countdown-btn" id="cdBtn" onclick="toggleCountdown()">▶ タイマー</button>
    <span class="countdown-display" id="cdDisplay">4:00</span>
  </div>

  <div class="header-btns">
    <button class="btn-hd" id="btnFullLyrics" onclick="toggleFullLyrics()">⛶ 歌詞全画面</button>
    <button class="btn-hd" id="btnMini" onclick="toggleMini()">⬜ ミニ</button>
    <button class="btn-hd" id="btnObs"  onclick="toggleObs()">📺 OBS</button>
    <a class="h-back btn-hd" href="index.html">← TOP</a>
  </div>
</header>

<!-- ── LAYOUT ── -->
<div class="layout" id="mainLayout">

  <!-- セットリストパネル -->
  <aside class="setlist-panel">
    <div class="sp-label">セットリスト</div>

    <div class="song-add-form">
      <input class="sa-input" id="addTitle"  placeholder="曲名 *"
        onkeydown="if(event.key==='Enter')document.getElementById('addArtist').focus()">
      <input class="sa-input" id="addArtist" placeholder="アーティスト（任意）"
        onkeydown="if(event.key==='Enter')addSong()">
      <button class="sa-add-btn" onclick="addSong()">＋ セットリストに追加</button>
    </div>

    <div class="setlist" id="setlistEl"></div>

    <div class="sp-stats" id="spStats"></div>
  </aside>

  <!-- CENTER -->
  <main class="center">

    <!-- NOW PLAYING -->
    <div class="now-playing" id="nowPlaying">
      <div class="np-label">
        <span class="np-dot" id="npDot" style="display:none;"></span>
        NOW PLAYING
      </div>
      <div class="np-title"  id="npTitle">—</div>
      <div class="np-artist" id="npArtist"></div>
      <div class="np-actions" id="npActions" style="display:none;">
        <button class="np-btn done-btn" onclick="markCurrentDone()">✅ 歌い終わり</button>
        <button class="np-btn" onclick="nextSong()">⏭ 次の曲へ</button>
        <button class="np-btn" onclick="clearCurrent()">✕ クリア</button>
      </div>
    </div>

    <!-- LYRICS -->
    <div class="lyrics-section">
      <div class="lyrics-head">
        <span class="lyrics-lbl">歌詞</span>
        <span style="font-size:10px;color:var(--faint);">編集モードで貼り付け → 表示モードで見やすく</span>
        <div style="display:flex;gap:5px;margin-left:auto;">
        <button class="lyrics-toggle" id="autoScrollBtn" onclick="toggleAutoScroll()">▶ 自動スクロール</button>
        <select id="scrollSpeed" style="background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:6px;color:var(--muted);font-size:10px;padding:2px 6px;outline:none;">
          <option value="0.4">遅い</option>
          <option value="0.8" selected>普通</option>
          <option value="1.5">速い</option>
          <option value="2.5">かなり速い</option>
        </select>
        <button class="lyrics-toggle" id="lyricsToggleBtn" onclick="toggleLyricsEdit()">✏ 編集</button>
      </div>
      </div>
      <div class="lyrics-display" id="lyricsDisplay">

<script>
// ════════════════════════════════════
//  State
// ════════════════════════════════════
const SL_KEY = 'singing_setlist';
const LY_KEY = 'singing_lyrics';

let setlist     = [];        // [{id, title, artist, status:'pending'|'current'|'done'}]
let currentId   = null;
let miniMode    = false;
let obsMode     = false;
let lyricsEditMode = false;

// intensity
let lv = 0;
let lvTimer = null;
let lvFadeTimer = null;
let particleTimer = null;
const PARTICLES = ['♪','♫','♩','✦','★','✨','🎵','🌸','💫'];

// ════════════════════════════════════
//  Init
// ════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadSetlist();
  loadLyrics();
  renderAll();
  startComments();
});

// ════════════════════════════════════
//  Setlist
// ════════════════════════════════════
function loadSetlist() {
  try { setlist = JSON.parse(localStorage.getItem(SL_KEY) || '[]'); } catch { setlist = []; }
  currentId = setlist.find(s => s.status === 'current')?.id || null;
}

function saveSetlist() {
  localStorage.setItem(SL_KEY, JSON.stringify(setlist));
}

function addSong() {
  const title  = document.getElementById('addTitle').value.trim();
  if (!title) return;
  const artist = document.getElementById('addArtist').value.trim();
  const song = {
    id: Date.now().toString(),
    title, artist,
    status: 'pending'
  };
  setlist.push(song);
  saveSetlist();
  document.getElementById('addTitle').value  = '';
  document.getElementById('addArtist').value = '';
  renderAll();
  showToast(`「${title}」を追加しました`);
}

function removeSong(id) {
  setlist = setlist.filter(s => s.id !== id);
  if (currentId === id) { currentId = null; }
  saveSetlist();
  renderAll();
}

function setCurrent(id) {
  setlist.forEach(s => { if (s.status === 'current') s.status = 'pending'; });
  const song = setlist.find(s => s.id === id);
  if (!song) return;
  song.status = 'current';
  currentId   = id;
  saveSetlist();
  renderAll();
  startIntensity();
}

function markCurrentDone() {
  if (!currentId) return;
  const song = setlist.find(s => s.id === currentId);
  if (song) song.status = 'done';
  currentId = null;
  saveSetlist();
  renderAll();
  showToast('✅ 歌い終わりました');
  stopIntensity();
}

function nextSong() {
  // 現在をdoneにして次のpendingをcurrentに
  if (currentId) {
    const cur = setlist.find(s => s.id === currentId);
    if (cur) cur.status = 'done';
  }
  const next = setlist.find(s => s.status === 'pending');
  if (next) {
    next.status = 'current';
    currentId   = next.id;
    showToast(`▶ 「${next.title}」へ`);
    startIntensity();
  } else {
    currentId = null;
    stopIntensity();
    showToast('セットリスト終了');
  }
  saveSetlist();
  renderAll();
}

function clearCurrent() {
  if (currentId) {
    const song = setlist.find(s => s.id === currentId);
    if (song) song.status = 'pending';
    currentId = null;
    saveSetlist();
    renderAll();
    stopIntensity();
  }
}

function moveUp(id) {
  const idx = setlist.findIndex(s => s.id === id);
  if (idx <= 0) return;
  [setlist[idx-1], setlist[idx]] = [setlist[idx], setlist[idx-1]];
  saveSetlist(); renderAll();
}

function moveDown(id) {
  const idx = setlist.findIndex(s => s.id === id);
  if (idx < 0 || idx >= setlist.length - 1) return;
  [setlist[idx], setlist[idx+1]] = [setlist[idx+1], setlist[idx]];
  saveSetlist(); renderAll();
}

// ════════════════════════════════════
//  Render
// ════════════════════════════════════
function renderAll() {
  renderSetlist();
  renderNowPlayingFromSetlist();
  renderMiniView();
  renderStats();
}

function renderSetlist() {
  const el = document.getElementById('setlistEl');
  if (!el) return;
  el.innerHTML = '';
  if (setlist.length === 0) {
    el.innerHTML = `<div style="font-size:11px;color:var(--faint);padding:8px 2px;">曲を追加してください</div>`;
    return;
  }
  setlist.forEach((s, i) => {
    const statusIcon = s.status === 'current' ? '🎵' : s.status === 'done' ? '✅' : '○';
    const item = document.createElement('div');
    item.className = `song-item${s.status === 'current' ? ' active' : ''}${s.status === 'done' ? ' done' : ''}`;
    item.innerHTML = `
      <div class="si-num">${i + 1}</div>
      <div class="si-body" onclick="setCurrent('${s.id}')">
        <div class="si-title">${escHtml(s.title)}</div>
        ${s.artist ? `<div class="si-artist">${escHtml(s.artist)}</div>` : ''}
      </div>
      <div class="si-actions">
        <button class="si-btn" onclick="moveUp('${s.id}')" title="上へ">↑</button>
        <button class="si-btn" onclick="moveDown('${s.id}')" title="下へ">↓</button>
        <button class="si-btn" onclick="removeSong('${s.id}')" title="削除">✕</button>
      </div>`;
    el.appendChild(item);
  });
}

function renderNowPlayingFromSetlist() {
  const current = setlist.find(s => s.status === 'current');
  if (current) {
    renderNowPlaying(current.title, current.artist);
    document.getElementById('npActions').style.display = 'flex';
    document.getElementById('npDot').style.display = '';
  } else {
    renderNowPlaying(null, null);
    document.getElementById('npActions').style.display = 'none';
    document.getElementById('npDot').style.display = 'none';
  }
}

function renderNowPlaying(title, artist) {
  const titleEl  = document.getElementById('npTitle');
  const artistEl = document.getElementById('npArtist');
  if (title) {
    titleEl.textContent  = title;
    artistEl.textContent = artist || '';
    artistEl.style.display = artist ? '' : 'none';
  } else {
    titleEl.innerHTML = '<span style="color:var(--faint);font-style:italic;font-size:16px;">曲を選んでください</span>';
    artistEl.textContent = '';
  }
  // fullscreen sync
  if (fullscreenLyrics) syncFullscreenLyrics();
}

function renderMiniView() {
  const current = setlist.find(s => s.status === 'current');

  const title  = current?.title  || document.getElementById('npTitle')?.textContent  || '—';
  const artist = current?.artist || document.getElementById('npArtist')?.textContent || '';
  renderMiniNow(title, artist);

  // Next song
  const next = setlist.find(s => s.status === 'pending');
  const nextWrap = document.getElementById('miniNextWrap');
  if (next) {
    nextWrap.style.display = '';
    document.getElementById('miniNextSong').textContent = `${next.title}${next.artist ? ' / ' + next.artist : ''}`;
  } else {
    nextWrap.style.display = 'none';
  }

  // Lyrics
  const lyrics = document.getElementById('lyricsEdit')?.value || '';
  const miniLy = document.getElementById('miniLyrics');
  if (miniLy) miniLy.textContent = lyrics;
}

function renderMiniNow(title, artist) {
  const t = document.getElementById('miniNpTitle');
  const a = document.getElementById('miniNpArtist');
  if (t) t.textContent = title || '—';
  if (a) a.textContent = artist || '';
}

function renderStats() {
  const total   = setlist.length;
  const done    = setlist.filter(s => s.status === 'done').length;
  const pending = setlist.filter(s => s.status === 'pending').length;
  const el = document.getElementById('spStats');
  if (el && total > 0) {
    el.textContent = `✅ ${done} / ${total} 曲完了 · 残り ${pending} 曲`;
  } else if (el) {
    el.textContent = '';
  }
}

// ════════════════════════════════════
//  Lyrics
// ════════════════════════════════════
function loadLyrics() {
  const saved = localStorage.getItem(LY_KEY) || '';
  const edit  = document.getElementById('lyricsEdit');
  if (edit) edit.value = saved;
  updateLyricsDisplay();
}

function updateLyricsDisplay() {
  const val  = document.getElementById('lyricsEdit').value;
  const disp = document.getElementById('lyricsDisplay');
  const miniLy = document.getElementById('miniLyrics');
  if (val.trim()) {
    disp.classList.remove('empty');
    disp.textContent = val;
  } else {
    disp.classList.add('empty');
    disp.innerHTML = '<span class="empty">ここに歌詞が表示されます</span>';
  }
  if (miniLy) miniLy.textContent = val;
  // fullscreen sync
  if (fullscreenLyrics) syncFullscreenLyrics();
  localStorage.setItem(LY_KEY, val);
}

function toggleLyricsEdit() {
  lyricsEditMode = !lyricsEditMode;
  document.getElementById('lyricsDisplay').style.display = lyricsEditMode ? 'none' : '';
  document.getElementById('lyricsEdit'   ).style.display = lyricsEditMode ? '' : 'none';
  document.getElementById('lyricsToggleBtn').textContent = lyricsEditMode ? '👁 表示' : '✏ 編集';
  if (lyricsEditMode) document.getElementById('lyricsEdit').focus();
}

// ════════════════════════════════════
//  Mini / OBS
// ════════════════════════════════════
function toggleMini() {
  miniMode = !miniMode;
  document.body.classList.toggle('mini', miniMode);
  const btn = document.getElementById('btnMini');
  btn.textContent = miniMode ? '⛶ フル' : '⬜ ミニ';
  btn.classList.toggle('active', miniMode);
  if (miniMode) renderMiniView();
}

function toggleObs() {
  obsMode = !obsMode;
  document.body.classList.toggle('obs-mode', obsMode);
  const btn = document.getElementById('btnObs');
  btn.textContent = obsMode ? '📺 OBS解除' : '📺 OBS';
  btn.classList.toggle('active', obsMode);
}

// ════════════════════════════════════
//  Auto Scroll
// ════════════════════════════════════
let autoScrollActive  = false;
let autoScrollTimer   = null;

function toggleAutoScroll() {
  autoScrollActive = !autoScrollActive;
  const btn = document.getElementById('autoScrollBtn');
  btn.textContent = autoScrollActive ? '⏸ スクロール停止' : '▶ 自動スクロール';
  btn.style.borderColor = autoScrollActive ? 'rgba(232,121,160,.5)' : '';
  btn.style.color       = autoScrollActive ? 'var(--acc)' : '';
  if (autoScrollActive) {
    // 先頭に戻してからスクロール開始
    const el = document.getElementById('lyricsDisplay');
    if (el) el.scrollTop = 0;
    runAutoScroll();
  } else {
    if (autoScrollTimer) { clearInterval(autoScrollTimer); autoScrollTimer = null; }
  }
}

function getActiveLyricsEl() {
  // fullscreen mode uses flLyrics; normal uses lyricsDisplay
  if (document.body.classList.contains('fullscreen-lyrics')) {
    return document.getElementById('flLyrics');
  }
  return document.getElementById('lyricsDisplay');
}

function runAutoScroll() {
  if (autoScrollTimer) clearInterval(autoScrollTimer);
  const el = getActiveLyricsEl();
  if (!el) return;
  const speedId = document.body.classList.contains('fullscreen-lyrics') ? 'flScrollSpeed' : 'scrollSpeed';
  const speed = parseFloat(document.getElementById(speedId)?.value || '0.8');
  autoScrollTimer = setInterval(() => {
    if (!autoScrollActive) { clearInterval(autoScrollTimer); return; }
    el.scrollTop += speed;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 2) {
      autoScrollActive = false;
      clearInterval(autoScrollTimer);
      autoScrollTimer = null;
      const btn = document.getElementById('autoScrollBtn');
      if (btn) { btn.textContent = '▶ 自動スクロール'; btn.style.borderColor = ''; btn.style.color = ''; }
    }
  }, 50);
}

// 速度変更時にリアルタイム反映
document.addEventListener('DOMContentLoaded', () => {
  ['scrollSpeed','flScrollSpeed'].forEach(id => {
    const sp = document.getElementById(id);
    if (sp) sp.addEventListener('change', () => { if (autoScrollActive) runAutoScroll(); });
  });
});

// ════════════════════════════════════
//  Fullscreen Lyrics
// ════════════════════════════════════
let fullscreenLyrics = false;

function toggleFullLyrics() {
  fullscreenLyrics = !fullscreenLyrics;
  document.body.classList.toggle('fullscreen-lyrics', fullscreenLyrics);
  const btn = document.getElementById('btnFullLyrics');
  btn.textContent = fullscreenLyrics ? '✕ 全画面解除' : '⛶ 歌詞全画面';
  btn.classList.toggle('active', fullscreenLyrics);
  if (fullscreenLyrics) {
    syncFullscreenLyrics();
    if (autoScrollActive) { autoScrollActive = false; toggleAutoScroll(); }
  }
}

function syncFullscreenLyrics() {
  const lyrics = document.getElementById('lyricsEdit')?.value || '';
  const fl = document.getElementById('flLyrics');
  if (!fl) return;
  if (lyrics.trim()) {
    fl.classList.remove('empty');
    fl.textContent = lyrics;
  } else {
    fl.innerHTML = '<span style="color:var(--faint);font-style:italic;">歌詞がここに表示されます</span>';
  }
  // sync title/artist
  const title  = document.getElementById('npTitle')?.textContent || '—';
  const artist = document.getElementById('npArtist')?.textContent || '';
  const flT = document.getElementById('flTitle');
  const flA = document.getElementById('flArtist');
  if (flT) flT.textContent = title;
  if (flA) { flA.textContent = artist; flA.style.display = artist ? '' : 'none'; }
}

// ════════════════════════════════════
//  Countdown Timer
// ════════════════════════════════════
let cdRemaining = 0;
let cdTotal     = 0;
let cdRunning   = false;
let cdInterval  = null;

function parseTime(str) {
  const parts = str.trim().split(':');
  if (parts.length === 2) return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  return parseInt(parts[0]) || 0;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function toggleCountdown() {
  if (cdRunning) {
    stopCountdown();
  } else {
    const input = document.getElementById('cdInput');
    const secs = parseTime(input?.value || '4:00');
    if (secs <= 0) return;
    cdTotal     = secs;
    cdRemaining = secs;
    cdRunning   = true;
    updateCdDisplay();
    const btn = document.getElementById('cdBtn');
    if (btn) { btn.textContent = '⏹ 停止'; btn.classList.add('active'); }
    cdInterval = setInterval(() => {
      if (cdRemaining <= 0) { stopCountdown(); return; }
      cdRemaining--;
      updateCdDisplay();
      // コメント頻度をカウントダウン残り時間で調整
      syncCommentFrequency();
    }, 1000);
  }
}

function stopCountdown() {
  clearInterval(cdInterval);
  cdRunning = false;
  cdInterval = null;
  const btn = document.getElementById('cdBtn');
  if (btn) { btn.textContent = '▶ タイマー'; btn.classList.remove('active'); }
  const disp = document.getElementById('cdDisplay');
  if (disp) { disp.classList.remove('running','urgent'); }
  cdRemaining = 0;
  syncCommentFrequency();
}

function updateCdDisplay() {
  const disp = document.getElementById('cdDisplay');
  if (!disp) return;
  disp.textContent = formatTime(cdRemaining);
  const ratio = cdTotal > 0 ? cdRemaining / cdTotal : 1;
  disp.classList.toggle('running', cdRunning && ratio > 0.25);
  disp.classList.toggle('urgent',  cdRunning && ratio <= 0.25);
}

function syncCommentFrequency() {
  // カウントダウンが進むほど（残り時間が減るほど）コメントが増える
  if (!cdRunning || cdTotal <= 0) return;
  const ratio = cdRemaining / cdTotal; // 1.0(開始) → 0(終了)
  // ratio が下がるとコメント間隔も下がる（頻度↑）
  // lv はエフェクト用なので別途 cdLv を使う（コメント頻度計算のみ）
  // getCommentInterval() は lv を参照するが、ここでは cdLv で上書き
  // ratio 1.0→lv0, 0.75→lv1, 0.5→lv2, 0.25→lv3, 0→lv4
  const cdLv = Math.min(4, Math.floor((1 - ratio) * 5));
  if (commentInterval && commentsActive) {
    clearInterval(commentInterval);
    const bases = [5000, 3700, 2600, 1700, 1000];
    const vars  = [1000,  750,  600,  500,  400];
    const interval = bases[cdLv] + randomBetween(-vars[cdLv], vars[cdLv]);
    commentInterval = setInterval(spawnComment, interval);
  }
}

// ════════════════════════════════════
//  Intensity Effect
// ════════════════════════════════════
function startIntensity() {
  clearInterval(lvTimer);
  clearTimeout(lvFadeTimer);
  clearTimeout(particleTimer);
  lvTimer = null; particleTimer = null;
  lv = 1;
  applyLv();
  lvTimer = setInterval(() => {
    if (lv < 4) { lv++; applyLv(); }
  }, 25000);
  scheduleParticles();
}

function stopIntensity() {
  clearInterval(lvTimer);
  clearTimeout(particleTimer);
  lvTimer = null; particleTimer = null;
  const fadeLv = () => {
    if (lv <= 0) { document.body.removeAttribute('data-lv'); return; }
    lv--;
    applyLv();
    lvFadeTimer = setTimeout(fadeLv, 900);
  };
  fadeLv();
}

function applyLv() {
  const badge = document.getElementById('lvBadge');
  if (lv <= 0) {
    document.body.removeAttribute('data-lv');
    if (badge) badge.textContent = '';
  } else {
    document.body.dataset.lv = lv;
    const labels = ['WARM UP ♪','RISING ♫','PEAK ✨','CLIMAX 🔥'];
    if (badge) badge.textContent = 'Lv.' + lv + ' ' + labels[lv - 1];
  }
}

function scheduleParticles() {
  if (!lvTimer && lv <= 0) return;
  const counts   = [1, 2, 4, 7];
  const delays   = [3200, 2000, 1100, 600];
  const count = lv > 0 ? counts[lv - 1] : 0;
  for (let i = 0; i < count; i++) spawnParticle();
  const next = lv > 0 ? delays[lv - 1] + randomBetween(-150, 150) : 9999;
  particleTimer = setTimeout(scheduleParticles, next);
}

function spawnParticle() {
  const el = document.createElement('span');
  el.className = 'particle';
  el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
  const x   = randomBetween(3, 95);
  const sz  = randomBetween(14, 26);
  const dur = randomBetween(3500, 6200);
  const dx  = randomBetween(-130, 130);
  const rot = randomBetween(-210, 210);
  const op  = Math.min(0.95, 0.55 + lv * 0.1);
  el.style.cssText =
    `left:${x}vw;bottom:4vh;` +
    `--ps:${sz}px;--pd:${dur}ms;--po:${op};--px:${dx}px;--pr:${rot}deg;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur + 300);
}

let commentsActive  = true;

function startComments() {
  if (commentInterval) clearInterval(commentInterval);
  commentInterval = setInterval(spawnComment, getCommentInterval());
}

function stopComments() {
  if (commentInterval) { clearInterval(commentInterval); commentInterval = null; }
}

function toggleComments() {
  commentsActive = !commentsActive;
  const btn = document.getElementById('ccBtn');
  btn.textContent = commentsActive ? '💬 コメント ON' : '💬 コメント OFF';
  btn.classList.toggle('active', commentsActive);
  if (commentsActive) startComments(); else stopComments();
}

function spawnComment() {
  if (!commentsActive) return;
  const wrap = document.getElementById('commentsWrap');
  if (!wrap) return;

  const persona = COMMENT_POOL[Math.floor(Math.random() * COMMENT_POOL.length)];
  const text    = persona.texts[Math.floor(Math.random() * persona.texts.length)];

  const el = document.createElement('div');
  el.className = 'comment-item';

  const leftPct = randomBetween(3, 62);
  const dur = randomBetween(7500, 11500);
  el.style.cssText = `left:${leftPct}vw;bottom:70px;--cr-dur:${dur}ms;`;

  el.innerHTML = `
    <span class="ci-icon">${persona.icon}</span>
    <div class="ci-body">
      <div class="ci-name">${persona.name}</div>
      <div class="ci-text">${text}</div>
    </div>`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), dur + 400);

  // 次のコメントまでの間隔（lv が高いほど短い）
  if (commentInterval) {
    clearInterval(commentInterval);
    commentInterval = setInterval(spawnComment, getCommentInterval());
  }
}

function getCommentInterval() {
  // lv 0=4000-6000ms / lv1=3000-4500 / lv2=2000-3200 / lv3=1200-2200 / lv4=600-1400
  const bases = [5000, 3700, 2600, 1700, 1000];
  const vars  = [1000,  750,  600,  500,  400];
  const l = Math.max(0, Math.min(4, lv));
  return bases[l] + randomBetween(-vars[l], vars[l]);
}

function randomBetween(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ════════════════════════════════════
//  Utils
// ════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
