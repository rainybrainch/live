async function generateGeminiImage(prompt) {
  const key = getGeminiKey();
  if (!key) throw new Error('Gemini APIキーを設定してください（設定タブ）');
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Gemini image error: ${res.status}`);
  }
  const json = await res.json();
  const parts = json.candidates?.[0]?.content?.parts || [];
  const imgPart = parts.find(p => p.inlineData?.mimeType?.startsWith('image/'));
  if (!imgPart) throw new Error('画像データが返りませんでした');
  const { mimeType, data } = imgPart.inlineData;
  return `data:${mimeType};base64,${data}`;
}

async function generateStabilityImage(prompt, aspectRatio = '1:1') {
  const key = localStorage.getItem(STABILITY_KEY_SK);
  if (!key) throw new Error('Stability AI APIキーを設定してください（設定タブ）');
  const form = new FormData();
  form.append('prompt', prompt);
  form.append('output_format', 'jpeg');
  form.append('aspect_ratio', aspectRatio);
  const res = await fetch('https://api.stability.ai/v2beta/stable-image/generate/core', {
    method: 'POST',
    headers: { Authorization: `Bearer ${key}`, Accept: 'image/*' },
    body: form
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.errors?.[0] || err?.message || `Stability AI error: ${res.status}`);
  }
  const blob = await res.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function generateVideo() {
  const sb = storyboardData[sbKey()];
  if (!sb?.scenes?.length) { showToast('絵コンテがありません'); return; }
  const scenes = sb.scenes.filter(s => s.imageDataUrl);
  if (scenes.length === 0) { showToast('画像が1枚もありません'); return; }

  const progEl = document.getElementById('videoGenProgress');
  if (progEl) progEl.style.display = 'block';
  updateVideoProgress('FFmpeg を読み込み中...（初回のみ30秒ほどかかります）', 3);

  const isShorts = sb.format === 'shorts';
  const W = isShorts ? 720 : 1280;
  const H = isShorts ? 1280 : 720;

  try {
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ff = createFFmpeg({
      log: false,
      corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
      progress: ({ ratio }) => updateVideoProgress('動画を合成中...', 20 + Math.round((ratio || 0) * 60))
    });
    await ff.load();
    updateVideoProgress('画像を読み込み中...', 15);

    // シーンごとに画像書き込み + セグメント動画作成
    const segFiles = [];
    let totalDur = 0;
    for (let i = 0; i < scenes.length; i++) {
      const s = scenes[i];
      const dur = window._sceneDurMode === 'fixed'
        ? (window._fixedDurSec || 5)
        : calcSceneDuration(s);
      totalDur += dur;
      const imgName = `img_${i}.jpg`;
      ff.FS('writeFile', imgName, await fetchFile(s.imageDataUrl));
      const segName = `seg_${i}.mp4`;
      await ff.run(
        '-loop', '1', '-i', imgName,
        '-t', String(dur),
        '-vf', `scale=${W}:${H}:force_original_aspect_ratio=decrease,pad=${W}:${H}:(ow-iw)/2:(oh-ih)/2,format=yuv420p`,
        '-c:v', 'libx264', '-preset', 'ultrafast', '-r', '24', '-an',
        segName
      );
      segFiles.push(segName);
      updateVideoProgress(`シーン ${i + 1}/${scenes.length} 処理中...`, 15 + Math.round((i + 1) / scenes.length * 35));
    }

    // 結合
    updateVideoProgress('シーンを結合中...', 55);
    ff.FS('writeFile', 'filelist.txt', segFiles.map(f => `file '${f}'`).join('\n'));
    await ff.run('-f', 'concat', '-safe', '0', '-i', 'filelist.txt', '-c', 'copy', 'concat.mp4');

    // BGM追加
    let finalFile = 'concat.mp4';
    if (window._bgmDataUrl) {
      updateVideoProgress('BGMを追加中...', 75);
      ff.FS('writeFile', 'bgm_src', await fetchFile(window._bgmDataUrl));
      const fadeStart = Math.max(0, totalDur - 2);
      await ff.run(
        '-i', 'concat.mp4',
        '-stream_loop', '-1', '-i', 'bgm_src',
        '-c:v', 'copy', '-c:a', 'aac', '-b:a', '192k',
        '-map', '0:v:0', '-map', '1:a:0',
        '-t', String(totalDur),
        '-af', `afade=t=out:st=${fadeStart}:d=2`,
        'final.mp4'
      );
      finalFile = 'final.mp4';
    }

    updateVideoProgress('書き出し中...', 90);
    const outData = ff.FS('readFile', finalFile);
    const blob = new Blob([outData.buffer], { type: 'video/mp4' });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ep = (data.episodes || []).find(e => e.id === currentEpisodeId);
    a.download = `${(ep?.title || 'video').replace(/[^\w぀-鿿]/g, '_')}_${Date.now()}.mp4`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    updateVideoProgress('✅ 完了！', 100);
    showToast('✅ 動画を生成しました');
  } catch(e) {
    updateVideoProgress('❌ エラー: ' + e.message, 0);
    showToast('❌ 動画生成エラー: ' + e.message);
    console.error(e);
  }
}

function generateFFmpegScript(format, sceneCount, charName) {
  const isShorts = format === 'shorts';
  const totalDuration = isShorts ? 50 : 180;
  const width = isShorts ? 1080 : 1920;
  const height = isShorts ? 1920 : 1080;

  // シーンの秒数配分
  let sceneDurations;
  if (isShorts) {
    // ショート: フック2s / 結論8s / 理由例×n / CTA最後5s
    const middle = sceneCount - 2;
    const midDur = Math.floor((50 - 2 - 8 - 5) / Math.max(middle, 1));
    sceneDurations = [2, 8, ...Array(middle).fill(midDur), 5];
  } else {
    // 横動画: フック15s / 課題提起30s / 解決策÷n / 行動喚起30s
    const middle = sceneCount - 3;
    const midDur = Math.floor((180 - 15 - 30 - 30) / Math.max(middle, 1));
    sceneDurations = [15, 30, ...Array(middle).fill(midDur), 30];
  }
  // 合計秒数をtotalDurationに合わせて最後を調整
  const sumDur = sceneDurations.reduce((a, b) => a + b, 0);
  if (sceneDurations.length > 0) sceneDurations[sceneDurations.length - 1] += totalDuration - sumDur;

  return `#!/usr/bin/env python3
# -*- coding: utf-8 -*-
# RBAI Channel OS - 素材コンパイルスクリプト
# キャラクター: ${charName}
# フォーマット: ${isShorts ? 'ショート（9:16 / 50秒）' : '横動画（16:9 / 180秒）'}
#
# 必要: pip install ffmpeg-python pillow
# FFmpegも必要: https://ffmpeg.org/download.html
#
# 使い方: python compile_video.py
#   → output.mp4 が生成されます

import os
import subprocess
import glob
from pathlib import Path

SCRIPT_DIR = Path(__file__).parent
AUDIO_FILE = SCRIPT_DIR / "audio.wav"
OUTPUT_FILE = SCRIPT_DIR / "output.mp4"
WIDTH = ${width}
HEIGHT = ${height}
FPS = 30
CHAR_NAME = "${charName}"

# シーンファイルとその表示秒数（手動で調整可）
SCENE_DURATIONS = ${JSON.stringify(sceneDurations)}

def find_scenes():
    scenes = sorted(glob.glob(str(SCRIPT_DIR / "scene_*.png")) +
                    glob.glob(str(SCRIPT_DIR / "scene_*.jpg")))
    return scenes

def compile_video():
    scenes = find_scenes()
    if not scenes:
        print("ERROR: scene_XX.png/jpg が見つかりません")
        return

    print(f"シーン数: {len(scenes)}")
    for i, s in enumerate(scenes):
        print(f"  {i+1}: {Path(s).name}")

    durations = SCENE_DURATIONS[:len(scenes)]
    while len(durations) < len(scenes):
        durations.append(3)

    # 各シーンを指定秒数の動画に変換（背景黒 + キャラ画像センタリング）
    temp_clips = []
    for i, (scene_path, dur) in enumerate(zip(scenes, durations)):
        temp_out = str(SCRIPT_DIR / f"_tmp_{i:02d}.mp4")
        cmd = [
            "ffmpeg", "-y",
            "-loop", "1", "-t", str(dur), "-i", scene_path,
            "-vf", f"scale={WIDTH}:{HEIGHT}:force_original_aspect_ratio=decrease,"
                   f"pad={WIDTH}:{HEIGHT}:(ow-iw)/2:(oh-ih)/2:black",
            "-c:v", "libx264", "-pix_fmt", "yuv420p",
            "-r", str(FPS),
            temp_out
        ]
        print(f"[{i+1}/{len(scenes)}] {Path(scene_path).name} → {dur}秒")
        subprocess.run(cmd, check=True, capture_output=True)
        temp_clips.append(temp_out)

    # シーンを結合
    concat_list = str(SCRIPT_DIR / "_concat.txt")
    with open(concat_list, "w") as f:
        for clip in temp_clips:
            f.write(f"file '{clip}'\\n")

    merged = str(SCRIPT_DIR / "_merged.mp4")
    cmd = ["ffmpeg", "-y", "-f", "concat", "-safe", "0", "-i", concat_list,
           "-c", "copy", merged]
    subprocess.run(cmd, check=True, capture_output=True)

    # 音声合成
    if AUDIO_FILE.exists():
        cmd = [
            "ffmpeg", "-y",
            "-i", merged, "-i", str(AUDIO_FILE),
            "-map", "0:v", "-map", "1:a",
            "-c:v", "copy", "-c:a", "aac",
            "-shortest",
            str(OUTPUT_FILE)
        ]
        print("音声を合成中...")
        subprocess.run(cmd, check=True, capture_output=True)
    else:
        print("WARNING: audio.wav が見つかりません。映像のみ出力します")
        import shutil
        shutil.copy(merged, str(OUTPUT_FILE))

    # 一時ファイルを削除
    for f in temp_clips + [concat_list, merged]:
        try: os.remove(f)
        except: pass

    print(f"\\n✅ 完成: {OUTPUT_FILE}")
    print(f"   解像度: {WIDTH}x{HEIGHT}")
    print(f"   合計時間: {sum(durations)}秒")

if __name__ == "__main__":
    compile_video()
`;
}

// ── Rain animation ──
(function() {
  const canvas = document.getElementById('rain-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let drops = [];
  const COUNT = 90;
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function init() {
    drops = [];
    for (let i = 0; i < COUNT; i++) drops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      len: 8 + Math.random() * 18,
      speed: 1.0 + Math.random() * 2.2,
      opacity: 0.04 + Math.random() * 0.13,
      width: 0.5 + Math.random() * 0.7,
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const d of drops) {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len * 0.12, d.y + d.len);
      ctx.strokeStyle = `rgba(130,185,230,${d.opacity})`;
      ctx.lineWidth = d.width;
      ctx.lineCap = 'round';
      ctx.stroke();
      d.y += d.speed; d.x -= d.speed * 0.12;
      if (d.y - d.len > canvas.height || d.x < -20) {
        d.x = Math.random() * (canvas.width + 60); d.y = -d.len;
      }
    }
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();

// ── roundRect polyfill ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, Math.min(w, h) / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.arcTo(x + w, y, x + w, y + r, r);
    this.lineTo(x + w, y + h - r);
    this.arcTo(x + w, y + h, x + w - r, y + h, r);
    this.lineTo(x + r, y + h);
    this.arcTo(x, y + h, x, y + h - r, r);
    this.lineTo(x, y + r);
    this.arcTo(x, y, x + r, y, r);
    this.closePath();
  };
}

// ── 起動 ──
loadStoryboard();
renderSidebar();
// サイドバーは初期状態で閉じる（mainをフル幅で使う）
const _aside = document.querySelector('aside');
if (_aside) _aside.classList.add('closed');
selectChar('manebou_news');
