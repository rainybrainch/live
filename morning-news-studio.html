<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning news Studio</title>
<link rel="icon" href="ms-icon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<style>
  :root {
    --accent: #d4a843;
    --accent2: #f0c860;
    --bg: #080e18;
    --surface: rgba(255,255,255,.04);
    --surface-solid: #0f1820;
    --surface2: rgba(255,255,255,.07);
    --text: #eef2f7;
    --text-muted: #7a8fa8;
    --border: rgba(255,255,255,.1);
    --border-accent: rgba(212,168,67,.35);
    --char-color: #d4a843;
    --rain-color: rgba(130,185,230,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    font-size: 14px; line-height: 1.6;
    overflow: hidden;
  }

  /* ── Rain canvas ── */
  #rain-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; opacity: 1;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 10;
    background: linear-gradient(90deg, #0b1622 0%, #0f1e2e 100%);
    border-bottom: 1px solid var(--border-accent);
    padding: 0 18px; display: flex; align-items: center; gap: 12px; height: 52px;
    box-shadow: 0 2px 16px rgba(0,0,0,.5);
  }
  header h1 { font-size: 1.05rem; font-weight: 700; color: var(--accent); letter-spacing: .05em; white-space: nowrap; }
  header h1 .sub { font-size: .62rem; font-weight: 400; color: var(--text-muted); letter-spacing: .08em; margin-left: 4px; }
  header span { color: var(--text-muted); font-size: .75rem; }
  #sidebarToggle {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text-muted);
    width: 34px; height: 34px; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .18s;
  }
  #sidebarToggle:hover { border-color: var(--accent); color: var(--accent); background: rgba(212,168,67,.1); }

  .layout { position: relative; flex: 1; display: flex; overflow: hidden; z-index: 1; min-height: 0; }

  /* ── サイドバー: オーバーレイ方式 ── */
  aside {
    position: absolute; left: 0; top: 0; height: 100%; z-index: 50;
    width: 220px;
    background: linear-gradient(180deg, #0c1824 0%, #0a1520 100%);
    border-right: 1px solid var(--border-accent);
    display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
    transform: translateX(0);
    transition: transform .24s cubic-bezier(.4,0,.2,1), box-shadow .24s;
    box-shadow: 4px 0 24px rgba(0,0,0,.6);
  }
  aside.closed { transform: translateX(-100%); box-shadow: none; }

  #sidebarOverlay {
    display: none; position: absolute; inset: 0; z-index: 49;
    background: rgba(0,0,0,.5); backdrop-filter: blur(2px);
  }
  #sidebarOverlay.visible { display: block; }

  .sidebar-title {
    padding: 14px 16px 6px; font-size: .62rem; font-weight: 700;
    color: var(--accent); letter-spacing: .18em; text-transform: uppercase;
    white-space: nowrap; opacity: .7;
  }
  .char-item { padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent; transition: all .18s; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .char-item:hover { background: rgba(255,255,255,.05); }
  .char-item.active { border-left-color: var(--char-color); background: rgba(212,168,67,.08); }
  .char-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .95rem; flex-shrink: 0; overflow: hidden; }
  .char-icon img { width: 100%; height: 100%; object-fit: cover; }
  .char-name { font-size: .85rem; font-weight: 600; }
  .char-theme { font-size: .68rem; color: var(--text-muted); }
  .add-char-btn {
    margin: 10px 12px; padding: 9px;
    background: none; border: 1px dashed rgba(255,255,255,.15);
    border-radius: 6px; color: var(--text-muted); cursor: pointer;
    font-size: .8rem; transition: all .2s; white-space: nowrap;
  }
  .add-char-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { flex: 1; min-height: 0; overflow-y: auto; padding: 22px 28px; display: flex; flex-direction: column; gap: 18px; }

  .char-header {
    background: linear-gradient(135deg, rgba(15,28,44,.9) 0%, rgba(10,20,32,.9) 100%);
    border: 1px solid var(--border-accent);
    border-radius: 10px; padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    border-left: 3px solid var(--char-color);
    backdrop-filter: blur(8px);
  }
  .char-header-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; overflow: hidden; flex-shrink: 0; background: rgba(212,168,67,.12); border: 1px solid var(--border-accent); }
  .char-header-icon img { width: 100%; height: 100%; object-fit: cover; }
  .char-header-info h2 { font-size: 1rem; font-weight: 700; color: var(--accent2); letter-spacing: .02em; }
  .char-header-info p { font-size: .74rem; color: var(--text-muted); margin-top: 1px; }
  .char-header-badges { margin-top: 5px; display: flex; gap: 5px; flex-wrap: wrap; }
  .badge {
    background: rgba(212,168,67,.12); border: 1px solid var(--border-accent);
    border-radius: 4px; padding: 2px 8px; font-size: .7rem; color: var(--accent);
  }

  .tabs {
    display: flex; gap: 1px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    background: rgba(0,0,0,.2);
    border-radius: 8px 8px 0 0;
    padding: 4px 4px 0;
  }
  .tab {
    padding: 8px 16px; background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: .8rem; font-weight: 500;
    border-bottom: 2px solid transparent;
    border-radius: 6px 6px 0 0;
    transition: all .16s; font-family: inherit;
    position: relative; letter-spacing: .02em; white-space: nowrap;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.05); }
  .tab.active {
    color: var(--accent2); border-bottom-color: var(--accent);
    background: rgba(212,168,67,.08);
  }
  .tab .notif-dot { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: #e53935; display: none; box-shadow: 0 0 0 2px var(--bg); }
  .tab.has-notif .notif-dot { display: block; }

  /* グローバルAIスピナー */
  #globalAiSpinner {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 24px; padding: 8px 14px 8px 10px;
    display: none; align-items: center; gap: 8px;
    font-size: .78rem; color: var(--text-muted);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  #globalAiSpinner.visible { display: flex; }
  #globalAiSpinner .spin {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--border); border-top-color: var(--char-color,#c9a84c);
    animation: spin360 .8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin360 { to { transform: rotate(360deg); } }

  .panel { display: none; flex-direction: column; gap: 16px; }
  .panel.active { display: flex; }

  .card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 10px; padding: 18px 20px;
    backdrop-filter: blur(4px);
    transition: border-color .18s;
  }
  .card:hover { border-color: rgba(255,255,255,.15); }
  .card-title { font-size: .72rem; font-weight: 700; color: var(--text-muted); letter-spacing: .1em; margin-bottom: 12px; text-transform: uppercase; }

  .form-row { display: flex; gap: 10px; align-items: flex-end; }
  .form-row.col { flex-direction: column; align-items: stretch; }
  label { font-size: .78rem; color: var(--text-muted); margin-bottom: 4px; display: block; font-weight: 500; }
  input, textarea, select {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
    border-radius: 7px; color: var(--text); padding: 9px 13px;
    font-family: inherit; font-size: .88rem; width: 100%;
    transition: border-color .18s, background .18s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
    background: rgba(212,168,67,.06);
  }
  input::placeholder, textarea::placeholder { color: rgba(122,143,168,.5); }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    padding: 9px 18px; border-radius: 7px; border: none;
    cursor: pointer; font-size: .84rem; font-family: inherit;
    font-weight: 600; transition: all .18s; white-space: nowrap;
    letter-spacing: .02em;
  }
  .btn-primary { background: linear-gradient(135deg, #d4a843 0%, #e8bf60 100%); color: #0d0d0d; box-shadow: 0 2px 10px rgba(212,168,67,.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,168,67,.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); background: rgba(212,168,67,.08); color: var(--accent); }
  .btn-sm { padding: 5px 11px; font-size: .76rem; border-radius: 6px; }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .result-box { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 14px; font-size: .85rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; min-height: 80px; color: var(--text); }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .result-label { font-size: .72rem; color: var(--accent); font-weight: 700; letter-spacing: .06em; }

  .plan-grid { display: flex; flex-direction: column; gap: 10px; }
  .plan-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: all .2s; }
  .plan-card:hover { border-color: var(--char-color); }
  .plan-card.selected { border-color: var(--char-color); background: #1e1a14; }
  .plan-card-label { font-size: .72rem; color: var(--char-color); font-weight: 700; margin-bottom: 4px; }
  .plan-card-title { font-size: .95rem; font-weight: 600; margin-bottom: 4px; }
  .plan-card-desc { font-size: .8rem; color: var(--text-muted); line-height: 1.5; }

  .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 8px; }
  .schedule-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: .8rem; }
  .schedule-date { color: var(--char-color); font-weight: 700; margin-bottom: 4px; }
  .schedule-ep { color: var(--text-muted); font-size: .75rem; }

  /* ── Asset Manager ── */
  .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; }
  .asset-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all .2s; position: relative; }
  .asset-card:hover { border-color: var(--char-color); }
  .asset-card.selected { border-color: var(--char-color); border-width: 2px; }
  .asset-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 2rem; }
  .asset-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .asset-name { padding: 6px 8px; font-size: .72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-use-btn { position: absolute; top: 4px; right: 4px; background: var(--char-color); color: #0d0d0d; border: none; border-radius: 4px; padding: 3px 7px; font-size: .68rem; font-weight: 700; cursor: pointer; opacity: 0; transition: opacity .2s; }
  .asset-card:hover .asset-use-btn { opacity: 1; }

  .upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: all .2s; color: var(--text-muted); }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--char-color); color: var(--char-color); }
  .upload-zone .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone p { font-size: .82rem; }

  /* ── Storyboard ── */
  .storyboard-grid { display: flex; flex-direction: column; gap: 14px; }
  .sb-scene { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .sb-scene-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .sb-scene-badge { background: var(--char-color); color: #0d0d0d; border-radius: 4px; padding: 2px 8px; font-size: .72rem; font-weight: 700; }
  .sb-scene-time { font-size: .75rem; color: var(--text-muted); }
  .sb-scene-body { display: grid; grid-template-columns: 160px 1fr; gap: 0; }
  .sb-image-col { border-right: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .sb-image-preview { width: 136px; height: 90px; object-fit: cover; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.8rem; border: 1px solid var(--border); overflow: hidden; }
  .sb-image-preview img { width: 100%; height: 100%; object-fit: cover; }
  .sb-text-col { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .sb-script-lines { font-size: .78rem; color: var(--text-muted); line-height: 1.6; background: var(--surface); border-radius: 4px; padding: 8px 10px; max-height: 80px; overflow-y: auto; }
  .sb-prompt-row { display: flex; gap: 6px; }
  .sb-prompt-input { flex: 1; font-size: .8rem; padding: 6px 10px; }
  @media (max-width: 600px) { .sb-scene-body { grid-template-columns: 1fr; } .sb-image-col { border-right: none; border-bottom: 1px solid var(--border); } }

  /* サムネ作成 レスポンシブ */
  .thumb-layout { display: grid; grid-template-columns: 1fr 270px; gap: 16px; align-items: start; }
  @media (max-width: 700px) {
    .thumb-layout { grid-template-columns: 1fr; }
    .thumb-layout > div:last-child { position: static !important; }
    .thumb-layout canvas { max-height: 340px; width: auto; display: block; margin: 0 auto; }
  }

  /* ── Scene Composer ── */
  .scene-layout { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
  .canvas-wrap { background: #000; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
  #sceneCanvas { display: block; max-width: 100%; max-height: 460px; }
  .scene-controls { display: flex; flex-direction: column; gap: 12px; }
  .format-toggle { display: flex; gap: 6px; }
  .format-btn { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); cursor: pointer; font-size: .78rem; text-align: center; transition: all .2s; }
  .format-btn.active { border-color: var(--char-color); color: var(--char-color); background: #1e1a14; }
  .layer-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; font-size: .82rem; }
  .layer-thumb { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; background: var(--surface); flex-shrink: 0; }
  .export-btns { display: flex; gap: 8px; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.open { display: flex; }
  .modal { background: #0f1e2e; border: 1px solid var(--border-accent); border-radius: 12px; padding: 24px; width: 90%; max-width: 460px; display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 1rem; color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(212,168,67,.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(212,168,67,.5); }

  .loading { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: .8rem; padding: 8px 0; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }

  .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
  .empty p { font-size: .82rem; line-height: 1.6; }

  @media (max-width: 768px) {
    aside { width: 240px; }
    main { padding: 14px 16px; }
    .char-header { flex-wrap: wrap; }
  }
</style>
</head>
<canvas id="rain-canvas"></canvas>

<div id="globalAiSpinner">
  <div class="spin"></div>
  <span id="globalAiLabel">AI処理中...</span>
</div>

<header>
  <button id="sidebarToggle" onclick="toggleSidebar()" title="サイドバー開閉">☰</button>
  <img src="ms-icon.png" alt="MS" style="width:32px;height:32px;border-radius:7px;flex-shrink:0;">
  <h1>Morning news Studio</h1>
  <span id="headerSub" style="font-size:.78rem;color:var(--text-muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
  <span id="saveIndicator" style="margin-left:auto;font-size:.72rem;color:var(--text-muted);opacity:0;transition:opacity .5s;flex-shrink:0;">💾</span>
  <button onclick="switchTab('settings')" style="margin-left:8px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:5px 10px;cursor:pointer;font-size:.78rem;flex-shrink:0;white-space:nowrap;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">⚙️ 設定</button>
</header>

<div class="layout">
  <div id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside>
    <div style="padding:14px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08);">
      <img src="ms-icon.png" alt="MS" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;">
      <div style="font-size:.7rem;font-weight:700;color:var(--accent);letter-spacing:.06em;line-height:1.3;">MORNING<br>NEWS</div>
    </div>
    <div id="charList" style="display:none"></div>
    <div class="sidebar-title" id="epSidebarTitle" style="margin-top:8px;">動画プロジェクト</div>
    <div id="episodeList"></div>
  </aside>
  <main id="mainArea">
    <div class="empty">
      <div class="empty-icon">🦉🐸</div>
      <h3>キャラクターを選択</h3>
      <p>左のサイドバーからキャラクターを選択するか<br>新しいキャラクターを追加してください</p>
    </div>
  </main>
</div>

<!-- Drive Asset Picker Modal -->
<div class="modal-overlay" id="drivePickerModal">
  <div class="modal" style="max-width:680px;">
    <h2>📂 Drive素材から選択</h2>
    <p style="font-size:.78rem;color:var(--text-muted);margin:6px 0 16px;">キャラのDriveフォルダから画像を選択してシーンに適用します</p>
    <div id="drivePickerGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-height:400px;overflow-y:auto;padding:4px;"></div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('drivePickerModal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- Add/Edit Char Modal -->
<div class="modal-overlay" id="addCharModal">
  <div class="modal">
    <h2 id="modalTitle">🎭 新しいキャラクターを追加</h2>

    <!-- アイコン + 名前 横並び -->
    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;">
        <img id="charIconPreview" src="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid #c9a84c;display:none;">
        <div id="charIconPlaceholder" style="width:72px;height:72px;border-radius:50%;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;">🎭</div>
        <button type="button" class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:4px 8px;" onclick="generateCharIconInModal()">💎 AI生成</button>
        <span id="charIconStatus" style="font-size:.7rem;color:#aaa;text-align:center;max-width:72px;"></span>
        <input type="hidden" id="newCharAvatarDataUrl">
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;">

//  サービスアカウント認証（期限切れなし）

async function getGDToken() {
  const saJson = localStorage.getItem(SA_JSON_SK);
  if (saJson) {
    const now = Date.now();
    const expiry = parseInt(localStorage.getItem(SA_EXPIRY_SK) || '0');
    if (expiry - now > 5 * 60 * 1000) return localStorage.getItem(SA_TOKEN_SK);
    try { return await fetchSAToken(JSON.parse(saJson)); } catch(e) { showToast('SA認証エラー: ' + e.message); return null; }
  }
  return localStorage.getItem(GD_TOKEN_SK);
}

async function fetchSAToken(sa) {
  const now = Math.floor(Date.now() / 1000);
  const b64 = s => btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const header = { alg: 'RS256', typ: 'JWT' };
  const claim  = { iss: sa.client_email, scope: 'https://www.googleapis.com/auth/drive', aud: 'https://oauth2.googleapis.com/token', exp: now+3600, iat: now };
  const sigInput = `${b64(header)}.${b64(claim)}`;
  const pem = sa.private_key.replace(/-----[^\n]+-----/g,'').replace(/\s/g,'');
  const der = Uint8Array.from(atob(pem), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey('pkcs8', der.buffer, { name:'RSASSA-PKCS1-v1_5', hash:'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, new TextEncoder().encode(sigInput));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const jwt = `${sigInput}.${sigB64}`;
  const res = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
  });
  if (!res.ok) throw new Error('SA token failed: ' + res.status);
  const json = await res.json();
  localStorage.setItem(SA_TOKEN_SK, json.access_token);
  localStorage.setItem(SA_EXPIRY_SK, String(Date.now() + json.expires_in * 1000));
  return json.access_token;
}

// ── Drive APIキー自動読み込み ──
const KEYS_FILENAME = 'channelos-keys.json';

async function autoLoadKeysFromDrive(token) {
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${KEYS_FILENAME}'&spaces=drive&fields=files(id)`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) return;
    const json = await res.json();
    if (!json.files || !json.files.length) return;
    const fileId = json.files[0].id;
    const fileRes = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!fileRes.ok) return;
    const keys = await fileRes.json();
    if (keys.claude)  localStorage.setItem(API_KEY_SK, keys.claude);
    if (keys.openai)  localStorage.setItem('channelos_openai_api_key', keys.openai);
    if (keys.gemini)  localStorage.setItem(GEMINI_KEY_SK, keys.gemini);
    showToast('🔑 APIキーをDriveから自動読み込みしました');
  } catch(e) { /* 失敗しても無視 */ }
}

async function saveKeysToDrive() {
  const token = localStorage.getItem(GD_TOKEN_SK);
  if (!token) { showToast('先にGoogle Driveで認証してください'); return; }
  const keys = {
    claude: localStorage.getItem(API_KEY_SK) || '',
    openai: localStorage.getItem('channelos_openai_api_key') || '',
    gemini: localStorage.getItem(GEMINI_KEY_SK) || ''
  };
  try {
    // 既存ファイルを検索
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${KEYS_FILENAME}'&spaces=drive&fields=files(id)`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const json = await res.json();
    const content = JSON.stringify(keys, null, 2);
    if (json.files && json.files.length) {
      // 上書き
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${json.files[0].id}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: content
      });
    } else {
      // 新規作成
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: KEYS_FILENAME })], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form
      });
    }
    showToast('✅ APIキーをDriveに保存しました（チーム共有）');
  } catch(e) { showToast('Drive保存エラー: ' + e.message); }
}

// ── Drive 画像保存ユーティリティ ──
async function saveImageToDrive(dataUrl, filename, folderId) {
  const token = localStorage.getItem(GD_TOKEN_SK);
  if (!token) return null;
  try {
    const [header, b64] = dataUrl.split(',');
    const mime = header.match(/:(.*?);/)[1];
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: mime });
    const meta = { name: filename, ...(folderId ? { parents: [folderId] } : {}) };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: form
    });
    if (!res.ok) return null;
    const json = await res.json();
    return json.id;
  } catch(e) { return null; }
}

async function driveRequest(url, options = {}) {
  const token = await getGDToken();
  if (!token) { showToast('Drive未認証。設定タブでサービスアカウントを設定してください'); return null; }
  const res = await fetch(url, { ...options, headers: { Authorization: `Bearer ${token}`, ...(options.headers||{}) } });
  if (res.status === 401) { localStorage.removeItem(SA_EXPIRY_SK); showToast('Drive認証エラー。再試行してください'); return null; }
  return res;
}

async function findSharedFile() {
  const folderId = localStorage.getItem(GD_FOLDER_SK) || '1-QySS62i1cHPNh9lHg1quqPtyZ2zIp_x';
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=name='${SHARED_FILENAME}'+and+'${folderId}'+in+parents&fields=files(id)`);
  if (!res) return null;
  const json = await res.json();
  return (json.files && json.files.length) ? json.files[0].id : null;
}

async function loadFromDrive() {
  const token = localStorage.getItem(GD_TOKEN_SK);
  if (!token) { setSyncStatus('none', 'Drive未接続'); return; }
  setSyncStatus('loading', '同期中...');
  try {
    if (!sharedFileId) sharedFileId = await findSharedFile();
    if (!sharedFileId) { await autoSaveToDrive(); setSyncStatus('ok', '新規作成完了'); return; }
    const res = await driveRequest(`https://www.googleapis.com/drive/v3/files/${sharedFileId}?alt=media`);
    if (!res) { setSyncStatus('error', '読込失敗（認証切れ？）'); return; }
    const remote = await res.json();
    if (!remote || !remote.characters) { setSyncStatus('error', 'データ破損'); return; }
    const localEpisodes = data.episodes || [];
    data = remote;
    data.episodes = data.episodes || [];
    localEpisodes.forEach(local => {
      if (!data.episodes.find(e => e.id === local.id)) data.episodes.push(local);
    });
    defaultData().characters.forEach(def => {
      const existing = data.characters.find(c => c.id === def.id);
      if (!existing) {
        data.characters.push(def);
      } else {
        ['drive_folder_id','channel_id','ai_personality','icon','color','species','theme','tone','gpt_url','gem_url'].forEach(k => {
          if ((existing[k] === undefined || existing[k] === '') && def[k]) existing[k] = def[k];
        });
      }
    });
    saveData(data);
    renderSidebar();
    if (currentCharId) renderMain();
    const epCount = (data.episodes||[]).length;
    setSyncStatus('ok', `同期完了 (${epCount}プロジェクト)`);
  } catch(e) {
    setSyncStatus('error', `エラー: ${e.message}`);
  }
}

function showToast(msg, duration) {
  const ms = duration || 3000;
  const isError = msg.startsWith('❌') || msg.startsWith('⚠️');
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${isError ? '#4a1a1a' : '#333'};
    border:${isError ? '1px solid #e55' : 'none'};
    color:#fff;padding:12px 22px;border-radius:10px;font-size:.82rem;z-index:9999;
    max-width:80vw;text-align:center;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.5);`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

function selectChar(id) {
  currentCharId = id; selectedPlan = null; generatedScript = ''; generatedMeta = null; currentEpisodeId = null;
  // 最後に開いていたエピソードを復元
  const eps = (data.episodes || []).filter(e => e.charId === id);
  if (eps.length > 0) {
    const last = eps.slice().sort((a,b) => (b.updatedAt||b.createdAt||'').localeCompare(a.updatedAt||a.createdAt||'')).find(e => e.id);
    if (last) { currentEpisodeId = last.id; selectedPlan = last.plan||null; generatedScript = last.script||''; generatedMeta = last.meta||null; }
  }
  renderSidebar(); renderMain();
}

function switchTab(tab) {
  currentTab = tab;
  const char = data.characters.find(c => c.id === currentCharId);

  // 設定：ヘッダーボタン専用
  if (tab === 'settings') {
    if (!currentCharId) {
      document.getElementById('mainArea').innerHTML = renderSettingsPanel();
    } else {
      const el = document.getElementById('panelSettings');
      if (el) el.outerHTML = renderSettingsPanel();
      ['news','script','meta','thumb','publish','settings'].forEach(t => {
        const p = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
        if (p) p.classList.toggle('active', t === 'settings');
      });
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    }
    return;
  }

  // 各パネルを最新状態で再描画してからアクティブ化
  if (char) {
    const renders = {
      news:     () => { const el = document.getElementById('panelNews');     if (el) el.outerHTML = renderNewsPanel(); },
      script:   () => { const el = document.getElementById('panelScript');   if (el) el.outerHTML = renderScriptPanel(char); },
      meta:     () => { const el = document.getElementById('panelMeta');     if (el) el.outerHTML = renderMetaPanel(char); },
      thumb:    () => { const el = document.getElementById('panelThumb');    if (el) el.outerHTML = renderThumbPanel(); setTimeout(initThumbCanvas, 50); },
    };
    if (renders[tab]) renders[tab]();
  }

  // タブのバッジをクリア
  const tabEl = document.getElementById('tab_' + tab);
  if (tabEl) tabEl.classList.remove('has-notif');

  // タブボタンactive
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active',
    b.textContent.includes({news:'ニュース入力',script:'台本',meta:'概要',thumb:'サムネ',publish:'投稿'}[tab]||'__none__')
  ));
  // パネルactive
  ['news','script','meta','thumb','publish','settings'].forEach(t => {
    const el = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
    if (el) el.classList.toggle('active', t === tab);
  });
  if (tab === 'thumb') setTimeout(initThumbCanvas, 80);
}

function parseAndSetAll() {
  const text = (document.getElementById('pasteAll')?.value || '').trim();
  if (!text) { showToast('テキストを貼り付けてください'); return; }

  // ⸻ または --- などで区切る
  const sections = text.split(/\n[⸻─—\-]{2,}\n/).map(s => s.trim()).filter(Boolean);

  let summary = '', script = '', thumbTexts = [], postText = '';

  for (const sec of sections) {
    const lines = sec.split('\n');
    const hdr = lines[0].trim();
    const body = lines.slice(1).join('\n').trim();

    if (/要約/.test(hdr)) {
      summary = body;
    } else if (/台本/.test(hdr)) {
      script = body;
    } else if (/サムネ/.test(hdr)) {
      thumbTexts = body.split('\n')
        .filter(l => /^\d+[\.\．]/.test(l.trim()))
        .map(l => l.replace(/^\d+[\.\．]\s*[「『]?/, '').replace(/[」』]?\s*$/, '').trim())
        .filter(Boolean);
    } else if (/投稿/.test(hdr)) {
      postText = body;
    }
  }

  // 台本をgeneratedScriptにセット
  if (script) {
    generatedScript = JSON.stringify({ lines: script, source: 'paste' });
  }

  // メタ情報をgeneratedMetaにセット
  generatedMeta = generatedMeta || {};
  if (thumbTexts.length > 0) {
    generatedMeta.title = thumbTexts[0];
    generatedMeta.thumb_text_horizontal = thumbTexts[0];
    generatedMeta.thumb_texts = thumbTexts;
  }
  const descParts = [];
  if (summary) descParts.push(summary);
  if (postText) descParts.push(postText);
  if (descParts.length) generatedMeta.description = descParts.join('\n\n');

  // サムネ文言案をグローバルに保持
  window._parsedThumbTexts = thumbTexts;

  // 放送日から動画タイトルを設定
  const newsDate = document.getElementById('newsDate')?.value || new Date().toISOString().slice(0,10);
  _parsedNewsDate = newsDate;
  if (!currentEpisodeId) {
    const ep = { id: 't_' + Date.now(), title: `${newsDate} モーニングニュース`, date: newsDate, charId: currentCharId, createdAt: new Date().toISOString() };
    data.episodes = [ep, ...(data.episodes || [])];
    currentEpisodeId = ep.id;
    saveData(data);
  }

  // タブに通知マーク
  ['meta','thumb'].forEach(t => {
    const el = document.getElementById('tab_' + t);
    if (el && !el.querySelector('.notif-dot')) {
      const dot = document.createElement('span');
      dot.className = 'notif-dot';
      dot.style.cssText = 'display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-left:5px;vertical-align:middle;';
      el.appendChild(dot);
    }
  });

  showToast('✅ セット完了 — 概要・タイトルタブへ');
  setTimeout(() => switchTab('meta'), 350);
}

async function suggestTheme() {
  const char = data.characters.find(c => c.id === currentCharId);
  if (!char) { showToast('キャラクターを選択してください'); return; }
  const apiKey = localStorage.getItem(API_KEY_SK);
  if (!apiKey) { showToast('設定タブでClaude APIキーを入力してください'); return; }
  const fmt = document.getElementById('allGenFormat')?.value || 'horizontal';
  const isShorts = fmt === 'shorts';

  const area = document.getElementById('themeSuggestArea');
  area.style.display = 'block';
  area.innerHTML = '<span style="font-size:.78rem;color:var(--text-muted);">💡 提案を生成中...</span>';
  aiStart('テーマを提案中...');

  const prompt = `YouTubeチャンネルのキャラクター情報をもとに、次の動画の企画テーマ・追加指示・詳細指示を5案提案してください。

キャラクター: ${char.name}（${char.species}）
チャンネルテーマ: ${char.theme}
トーン・口調: ${char.tone}
AI人格: ${char.ai_personality || 'なし'}
動画形式: ${isShorts ? 'ショート（60秒）' : '横動画（3分）'}

各案は視聴者の興味を引き、チャンネルのコンセプトに沿ったものにしてください。
JSONのみ出力:
[
  {
    "theme": "企画テーマ（20字以内）",
    "note": "追加指示（例: データ重視、感情的に、など20字以内）",
    "detail": "詳細指示（例: 新規視聴者向け。○○を冒頭に入れる。など40字以内）"
  }
]`;

  try {
    const text = await callClaude(prompt);
    const suggestions = JSON.parse(text.match(/\[[\s\S]*\]/)[0]);
    area.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${suggestions.map((s, i) => `
        <button onclick="applySuggestion(${i})" data-idx="${i}"
          style="text-align:left;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:border-color .15s;"
          onmouseover="this.style.borderColor='var(--char-color)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px;">💡 ${escHtml(s.theme)}</div>
          <div style="font-size:.72rem;color:var(--text-muted);">${escHtml(s.note)} ${s.detail ? '／ ' + escHtml(s.detail) : ''}</div>
        </button>`).join('')}
        <button onclick="document.getElementById('themeSuggestArea').style.display='none'"
          style="font-size:.72rem;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:2px 0;text-align:left;">✕ 閉じる</button>
      </div>`;
    // データをウィンドウに保持
    window._themeSuggestions = suggestions;
    aiEnd(null);
  } catch(e) {
    aiEnd(null);
    area.innerHTML = `<span style="font-size:.78rem;color:#e55;">❌ ${e.message}</span>`;
  }
}

function applySuggestion(idx) {
  const s = (window._themeSuggestions || [])[idx];
  if (!s) return;
  const themeEl  = document.getElementById('planTheme');
  const noteEl   = document.getElementById('allGenNote');
  const detailEl = document.getElementById('allGenDetail');
  if (themeEl)  themeEl.value  = s.theme  || '';
  if (noteEl)   noteEl.value   = s.note   || '';
  if (detailEl) detailEl.value = s.detail || '';
  document.getElementById('themeSuggestArea').style.display = 'none';
  // 入力フォームを軽くハイライト
  [themeEl, noteEl].forEach(el => {
    if (!el) return;
    el.style.borderColor = 'var(--char-color)';
    setTimeout(() => { el.style.borderColor = ''; }, 1200);
  });
}

function selectFormat(fmt) {
  document.getElementById('allGenFormat').value = fmt;
  const cards = { horizontal: document.getElementById('formatCard_horizontal'), shorts: document.getElementById('formatCard_shorts') };
  const color = getComputedStyle(document.documentElement).getPropertyValue('--char-color') || '#c9a84c';
  if (cards.horizontal) {
    cards.horizontal.style.border = fmt === 'horizontal' ? `2px solid ${color}` : '2px solid var(--border)';
    cards.horizontal.style.background = fmt === 'horizontal' ? `rgba(201,168,76,.12)` : 'transparent';
  }
  if (cards.shorts) {
    cards.shorts.style.border = fmt === 'shorts' ? `2px solid ${color}` : '2px solid var(--border)';
    cards.shorts.style.background = fmt === 'shorts' ? `rgba(201,168,76,.12)` : 'transparent';
  }
}

async function generateVoicevox() {
  const char = data.characters.find(c => c.id === currentCharId);
  if (!generatedScript) { showToast('先に台本を生成してください'); return; }
  const speakerId = char.voicevox_speaker ?? 3;
  const text = parseScript(generatedScript).lines;
  if (!text) { showToast('台本のセリフが取得できませんでした'); return; }
  showToast('🎙 VOICEVOX に送信中… (localhost:50021 が起動している必要があります)');
  try {
    const qRes = await fetch(`http://localhost:50021/audio_query?text=${encodeURIComponent(text)}&speaker=${speakerId}`, { method: 'POST' });
    if (!qRes.ok) throw new Error('audio_query 失敗: ' + qRes.status + ' (VOICEVOXは起動していますか？)');
    const query = await qRes.json();
    const sRes = await fetch(`http://localhost:50021/synthesis?speaker=${speakerId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(query)
    });
    if (!sRes.ok) throw new Error('synthesis 失敗: ' + sRes.status);
    const blob = await sRes.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${char.name}_${(selectedPlan?.title||'script').replace(/[\\/:*?"<>|]/g,'_')}.wav`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    showToast('✅ 音声ファイルをダウンロードしました');
  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

// storyboardData は上部で宣言済み

function splitScriptToScenes(linesText, format) {
  const lines = linesText.split('\n').filter(l => l.trim());
  const total = lines.length;
  const scenes = [];
  let idx = 0;

  function take(label, time, count) {
    if (idx >= lines.length) return;
    const n = Math.max(1, Math.min(count, lines.length - idx));
    scenes.push({ label, time, lines: lines.slice(idx, idx + n), prompt: '', imageDataUrl: '' });
    idx += n;
  }

  if (format === 'shorts') {
    take('フック',  '0〜2秒',  Math.max(1, Math.round(total * 0.08)));
    take('結論',    '3〜10秒', Math.max(1, Math.round(total * 0.13)));
    const reserved = Math.max(1, Math.round(total * 0.12));
    let ex = 1;
    while (idx < lines.length - reserved) {
      take(`理由・例${ex}`, '11〜45秒', 2);
      ex++;
    }
    take('CTA', '46〜60秒', lines.length - idx);
  } else {
    take('フック',   '0〜15秒',    Math.max(1, Math.round(total * 0.08)));
    take('課題提起', '15〜45秒',   Math.max(1, Math.round(total * 0.16)));
    const reserved = Math.max(1, Math.round(total * 0.09));
    let ex = 1;
    while (idx < lines.length - reserved) {
      take(`解決策 例${ex}`, '45〜150秒', 2);
      ex++;
    }
    take('行動喚起', '150〜180秒', lines.length - idx);
  }
  return scenes;
}

function initStoryboard(format) {
  if (!generatedScript) { showToast('先に台本を生成してください'); return; }
  const linesText = parseScript(generatedScript).lines;
  const scenes = splitScriptToScenes(linesText, format);
  const prev = storyboardData[sbKey()];
  // 既存プロンプト・画像を引き継ぐ
  if (prev && prev.scenes && prev.scenes.length === scenes.length) {
    scenes.forEach((s, i) => { s.prompt = prev.scenes[i].prompt || ''; s.imageDataUrl = prev.scenes[i].imageDataUrl || ''; });
  }
  storyboardData[sbKey()] = { format, scenes };
  saveStoryboard();
  const el = document.getElementById('storyboardContainer');
  if (el) el.innerHTML = renderStoryboard();
}

function sbKey() {
  // エピソードがあればepisodeId、なければcharIdをキーにする
  return currentEpisodeId || currentCharId || '__global__';
}

function saveStoryboard() {
  try {
    localStorage.setItem('channelos_storyboard', JSON.stringify(storyboardData));

async function _openDrivePickerModal() {
  const token = localStorage.getItem(GD_TOKEN_SK);
  const grid = document.getElementById('drivePickerGrid');
  openModal('drivePickerModal');

  if (!token) {
    grid.innerHTML = `<p style="color:var(--text-muted);font-size:.82rem;grid-column:1/-1;">Drive認証が必要です（設定タブ → Google Drive ログイン）</p>`;
    return;
  }

  grid.innerHTML = `<p style="color:var(--text-muted);font-size:.82rem;grid-column:1/-1;">読み込み中...</p>`;

  const folderId = getCharFolderId();
  const mimeFilter = _drivePickerMode === 'bgm' ? 'audio/' : 'image/';
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'${mimeFilter}'&fields=files(id,name,mimeType,thumbnailLink,webContentLink)&pageSize=100`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error('Drive API error: ' + res.status);
    const json = await res.json();
    const files = json.files || [];
    if (files.length === 0) {
      grid.innerHTML = `<p style="color:var(--text-muted);font-size:.82rem;grid-column:1/-1;">Driveフォルダに画像がありません</p>`;
      return;
    }
    grid.innerHTML = files.map(f => {
      const thumb = f.thumbnailLink ? f.thumbnailLink.replace('=s220','=s400') : '';
      return `<div onclick="selectDriveAsset('${f.id}','${escHtml(f.name)}')" style="cursor:pointer;border:2px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s;" onmouseover="this.style.borderColor='var(--char-color)'" onmouseout="this.style.borderColor='var(--border)'">
        ${thumb ? `<img src="${thumb}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;">` : `<div style="width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🖼</div>`}
        <div style="padding:5px 6px;font-size:.68rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(f.name)}</div>
      </div>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = `<p style="color:#e55;font-size:.82rem;grid-column:1/-1;">エラー: ${e.message}</p>`;
  }
}

async function selectDriveAsset(fileId, fileName) {
  const token = localStorage.getItem(GD_TOKEN_SK);
  if (!token) return;
  showToast('画像を取得中...');
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('取得失敗: ' + res.status);
    const blob = await res.blob();
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      if (_drivePickerMode === 'bgm') {
        // BGMに適用
        window._bgmDataUrl  = dataUrl;
        window._bgmFileName = fileName;
        const el = document.getElementById('bgmSelected');
        if (el) el.textContent = '🎵 ' + fileName;
        const sp = document.getElementById('panelScene');
        if (sp) sp.outerHTML = renderScenePanel();
        showToast(`✅ BGM設定: ${fileName}`);
      } else if (_drivePickerMode === 'charref') {
        // キャラ参照画像に適用
        if (!storyboardData[sbKey()]) storyboardData[sbKey()] = { scenes: [] };
        storyboardData[sbKey()].charRefDataUrl = dataUrl;
        saveStoryboard();
        const preview = document.getElementById('charRefPreview');
        if (preview) preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
        showToast(`✅ キャラ参照画像を設定しました: ${fileName}`);
      } else {
        // シーン画像に適用
        const sb = storyboardData[sbKey()];
        if (sb && _drivePickerTargetScene >= 0) {
          sb.scenes[_drivePickerTargetScene].imageDataUrl = dataUrl;
          saveStoryboard();
          const el = document.getElementById('storyboardContainer');
          if (el) el.innerHTML = renderStoryboard();
          showToast(`✅ "${fileName}" を適用しました`);
        }
      }
      closeModal('drivePickerModal');
    };
    reader.readAsDataURL(blob);
  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

function handleSceneImage(sceneIdx, input) {

async function generateSceneImage(sceneIdx) {
  if (!localStorage.getItem(STABILITY_KEY_SK)) { showToast('設定タブで Stability AI APIキーを入力してください'); return; }
  const sb = storyboardData[sbKey()];
  if (!sb) return;
  const char = (loadData().characters || []).find(c => c.id === currentCharId);
  const scene = sb.scenes[sceneIdx];

  const prompt = `Anime illustration. Character: ${char?.name||''}(${char?.species||''}). Scene: ${scene.label}. ${scene.lines.join(' ')}. Isolated character, white background, full body, vibrant colors, no text.`;

  const btn = document.getElementById(`sbGenBtn${sceneIdx}`);
  if (btn) { btn.disabled = true; btn.textContent = '生成中…'; }

  try {
    const dataUrl = await generateGeminiImage(prompt);

    sb.scenes[sceneIdx].imageDataUrl = dataUrl;
    saveStoryboard();

    // Drive自動保存（失敗しても無視）
    const folderId = char?.drive_folder_id || '';
    saveImageToDrive(dataUrl, `scene_${String(sceneIdx+1).padStart(2,'0')}_${Date.now()}.jpg`, folderId)
      .then(id => { if (id) showToast('✅ 画像生成・Drive保存完了'); });

    const el = document.getElementById('storyboardContainer');
    if (el) el.innerHTML = renderStoryboard();
    if (!char?.drive_folder_id) showToast('✅ 画像生成完了');
  } catch(e) {
    showToast('❌ ' + e.message);
    const el = document.getElementById('storyboardContainer');
    if (el) el.innerHTML = renderStoryboard();
  } finally {
    const b = document.getElementById(`sbGenBtn${sceneIdx}`);
    if (b) { b.disabled = false; b.textContent = '💎 Gemini生成'; }
  }
}

async function convertToPng(blob) {
  // Canvas 経由で PNG に変換（JPEG など他形式の場合の対応）
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      c.toBlob(resolve, 'image/png');
    };
    img.src = url;
  });
}

async function generateMetaWithGemini() {

  const geminiKey = getGeminiKey();
  if (!geminiKey) { showToast('設定タブでGemini APIキーを入力してください'); return; }

  // 台本があればそれを使用、なければ既存のmeta.descriptionを使用
  const scriptLines = generatedScript
    ? parseScript(generatedScript).lines
    : (generatedMeta?.description || '');
  document.getElementById('metaLoading').style.display = 'flex';
  aiStart('Gemini が概要欄を生成中...');

  const today = new Date();
  const weekdays = ['日','月','火','水','木','金','土'];
  const todayStr = `${today.getMonth()+1}月${today.getDate()}日(${weekdays[today.getDay()]})`;
  const prompt = `以下はYouTubeモーニングニュース動画の台本です。この台本をもとにSEO最適化されたYouTube投稿情報を生成してください。

チャンネル: マネぼう塾（経済・株式・為替ニュースを初心者向けに解説）
キャラクター: マネぼう🦉（ふくろうキャラ・毎朝の経済ニュース解説）
本日の日付: ${todayStr}

## 台本
${scriptLines.slice(0, 1200)}

## 出力ルール（厳守）
- JSONのみ出力。前後に説明文・コードブロック不要
- **マークダウン記法（**や##など）は一切使わない**
- titleは必ず「【${todayStr}】」で始める（例:「【6月11日(水)】米株小幅安・日経先物-1.4%」）
- descriptionは✅箇条書き形式。**は使わず、✅ 項目名：内容 の形式で
- 数字・%・円などの具体的な数値を必ず含める

以下のJSONのみ出力（他テキスト不要）:
{
  "title": "【${todayStr}】＋キャッチーな内容（全体35字以内・数字含む）",
  "title_alt": "代替タイトル案（同じく【${todayStr}】で始める・別角度・35字以内）",
  "description": "概要欄（冒頭1行フック→✅箇条書きサマリー→チャンネル説明→ハッシュタグ 300〜400字・**禁止）",
  "tags": ["マネぼう","モーニングニュース","経済ニュース","株価","為替","投資初心者","日経平均","ニュース解説","マネー","資産運用"],
  "hashtags": ["#マネぼう","#モーニングニュース","#経済ニュース","#株価","#投資初心者"],
  "best_post_time": "最適投稿日時（例: 平日朝6:30〜7:00）",
  "thumb_text_horizontal": "サムネ重ねテキスト（20字以内・今日の株価か注目ニュース・インパクト重視）"
}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    if (!res.ok) { const msg = await geminiErrorMessage(res); throw new Error(msg); }
    const json = await res.json();
    const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
    generatedMeta = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
    aiEnd('meta');
    document.getElementById('metaLoading').style.display = 'none';
    saveCurrentEpisode();
    document.getElementById('metaResultArea').innerHTML = renderMetaResult(generatedMeta);

    const thumbTab = document.getElementById('tab_thumb');

  } catch(e) {
    aiEnd(null);

  }
}

// copyText の旧定義（下の utils 定義に統合済み・この行は削除）

function initCanvas() {
  sceneCanvas = document.getElementById('sceneCanvas');
  if (!sceneCanvas) return;
  sceneCtx = sceneCanvas.getContext('2d');
  resizeCanvas();
  drawScene();
}

function resizeCanvas() {
  if (!sceneCanvas) return;
  if (sceneFormat === 'horizontal') { sceneCanvas.width = 1920; sceneCanvas.height = 1080; }
  else { sceneCanvas.width = 1080; sceneCanvas.height = 1920; }
  sceneCanvas.style.maxWidth  = sceneFormat === 'horizontal' ? '100%' : '200px';
  sceneCanvas.style.maxHeight = '460px';
}

function setFormat(fmt) {
  sceneFormat = fmt;
  resizeCanvas();
  drawScene();
  // Re-render controls
  const panel = document.getElementById('panelScene');
  if (panel) {
    document.querySelectorAll('.format-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(fmt==='horizontal'?'横':'ショート')));
  }
}

function drawScene() {
  if (!sceneCtx) return;
  const w = sceneCanvas.width, h = sceneCanvas.height;
  sceneCtx.clearRect(0, 0, w, h);

  // Background
  if (sceneBg && sceneBg.img) {
    sceneCtx.drawImage(sceneBg.img, 0, 0, w, h);
  } else {
    const g = sceneCtx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, '#1a1a2e'); g.addColorStop(1, '#16213e');
    sceneCtx.fillStyle = g;
    sceneCtx.fillRect(0, 0, w, h);
  }

  // Character
  if (sceneChar && sceneChar.img) {
    const ch = sceneChar;
    const scale = ch.scale || 0.5;
    const iw = sceneChar.img.naturalWidth  * scale * (w / 1920);
    const ih = sceneChar.img.naturalHeight * scale * (w / 1920);
    const x = (ch.x !== undefined ? ch.x * w : w * 0.5 - iw / 2);
    const y = (ch.y !== undefined ? ch.y * h : h - ih);
    sceneCtx.drawImage(sceneChar.img, x, y, iw, ih);
  }

  // Texts
  sceneTexts.forEach(t => {
    const size = (t.size || 48) * (w / 1920);
    sceneCtx.font = `${t.bold?'bold ':''} ${size}px 'Noto Serif JP', sans-serif`;
    sceneCtx.fillStyle = t.color || '#ffffff';
    sceneCtx.strokeStyle = 'rgba(0,0,0,0.8)';
    sceneCtx.lineWidth = size * 0.08;
    const tx = t.x !== undefined ? t.x * w : w / 2;
    const ty = t.y !== undefined ? t.y * h : h * 0.1 + size;
    sceneCtx.textAlign = 'center';
    sceneCtx.strokeText(t.text, tx, ty);
    sceneCtx.fillText(t.text, tx, ty);
  });
}

function addSceneText() {
  const text  = document.getElementById('sceneTextInput').value.trim();
  const size  = parseInt(document.getElementById('sceneTextSize').value) || 48;
  const color = document.getElementById('sceneTextColor').value;
  if (!text) return;
  sceneTexts.push({ text, size, color, x: 0.5, y: 0.1 + sceneTexts.length * 0.12 });
  drawScene();
  switchTab('scene');
}

function removeText(i) {
  sceneTexts.splice(i, 1);
  drawScene();
  switchTab('scene');
}

function exportPNG() {
  drawScene();
  const a = document.createElement('a');
  a.href = sceneCanvas.toDataURL('image/png');
  a.download = `scene_${Date.now()}.png`;
  a.click();
}

function exportWebM() {
  drawScene();
  const stream = sceneCanvas.captureStream(30);
  const rec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
  const chunks = [];
  rec.ondataavailable = e => chunks.push(e.data);
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `scene_${Date.now()}.webm`;
    a.click();
  };
  // Record 3s (static frame loop)
  rec.start();
  let frames = 0;
  const id = setInterval(() => { drawScene(); if (++frames >= 90) { clearInterval(id); rec.stop(); } }, 1000/30);
}

function openThumbZoom() {
  const c = document.getElementById('thumbCanvas');
  const overlay = document.getElementById('thumbZoomOverlay');
  const img = document.getElementById('thumbZoomImg');
  if (!c || !overlay || !img) return;
  img.src = c.toDataURL('image/png');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeThumbZoom() {
  const overlay = document.getElementById('thumbZoomOverlay');
  if (overlay) overlay.style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeThumbZoom(); });

function initThumbCanvas() {
  thumbCanvas = document.getElementById('thumbCanvas');
  if (!thumbCanvas) return;
  thumbCtx = thumbCanvas.getContext('2d');
  // Google Fonts 読み込み完了を待ってからキャンバスを描画（フォント未読みのまま描画するとテキストが崩れる）
  const doInit = () => {
    if (thumbRefDataUrl && !_thumbRefImg) {
      const img = new Image();
      img.onload = () => { _thumbRefImg = img; redrawThumb(); };
      img.src = thumbRefDataUrl;
    } else {
      redrawThumb();
    }
  };
  if (document.fonts?.ready) {
    document.fonts.ready.then(doInit);
  } else {
    doInit();
  }
}

function loadThumbBg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    thumbBgDataUrl = e.target.result;
    localStorage.setItem('ms_thumb_bg_v1', thumbBgDataUrl);
    // ボタンラベル更新
    const panel = document.getElementById('panelThumb');
    if (panel) panel.outerHTML = renderThumbPanel();
    setTimeout(() => { initThumbCanvas(); redrawThumb(); }, 50);
  };
  reader.readAsDataURL(file);
}

async function loadThumbBgFromUrl(url, label) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) { showToast('⚠️ 背景画像が見つかりません: ' + url); return; }
    const blob = await resp.blob();
    const reader = new FileReader();
    reader.onload = e => {
      thumbBgDataUrl = e.target.result;
      localStorage.setItem('ms_thumb_bg_v1', thumbBgDataUrl);
      const panel = document.getElementById('panelThumb');
      if (panel) panel.outerHTML = renderThumbPanel();
      setTimeout(() => { initThumbCanvas(); redrawThumb(); }, 50);
      showToast('✅ 背景: ' + label);
    };
    reader.readAsDataURL(blob);
  } catch(e) { showToast('⚠️ 読込エラー: ' + e.message); }
}

function clearThumbBg() {
  thumbBgDataUrl = '';
  _thumbBgImgCache = null; _thumbBgUrlCache = '';
  localStorage.removeItem('ms_thumb_bg_v1');
  const panel = document.getElementById('panelThumb');
  if (panel) panel.outerHTML = renderThumbPanel();
  setTimeout(() => { initThumbCanvas(); redrawThumb(); }, 50);
}

async function loadThumbRefFromUrl(url, label) {

// 参照画像の変形状態（localStorage永続）
const _thumbRefDefault = { x: 810, y: 1500, w: 400, h: 600, angle: 0 };
let thumbRef = (() => { try { return { ..._thumbRefDefault, ...JSON.parse(localStorage.getItem('ms_thumb_ref_state_v1') || '{}') }; } catch { return { ..._thumbRefDefault }; } })();
function _saveThumbRefState() { localStorage.setItem('ms_thumb_ref_state_v1', JSON.stringify(thumbRef)); }
function resetThumbRef() {
  Object.assign(thumbRef, _thumbRefDefault);
  _saveThumbRefState();
  const el = document.getElementById('panelThumb');
  if (el) el.outerHTML = renderThumbPanel();
  setTimeout(initThumbCanvas, 50);
}
let _thumbRefImg = null;
let _thumbDrawToken = 0;
let _thumbBgImgCache = null;
let _thumbBgUrlCache = '';

function _getThumbBgImg(cb) {
  if (!thumbBgDataUrl) { cb(null); return; }
  if (_thumbBgImgCache && _thumbBgUrlCache === thumbBgDataUrl) { cb(_thumbBgImgCache); return; }
  const img = new Image();
  img.onload = () => { _thumbBgImgCache = img; _thumbBgUrlCache = thumbBgDataUrl; cb(img); };
  img.src = thumbBgDataUrl;
}

function redrawThumb() {
  if (!thumbCtx) { initThumbCanvas(); return; }
  const token = ++_thumbDrawToken;
  const W = 1080, H = 1920;
  const mainText  = document.getElementById('thumbMainText')?.value  || '';
  const dateText  = document.getElementById('thumbDateText')?.value  || '';
  const textColor = document.getElementById('thumbTextColor')?.value || _thumbTextColor;
  const shadowCol = document.getElementById('thumbShadowColor')?.value || _thumbShadowColor;

  thumbCtx.clearRect(0, 0, W, H);

  _getThumbBgImg(img => {
    if (token !== _thumbDrawToken) return;

    // ① 背景
    if (img) {
      thumbCtx.drawImage(img, 0, 0, W, H);
    } else {
      const grad = thumbCtx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#0d1a2e'); grad.addColorStop(1, '#1a2e45');
      thumbCtx.fillStyle = grad; thumbCtx.fillRect(0, 0, W, H);
    }

    // ② 下部グラデーション幕（先に背景だけ暗くする）
    const grad2 = thumbCtx.createLinearGradient(0, H * 0.5, 0, H);
    grad2.addColorStop(0, 'rgba(0,0,0,0)');
    grad2.addColorStop(1, 'rgba(0,0,0,0.85)');
    thumbCtx.fillStyle = grad2;
    thumbCtx.fillRect(0, 0, W, H);

    // ③ キャラクター（グラデーション幕の上・テキストの下に配置）
    if (_thumbRefImg) {
      thumbCtx.save();
      thumbCtx.translate(thumbRef.x, thumbRef.y);
      thumbCtx.rotate(thumbRef.angle * Math.PI / 180);
      thumbCtx.drawImage(_thumbRefImg, -thumbRef.w / 2, -thumbRef.h / 2, thumbRef.w, thumbRef.h);
      thumbCtx.restore();
    }

    // ④ 日付ラベル（左上）
    if (dateText) {
      thumbCtx.save();
      thumbCtx.font = 'bold 72px "Noto Sans JP", sans-serif';
      thumbCtx.shadowColor = shadowCol; thumbCtx.shadowBlur = 16;
      thumbCtx.fillStyle = '#F5C842';
      thumbCtx.fillText(dateText, 60, 140);
      thumbCtx.restore();
    }

    // ⑤ バッジ
    if (_thumbBadgeVisible) {
      thumbCtx.save();
      thumbCtx.font = 'bold 44px sans-serif';
      thumbCtx.fillStyle = 'rgba(245,200,66,0.9)';
      thumbCtx.fillText('🦉 マネぼうモーニングニュース', 56, 220);
      thumbCtx.restore();
    }

    // ⑥ メインタイトル（縦位置対応）
    if (mainText) {
      thumbCtx.save();
      const len = mainText.length;
      const fontSize = len <= 12 ? 120 : len <= 16 ? 100 : len <= 22 ? 84 : 72;
      thumbCtx.font = `bold ${fontSize}px "Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif`;
      const pos = window._thumbTextPos || 'bot';
      const lineHeight = Math.round(fontSize * 1.25);
      // 行数を計算してテキスト帯の高さを決める
      const words = mainText.split('');
      let lines = 1, testLine = '';
      for (const ch of words) {
        const test = testLine + ch;
        if (thumbCtx.measureText(test).width > W - 120 && testLine) { lines++; testLine = ch; } else { testLine = test; }
      }
      const textBlockH = lines * lineHeight + 20;
      const ty = pos === 'top' ? 400 : pos === 'mid' ? H / 2 : H - textBlockH - 40;
      // テキスト背景帯（半透明黒）
      thumbCtx.fillStyle = 'rgba(0,0,0,0.45)';
      thumbCtx.fillRect(0, ty - fontSize + 10, W, textBlockH);
      // テキスト描画
      thumbCtx.shadowColor = shadowCol; thumbCtx.shadowBlur = _thumbShadowBlur;
      thumbCtx.fillStyle = textColor;
      drawWrapText(thumbCtx, mainText, 60, ty, W - 120, lineHeight);
      thumbCtx.restore();
    }
  });
}

// 参照画像が変わった時にキャッシュ更新
function _updateThumbRefImg(dataUrl) {
  if (!dataUrl) { _thumbRefImg = null; redrawThumb(); return; }
  const img = new Image();
  img.onload = () => { _thumbRefImg = img; redrawThumb(); };
  img.src = dataUrl;
}

// Canvas上でのドラッグ操作
(function() {
  let drag = null;
  let pinchDist = 0;

  function canvasScale() {
    const c = document.getElementById('thumbCanvas');
    if (!c) return 1;
    return 1920 / c.getBoundingClientRect().height;
  }

  function getPos(e) {
    const c = document.getElementById('thumbCanvas');
    if (!c) return {x:0,y:0};
    const r = c.getBoundingClientRect();
    const s = canvasScale();
    const cx = (e.clientX - r.left) * s;
    const cy = (e.clientY - r.top) * s;
    return {x: cx, y: cy};
  }

  function isOnRef(x, y) {
    if (!_thumbRefImg) return false;
    const dx = x - thumbRef.x, dy = y - thumbRef.y;
    const rad = -thumbRef.angle * Math.PI / 180;
    const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
    const ly = dx * Math.sin(rad) + dy * Math.cos(rad);
    return Math.abs(lx) < thumbRef.w / 2 + 20 && Math.abs(ly) < thumbRef.h / 2 + 20;
  }

  document.addEventListener('mousedown', e => {
    const c = document.getElementById('thumbCanvas');
    if (!c || !c.contains(e.target)) return;
    const {x, y} = getPos(e);
    if (isOnRef(x, y)) { drag = {ox: x - thumbRef.x, oy: y - thumbRef.y}; }
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const {x, y} = getPos(e);
    thumbRef.x = x - drag.ox; thumbRef.y = y - drag.oy;
    redrawThumb();
  });
  document.addEventListener('mouseup', () => { if (drag) { _saveThumbRefState(); } drag = null; });

  // ピンチ/ホイールでスケール
  function _syncScaleUI() {
    const pct = Math.round((thumbRef.w / 400) * 100);
    const sl = document.getElementById('thumbRefScale');
    const lb = document.getElementById('charScaleLbl');
    if (sl) sl.value = pct;
    if (lb) lb.textContent = pct + '%';
  }

  document.addEventListener('wheel', e => {
    const c = document.getElementById('thumbCanvas');
    if (!c || !c.contains(e.target) || !_thumbRefImg) return;
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.05 : 0.95;
    thumbRef.w = Math.max(80, thumbRef.w * delta);
    thumbRef.h = Math.max(80, thumbRef.h * delta);
    _syncScaleUI();
    _saveThumbRefState();
    redrawThumb();
  }, {passive: false});

  // タッチ対応
  document.addEventListener('touchstart', e => {
    const c = document.getElementById('thumbCanvas');
    if (!c || !c.contains(e.target)) return;
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const {x, y} = getPos(t);
      if (isOnRef(x, y)) drag = {ox: x - thumbRef.x, oy: y - thumbRef.y};
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist = Math.hypot(dx, dy);
    }
  }, {passive: true});
  document.addEventListener('touchmove', e => {
    const c = document.getElementById('thumbCanvas');
    if (!c || !c.contains(e.target)) return;
    if (e.touches.length === 1 && drag) {
      const {x, y} = getPos(e.touches[0]);
      thumbRef.x = x - drag.ox; thumbRef.y = y - drag.oy;
      redrawThumb();
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      if (pinchDist) {
        const s = d / pinchDist;
        thumbRef.w = Math.max(80, thumbRef.w * s);
        thumbRef.h = Math.max(80, thumbRef.h * s);
        _syncScaleUI();
        redrawThumb();
      }
      pinchDist = d;
    }
  }, {passive: true});
  document.addEventListener('touchend', () => { if (drag || pinchDist) _saveThumbRefState(); drag = null; pinchDist = 0; });
})();

function drawWrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = [...text];
  const lines = [];
  let line = '';
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);

  // 最後の行が短すぎる（≤2文字）場合、前の行から文字を移して均等化
  if (lines.length >= 2 && [...lines[lines.length - 1]].length <= 2) {
    const prevChars = [...lines[lines.length - 2]];
    const lastChars = [...lines[lines.length - 1]];
    const move = Math.min(2, Math.floor((prevChars.length - lastChars.length) / 2));
    if (move > 0) {
      const moved = prevChars.splice(prevChars.length - move, move);
      lines[lines.length - 2] = prevChars.join('');
      lines[lines.length - 1] = moved.join('') + lastChars.join('');
    }
  }

  let lineY = y;
  for (const l of lines) {
    ctx.fillText(l, x, lineY);
    lineY += lineHeight;
  }
}

function _thumbFontTier(n) {
  const tiers = [['〜12字','最大',n<=12],['13〜16字','大',n>=13&&n<=16],['17〜22字','中',n>=17&&n<=22],['23字〜','小',n>=23]];
  return tiers.map(([range,size,active])=>`<span style="color:${active?'var(--char-color)':'var(--text-muted)'};font-weight:${active?'700':'400'};">${range}: ${size}</span>`).join('<span style="color:var(--text-muted);"> / </span>');
}

async function generateThumbTitlesAI() {
  const btn = document.getElementById('thumbAiBtn');

  try {
    const newsItems = document.getElementById('newsItems')?.value.trim() || '';

    const nyse    = document.getElementById('nyse')?.value.trim() || '';

    const market  = [nikkei && '日経:'+nikkei, nyse && 'NYダウ:'+nyse, nasdaq && 'NASDAQ:'+nasdaq, forex && '為替:'+forex].filter(Boolean).join(' / ');
    const context = [market, newsItems, note].filter(Boolean).join('\n');
    if (!context) { showToast('ニュース入力タブに内容を入力してください'); return; }

    const prompt = `以下の今日の経済ニュースに基づき、YouTube縦型サムネイル用の日本語タイトル案を3つ生成してください。

【条件】
・12文字以内が理想（最大22文字）
・初心者にもわかりやすい言葉
・数字・上昇↑下落↓・！などを積極活用

・番組名「マネぼうモーニングニュース」は含めない

【今日のニュース】
${context.slice(0, 1000)}

形式: 番号つきリストで3案のみ出力。余計な説明や解説は不要。`;

    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${getGeminiKey()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const titles = text.split('\n')
      .filter(l => /^\d+[\.\．]/.test(l.trim()))
      .map(l => l.replace(/^\d+[\.\．]\s*[「『]?/, '').replace(/[」』]?\s*$/, '').trim())
      .filter(Boolean)
      .slice(0, 3);

    if (!titles.length) { showToast('タイトル生成に失敗しました'); return; }

    // 提案ボタンを描画
    const box = document.getElementById('thumbAiSuggestions');
    if (box) {

      box.innerHTML = titles.map((t, i) => `

          onclick="_setThumbTitle(this.dataset.t);" data-t="${escHtml(t)}">
          ${i+1}. ${escHtml(t)}
        </button>`).join('');
    }
    showToast('✅ AI提案 ' + titles.length + '件');
  } catch(e) {
    showToast('❌ ' + e.message.slice(0, 60));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AIでタイトル提案'; }
  }
}

async function loadDriveAssets() {
  const token    = localStorage.getItem(GD_TOKEN_SK);
  const folderId = getCharFolderId();
  const grid = document.getElementById('assetGrid');
  if (!grid) return;
  if (!token) { grid.innerHTML = `<p style="font-size:.8rem;color:var(--text-muted);">設定タブでGoogle Drive認証を行ってください</p>`; return; }

  grid.innerHTML = `<div class="loading"><div class="spinner"></div><span>Drive から読み込み中...</span></div>`;
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name,mimeType,thumbnailLink,webContentLink)&pageSize=100`, {
      headers: { Authorization: `Bearer ${token}` }
    });

      thumbUrl: f.thumbnailLink ? f.thumbnailLink.replace('=s220','=s400') : null,
      blobUrl: null
    }));
    renderAssetGrid();
    // フル画像はBlobURLで非同期ロード
    driveAssets.forEach((a, i) => loadDriveThumb(a, i, token));
  } catch(e) {
    grid.innerHTML = `<p style="font-size:.8rem;color:#e55;">エラー: ${e.message}</p>`;
  }
}

async function loadDriveThumb(asset, idx, token) {
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${asset.id}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    driveAssets[idx].blobUrl = url;
    const img = document.getElementById(`asset-img-${idx}`);
    if (img) img.src = url;
  } catch(e) { /* サムネ失敗は無視 */ }
}

async function uploadFiles(files) {
  const token    = localStorage.getItem(GD_TOKEN_SK);
  const folderId = getCharFolderId();
  if (!token) { showToast('設定タブでGoogle Drive認証を行ってください'); switchTab('settings'); return; }
  const prog = document.getElementById('uploadProgress');
  const msg  = document.getElementById('uploadMsg');
  prog.style.display = 'flex';
  let done = 0;
  for (const file of Array.from(files)) {
    msg.textContent = `アップロード中: ${file.name} (${done+1}/${files.length})`;
    try {
      const meta = JSON.stringify({ name: file.name, parents: [folderId] });
      const form = new FormData();
      form.append('metadata', new Blob([meta], { type: 'application/json' }));
      form.append('file', file);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form
      });
      if (!res.ok) throw new Error('Upload failed: ' + res.status);
      done++;
    } catch(e) { showToast(`${file.name} のアップロードに失敗: ${e.message}`); }
  }
  prog.style.display = 'none';
  msg.textContent = '';
  loadDriveAssets();
}

  const id = charId || currentCharId;
  if (!id) { showToast('キャラクターを選択してください'); return; }
  const clientId = localStorage.getItem(GD_CLIENT_SK) || '420800714761-ui9g88fgbrocu4a1nim1m3mv908s0gos.apps.googleusercontent.com';
  const redirect = encodeURIComponent('https://rainybrainch.github.io/live/morning-news-studio.html');
  const scope    = encodeURIComponent('https://www.googleapis.com/auth/youtube');
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirect}&response_type=token&scope=${scope}&prompt=consent&state=youtube_${id}`;
  window.location.href = url;
}
function ytLogout(charId) {
  const id = charId || currentCharId;
  if (id) localStorage.removeItem(`${YT_TOKEN_SK}_${id}`);

function getYtToken(charId) {

function copyText(text) {

function setSchedulePreset(daysAhead) {
  const d = new Date();
  if (daysAhead > 0) d.setDate(d.getDate() + daysAhead);
  if (d.getDay() === 0) d.setDate(d.getDate() + 1);
  if (d.getDay() === 6) d.setDate(d.getDate() + 2);
  d.setHours(6, 30, 0, 0);
  const el = document.getElementById('schedDatetime');
  if (el) el.value = d.toISOString().slice(0, 16);
}

async function buildThumbnailForPublish(orientation) {
  const ep = currentEpisodeId ? (loadData().episodes || []).find(e => e.id === currentEpisodeId) : null;
  if (!ep) { showToast('エピソードを選択してください'); return; }
  const meta = ep.generatedMeta || {};
  if (!localStorage.getItem(STABILITY_KEY_SK)) { showToast('設定タブでStability AI APIキーを入力してください'); return; }

  const isShorts = orientation === 'shorts';
  const W = isShorts ? 720 : 1280;
  const H = isShorts ? 1280 : 720;
  const promptText = isShorts
    ? (meta.thumb_shorts || `YouTube Shorts thumbnail, vertical 9:16, vibrant, eye-catching: ${meta.title||ep.theme||'動画'}`)
    : (meta.thumb_horizontal || `YouTube thumbnail, horizontal 16:9, vibrant, eye-catching: ${meta.title||ep.theme||'動画'}`);
  const overlayText = isShorts
    ? (meta.thumb_text_shorts || meta.title || '')
    : (meta.thumb_text_horizontal || meta.title || '');

  showToast('🎨 Stability AI で画像生成中...');
  try {
    const imgDataUrl = await generateStabilityImage(promptText, isShorts ? '9:16' : '16:9');

    // Canvas合成
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = imgDataUrl; });
    ctx.drawImage(img, 0, 0, W, H);

    // テキストオーバーレイ
    if (overlayText) {
      const fontSize = isShorts ? 72 : 60;
      ctx.font = `bold ${fontSize}px 'Noto Sans JP', sans-serif`;
      ctx.textAlign = 'center';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffffff';
      const lines = wrapText(ctx, overlayText, W - 80);
      const lineH = fontSize * 1.3;
      const totalH = lines.length * lineH;
      let y = isShorts ? H * 0.75 : H * 0.8;
      lines.forEach(line => { ctx.fillText(line, W / 2, y); y += lineH; });
    }

    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    // Save to episode
    const d = loadData();
    const epIdx = d.episodes.findIndex(e => e.id === currentEpisodeId);
    if (epIdx >= 0) { d.episodes[epIdx].thumbnailDataUrl = dataUrl; saveData(d); }

    // Drive自動保存
    const char = (d.characters || []).find(c => c.id === currentCharId);
    const folderId = char?.drive_folder_id || '';
    saveImageToDrive(dataUrl, `thumb_${isShorts?'shorts':'horizontal'}_${Date.now()}.jpg`, folderId)
      .then(id => { if (id) showToast('✅ サムネイル生成・Drive保存完了'); });

    switchTab('publish');
    if (!folderId) showToast('✅ サムネイル生成完了');
  } catch (e) {
    showToast('❌ Gemini サムネイル生成失敗: ' + e.message);
  }
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split('');
  const lines = [];
  let line = '';
  for (const ch of words) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function downloadThumbnail() {
  const ep = currentEpisodeId ? (loadData().episodes || []).find(e => e.id === currentEpisodeId) : null;
  if (!ep?.thumbnailDataUrl) { showToast('サムネイルがありません'); return; }
  const a = document.createElement('a');
  a.href = ep.thumbnailDataUrl;
  a.download = `thumbnail_${ep.id}.jpg`;
  a.click();
}

async function applyMetaToYouTube() {
  const ytToken = getYtToken(currentCharId);
  if (!ytToken) { showToast('YouTube認証が必要です'); ytAuth(currentCharId); return; }
  const videoId = document.getElementById('ytVideoId')?.value?.trim();
  if (!videoId) { showToast('動画IDを入力してください'); return; }
  const ep = currentEpisodeId ? (loadData().episodes || []).find(e => e.id === currentEpisodeId) : null;
  if (!ep) { showToast('エピソードを選択してください'); return; }
  const meta = ep.generatedMeta || {};
  if (!meta.title) { showToast('投稿情報を生成してください'); return; }

  showToast('📤 YouTube に適用中...');
  try {
    // 1. videos.update
    const updateResp = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ytToken}` },
      body: JSON.stringify({
        id: videoId,
        snippet: {
          title: meta.title,
          description: meta.description || '',
          tags: meta.tags || [],
          categoryId: '22'
        }
      })
    });
    if (!updateResp.ok) {
      const err = await updateResp.json();
      throw new Error(err.error?.message || `videos.update failed (${updateResp.status})`);
    }

    // 2. thumbnails.set
    if (ep.thumbnailDataUrl) {
      const blob = await (await fetch(ep.thumbnailDataUrl)).blob();
      const thumbResp = await fetch(`https://www.googleapis.com/upload/youtube/v3/thumbnails/set?videoId=${videoId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'image/jpeg', 'Authorization': `Bearer ${ytToken}` },
        body: blob
      });
      if (!thumbResp.ok) {
        const err = await thumbResp.json();
        showToast('⚠️ サムネ適用失敗: ' + (err.error?.message || thumbResp.status));
      } else {
        showToast('✅ タイトル・説明・サムネイルを適用しました');
        return;
      }
    }
    showToast('✅ タイトル・説明・タグを適用しました（サムネイル未設定）');
  } catch (e) {
    showToast('❌ 適用失敗: ' + e.message);
  }
}

// OAuth token from URL hash (redirect back from Google)
(function() {
  const hash = location.hash;
  if (hash.includes('access_token=')) {
    const params = new URLSearchParams(hash.slice(1));
    const token  = params.get('access_token');
    const state  = params.get('state');
    if (token) {
      if (state && state.startsWith('youtube_')) {
        const charId = state.replace('youtube_', '');
        localStorage.setItem(`${YT_TOKEN_SK}_${charId}`, token);
        history.replaceState(null,'',location.pathname);
        const char = (loadData().characters||[]).find(c => c.id === charId);
        showToast(`📺 ${char?.name||'キャラ'} のYouTube認証完了`);
      } else {
        localStorage.setItem(GD_TOKEN_SK, token);
        history.replaceState(null,'',location.pathname);
        showToast('☁️ Google Drive認証完了');
        autoLoadKeysFromDrive(token);
      }
    }
  }
})();

  const apiKey = localStorage.getItem(API_KEY_SK);
  if (!apiKey) { switchTab('settings'); throw new Error('APIキーを設定してください'); }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',

    },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4096, messages: [{ role: 'user', content: prompt }] })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'API error '+res.status); }
  return (await res.json()).content[0].text;
}
